<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS Cocina | Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap">
    <style>
        :root {
            --bg-base: #f1f5f9;
            --column-bg: rgba(255, 255, 255, 0.6);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-base); 
            color: #1e293b;
        }
        .kanban-column {
            background: var(--column-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2.5rem;
        }
        .order-card {
            background: white;
            border-radius: 1.5rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    
    <header class="p-6 flex justify-between items-center z-10">
        <div class="flex items-center gap-6">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-2xl shadow-xl shadow-indigo-100">🔥</div>
            <div>
                <h1 class="text-3xl font-black tracking-tighter uppercase leading-none">KDS <span class="text-indigo-600">Cocina</span></h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-1">Gestión de Comandas en Tiempo Real</p>
            </div>
            <div class="h-8 w-px bg-slate-200 mx-2"></div>
            <span id="status-indicator" class="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-emerald-100 flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> ONLINE
            </span>
        </div>
        <div class="text-slate-900 font-black text-3xl tracking-tighter" id="clock">00:00:00</div>
    </header>

        <div id="module-telemetry" class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-16"></div>

    <main class="flex-1 p-6 flex gap-8 overflow-hidden">
        
        <!-- Col 1: Nuevos -->
        <div class="flex-1 kanban-column flex flex-col overflow-hidden shadow-sm">
            <div class="p-6 border-b border-white/40 flex justify-between items-center">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Nuevos Ingresos</h2>
                <span id="count-nuevos" class="bg-indigo-600 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-lg shadow-indigo-100">0</span>
            </div>
            <div id="col-nuevos" class="flex-1 p-6 overflow-y-auto custom-scrollbar space-y-6"></div>
        </div>

        <!-- Col 2: Preparación -->
        <div class="flex-1 kanban-column flex flex-col overflow-hidden shadow-sm border-indigo-200/50">
            <div class="p-6 border-b border-white/40 flex justify-between items-center bg-indigo-50/30">
                <h2 class="text-xs font-black text-indigo-600 uppercase tracking-widest">En los Fogones</h2>
                <span id="count-prep" class="bg-amber-500 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-lg shadow-amber-100">0</span>
            </div>
            <div id="col-prep" class="flex-1 p-6 overflow-y-auto custom-scrollbar space-y-6"></div>
        </div>

        <!-- Col 3: Listos -->
        <div class="flex-1 kanban-column flex flex-col overflow-hidden shadow-sm border-emerald-200/50">
            <div class="p-6 border-b border-white/40 flex justify-between items-center bg-emerald-50/30">
                <h2 class="text-xs font-black text-emerald-600 uppercase tracking-widest">Para Entrega</h2>
                <span id="count-listos" class="bg-emerald-500 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-lg shadow-emerald-100">0</span>
            </div>
            <div id="col-listos" class="flex-1 p-6 overflow-y-auto custom-scrollbar space-y-6"></div>
        </div>

    </main>

    <div id="toast-container" class="fixed bottom-10 right-10 z-50 flex flex-col gap-3"></div>

    <script>
        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colorClass = type === 'error' ? 'border-red-100 bg-red-50 text-red-700' : 'border-indigo-100 bg-white text-slate-900';
            toast.className = `p-6 rounded-[1.5rem] shadow-2xl border ${colorClass} min-w-[300px] animate-pop transition-all`;
            toast.innerHTML = `
                <div class="font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full ${type === 'error' ? 'bg-red-500' : 'bg-indigo-600'}"></span> ${title}
                </div>
                <div class="text-[11px] font-bold mt-1 opacity-60 uppercase tracking-tight">${message}</div>
            `;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(10px)'; setTimeout(() => toast.remove(), 500); }, 3000);
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('es-ES', { hour12: false });
        }, 1000);

        async function fetchOrdersDetailed() {
            try {
                const res = await fetch('/api/orders/?limit=100');
                if(!res.ok) throw new Error("Sync error");
                const pedidos = await res.json();
                const todayStr = new Date().toISOString().split('T')[0];
                const activeOrders = pedidos.filter(p => p.fecha.startsWith(todayStr) && !['COMPLETADO', 'CANCELADO'].includes(p.estado));
                renderDetailedBoard(activeOrders);
            } catch(e) { console.error(e); }
        }

        function renderDetailedBoard(pedidos) {
            const cols = {
                'NUEVO': document.getElementById('col-nuevos'),
                'ESPERANDO_PAGO': document.getElementById('col-nuevos'),
                'EN_PREPARACION': document.getElementById('col-prep'),
                'LISTO': document.getElementById('col-listos')
            };

            Object.values(cols).forEach(c => { if(c) c.innerHTML = ''; });
            let counts = { nuevos: 0, prep: 0, listos: 0 };

            pedidos.forEach(p => {
                let col = cols[p.estado] || cols['EN_PREPARACION'];
                if(p.estado === 'NUEVO' || p.estado === 'ESPERANDO_PAGO') counts.nuevos++;
                else if(p.estado === 'EN_PREPARACION') counts.prep++;
                else if(p.estado === 'LISTO') counts.listos++;

                let itemsList = (p.items || []).map(it => 
                    `<li class="flex justify-between items-center py-2 border-b border-slate-50 last:border-0">
                        <span class="font-black text-xs text-slate-700 uppercase tracking-tighter">
                            <span class="text-indigo-600 mr-2">x${it.cantidad}</span> ${it.nombre}
                        </span>
                    </li>`
                ).join('');

                const orderDate = new Date(p.fecha + 'Z');
                const diffMins = Math.floor((new Date() - orderDate) / 60000);
                let timeColor = diffMins > 15 ? 'text-red-500' : 'text-slate-400';

                let actionBtn = '';
                if(p.estado === 'ESPERANDO_PAGO' || p.estado === 'NUEVO') {
                    actionBtn = `<button onclick="changeStatus('${p.id}', 'EN_PREPARACION')" class="w-full mt-4 bg-indigo-600 text-white font-black uppercase text-[9px] tracking-widest py-4 rounded-xl shadow-lg shadow-indigo-100 transition-all active:scale-95">Iniciar Preparación</button>`;
                } else if(p.estado === 'EN_PREPARACION') {
                    actionBtn = `<button onclick="changeStatus('${p.id}', 'LISTO')" class="w-full mt-4 bg-emerald-500 text-white font-black uppercase text-[9px] tracking-widest py-4 rounded-xl shadow-lg shadow-emerald-100 transition-all active:scale-95">Completado & Enviar</button>`;
                } else if(p.estado === 'LISTO') {
                    actionBtn = `<button onclick="changeStatus('${p.id}', 'COMPLETADO')" class="w-full mt-4 border border-slate-200 text-slate-500 font-black uppercase text-[9px] tracking-widest py-4 rounded-xl hover:bg-slate-50 transition-all active:scale-95">Cerrar Orden</button>`;
                }

                const cardHtml = `
                    <div class="order-card p-6">
                        <div class="flex justify-between items-start mb-4 border-b border-slate-50 pb-4">
                            <div>
                                <span class="text-3xl font-black tracking-tighter text-slate-900 uppercase">#${p.numero_ticket.slice(-4)}</span>
                                <div class="text-[8px] text-slate-400 uppercase font-black tracking-widest mt-1">${p.origen}</div>
                            </div>
                            <div class="text-right">
                                <div class="${timeColor} font-black text-xs tracking-tighter">${diffMins} min</div>
                                <div class="text-[8px] font-bold text-slate-300 mt-0.5">${orderDate.toLocaleTimeString('es-ES', {hour12:false}).substring(0,5)}</div>
                            </div>
                        </div>
                        <ul class="mb-4"> ${itemsList} </ul>
                        ${p.notas_cliente ? `<div class="bg-amber-50 border border-amber-100 text-amber-700 text-[9px] font-bold p-3 rounded-xl mb-4 uppercase tracking-tighter">⚠️ ${p.notas_cliente}</div>` : ''}
                        ${actionBtn}
                    </div>
                `;
                col.insertAdjacentHTML('beforeend', cardHtml);
            });

            document.getElementById('count-nuevos').innerText = counts.nuevos;
            document.getElementById('count-prep').innerText = counts.prep;
            document.getElementById('count-listos').innerText = counts.listos;
        }

        async function changeStatus(id, newStatus) {
            try {
                const res = await fetch(`/api/orders/${id}/estado?estado=${newStatus}`, { method: 'PUT' });
                if(!res.ok) throw new Error("API Failure");
                showToast("KDS Sync", `Orden ${newStatus} actualizada`);
                fetchOrdersDetailed();
            } catch(e) { showToast("Error", "Fallo en la comunicación", "error"); }
        }

        fetchOrdersDetailed();
        setInterval(fetchOrdersDetailed, 10000);

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${protocol}//${window.location.host}/ws/orders`);
            ws.onmessage = (event) => {
                const payload = JSON.parse(event.data);
                if(payload.type === "NEW_ORDER") {
                    showToast("Comanda Entrante", `Ticket #${payload.data.ticket}`, 'info');
                    fetchOrdersDetailed();
                }
            };
            ws.onclose = () => setTimeout(connectWebSocket, 3000);
        }
        connectWebSocket();
    </script>

    <script>
        window.addEventListener('load', () => {
            if (typeof EnterpriseUI !== 'undefined') {
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Estado del Nodo',
                    value: 'ACTIVO',
                    unit: 'SECURE',
                    trend: 'up',
                    trendValue: '100%',
                    icon: 'fa-server'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Carga de Trabajo',
                    value: Math.floor(Math.random() * 40 + 20),
                    unit: '%',
                    trend: 'up',
                    trendValue: 'LOW',
                    icon: 'fa-microchip'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Latencia Sync',
                    value: Math.floor(Math.random() * 50 + 10),
                    unit: 'ms',
                    trend: 'down',
                    trendValue: 'OPTIMAL',
                    icon: 'fa-bolt'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Seguridad',
                    value: 'V4.0',
                    unit: 'SSL',
                    trend: 'up',
                    trendValue: 'MAX',
                    icon: 'fa-shield-halved'
                });
            }
        });
    </script>
            
</body>
</html>
