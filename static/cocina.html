<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cocina - Cargones y Pollos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { user-select: none; -webkit-user-select: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-900 h-screen overflow-hidden flex flex-col font-sans text-white">
    
    <!-- Navbar Sup -->
    <div class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center shadow-md z-10">
        <h1 class="text-3xl font-black text-yellow-400">🔥 Monitor de Cocina</h1>
        <div class="flex gap-4">
            <button onclick="abrirProduccion()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-xl font-black text-xl transition-all shadow-md active:scale-95 flex items-center gap-2">
                ➕ AÑADIR STOCK MANUAL
            </button>
            <button onclick="location.href='index.html'" class="bg-gray-700 hover:bg-gray-600 px-5 py-3 rounded-xl font-bold text-lg transition-all shadow-md active:scale-95">
                Volver a TPV
            </button>
        </div>
    </div>

    <!-- Pedidos Grid -->
    <div class="flex-1 overflow-x-auto p-6 scroll-smooth">
        <div id="pedidos-container" class="flex gap-6 h-full items-start w-max">
            <div class="text-gray-500 font-bold text-2xl mt-20 italic">Cargando comandas...</div>
        </div>
    </div>

    <!-- Modal Producción -->
    <div id="modal-produccion" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white text-gray-900 rounded-3xl p-8 max-w-lg w-full shadow-2xl border-4 border-gray-200">
            <h2 class="text-4xl font-black mb-6 border-b-2 border-gray-100 pb-4">Nueva Producción</h2>
            
            <div class="mb-6">
                <label class="block text-gray-500 font-bold mb-2 text-lg uppercase tracking-wide">¿Qué has cocinado?</label>
                <select id="prod-select" class="w-full bg-gray-50 border-2 border-gray-300 rounded-2xl p-5 text-2xl font-black focus:border-emerald-500 focus:outline-none focus:ring-4 focus:ring-emerald-200 transition-all">
                    <!-- Dinamico -->
                </select>
            </div>

            <div class="mb-8">
                <label class="block text-gray-500 font-bold mb-2 text-lg uppercase tracking-wide">¿Cuántas unidades?</label>
                <div class="flex items-center gap-4">
                    <button onclick="cambiarCant(-1)" class="w-20 h-20 bg-red-100 hover:bg-red-200 text-red-600 rounded-2xl font-black text-5xl active:scale-90 transition-transform shadow-sm">-</button>
                    <input type="number" id="prod-cantidad" value="1" class="flex-1 h-20 bg-gray-50 border-2 border-gray-300 rounded-2xl text-5xl font-black text-center focus:border-emerald-500 focus:outline-none focus:ring-4 focus:ring-emerald-200 transition-all">
                    <button onclick="cambiarCant(1)" class="w-20 h-20 bg-emerald-100 hover:bg-emerald-200 text-emerald-600 rounded-2xl font-black text-5xl active:scale-90 transition-transform shadow-sm">+</button>
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="cerrarProduccion()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 p-5 rounded-2xl font-bold text-xl transition-all">Cancelar</button>
                <button onclick="enviarProduccion()" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white p-5 rounded-2xl font-black text-2xl transition-all shadow-lg active:scale-95">Guardar STOCK</button>
            </div>
        </div>
    </div>

    <!-- Script Cocina -->
    <script>
        const API_URL = "http://" + window.location.host + "/api";
        let productosCache = [];

        async function cargarPedidos() {
            try {
                // Solo PENDIENTE y EN_PREPARACION
                const [resPend, resPrep] = await Promise.all([
                    fetch(`${API_URL}/pedidos?estado=PENDIENTE`),
                    fetch(`${API_URL}/pedidos?estado=EN_PREPARACION`)
                ]);
                const pendientes = await resPend.json();
                const en_preparacion = await resPrep.json();
                
                const todos = [...pendientes, ...en_preparacion].sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
                
                const container = document.getElementById('pedidos-container');
                
                if(todos.length === 0) {
                    container.innerHTML = `<div class="text-gray-500 font-bold text-3xl mt-20 ml-20 flex items-center gap-4"><span>👍</span> Sin comandas pendientes. ¡Buen trabajo!</div>`;
                    return;
                }

                let html = '';
                // Cargar items paralelos (En prod real optimizariamos la API para devolver los items ya embebidos)
                for (let ped of todos) {
                    const r = await fetch(`${API_URL}/pedidos/${ped.id}/items`);
                    ped.items = await r.json();
                    
                    const esPrep = ped.estado === 'EN_PREPARACION';
                    const colorHeader = esPrep ? 'bg-orange-500' : 'bg-blue-600';
                    const colorBg = esPrep ? 'bg-orange-50' : 'bg-gray-50';
                    const bordeExt = esPrep ? 'border-orange-500 scale-100' : 'border-transparent opacity-90 scale-95';
                    const textoEstado = esPrep ? '⏳ EN PREPARACIÓN' : '🆕 NUEVO';
                    
                    let itemsHtml = ped.items.map(i => `
                        <div class="flex justify-between items-center py-4 border-b-2 border-gray-200 last:border-0 text-gray-800">
                            <span class="font-black text-3xl"><span class="text-emerald-600">${i.cantidad}</span> x <span class="font-bold text-2xl inline-block ml-2">${i.nombre}</span></span>
                        </div>
                    `).join('');

                    let botonHtml = esPrep ? 
                        `<button onclick="cambiarEstado(${ped.id}, 'LISTO')" class="w-full p-6 rounded-2xl font-black text-3xl shadow-xl active:scale-95 transition-all bg-emerald-500 hover:bg-emerald-600 text-white border-b-4 border-emerald-700">✅ ESTÁ LISTO</button>` :
                        `<button onclick="cambiarEstado(${ped.id}, 'EN_PREPARACION')" class="w-full p-6 rounded-2xl font-black text-3xl shadow-xl active:scale-95 transition-all bg-orange-500 hover:bg-orange-600 text-white border-b-4 border-orange-700">👨‍🍳 EMPEZAR</button>`;

                    const timeStr = new Date(ped.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    let trackingHtml = '';
                    if (ped.tipo_entrega === 'DOMICILIO' || ped.tipo_entrega === 'RECOGIDA') {
                        let trackingEmoji = ped.tipo_entrega === 'DOMICILIO' ? '🚴' : '🚶';
                        let tipoTexto = ped.tipo_entrega === 'DOMICILIO' ? 'Motorista' : 'Cliente';
                        let trackingText = "Sin ubicación GPS";
                        if (ped.distancia_metros !== null && ped.distancia_metros !== undefined) {
                            if (ped.distancia_metros < 50) {
                                trackingText = "¡Está llegando/AQUÍ!";
                            } else {
                                trackingText = `A ${ped.distancia_metros} metros`;
                            }
                        }
                        trackingHtml = `
                            <div class="bg-indigo-100 border-b border-indigo-200 text-indigo-900 p-3 font-black flex justify-between items-center text-lg">
                                <span>${trackingEmoji} ${tipoTexto}:</span>
                                <span class="bg-indigo-600 text-white px-3 py-1 rounded-xl text-md ${ped.distancia_metros !== null ? 'animate-pulse' : ''}">${trackingText}</span>
                            </div>
                        `;
                    }

                    html += `
                        <div class="flex-none w-[450px] flex flex-col h-full bg-white rounded-3xl overflow-hidden shadow-2xl border-8 ${bordeExt} transition-all">
                            <div class="${colorHeader} text-white p-5 flex justify-between items-center shadow-md z-10">
                                <span class="font-black text-4xl">${ped.numero_ticket}</span>
                                <span class="font-bold bg-black/20 px-4 py-2 rounded-xl text-xl">${timeStr}</span>
                            </div>
                            <div class="bg-gray-200 text-gray-600 text-center font-black py-2 text-sm uppercase tracking-widest">
                                ${textoEstado}
                            </div>
                            ${trackingHtml}
                            <div class="flex-1 overflow-y-auto p-5 ${colorBg}">
                                ${itemsHtml}
                            </div>
                            <div class="p-5 bg-white border-t border-gray-100">
                                ${botonHtml}
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch(e) {
                console.error(e);
            }
        }

        async function cambiarEstado(pedId, nuevoEstado) {
            await fetch(`${API_URL}/pedidos/${pedId}/estado?estado=${nuevoEstado}`, { method: 'POST' });
            cargarPedidos();
        }

        // --- Produccion Manual ---
        async function cargarProductosCache() {
            if(productosCache.length === 0) {
                const res = await fetch(`${API_URL}/productos`);
                productosCache = await res.json();
            }
        }

        function cambiarCant(d) {
            const input = document.getElementById('prod-cantidad');
            let v = parseInt(input.value) + d;
            if(v < 1) v = 1;
            input.value = v;
        }

        async function abrirProduccion() {
            await cargarProductosCache();
            const select = document.getElementById('prod-select');
            select.innerHTML = productosCache.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
            document.getElementById('prod-cantidad').value = 1;
            document.getElementById('modal-produccion').classList.remove('hidden');
        }

        function cerrarProduccion() {
            document.getElementById('modal-produccion').classList.add('hidden');
        }

        async function enviarProduccion() {
            const pId = document.getElementById('prod-select').value;
            const cant = document.getElementById('prod-cantidad').value;
            
            const prodNombre = productosCache.find(x => x.id == pId)?.nombre;
            
            const payload = {
                producto_id: parseInt(pId),
                cantidad: parseInt(cant),
                descripcion: `Cocina: ${cant} x ${prodNombre}`
            };

            await fetch(`${API_URL}/produccion`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            cerrarProduccion();
            
            // Show toast success
            const toast = document.createElement('div');
            toast.className = "fixed top-10 right-10 bg-emerald-500 text-white px-8 py-4 rounded-2xl shadow-2xl font-black text-2xl z-50 animate-bounce";
            toast.innerText = `✅ ¡Stock actualizado! +${cant} ${prodNombre}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Cargar comandas al inicio y luego cada 5 segundos
        cargarPedidos();
        setInterval(cargarPedidos, 5000);

    </script>
</body>
</html>
