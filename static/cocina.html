<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS | Carbones y Pollos</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --primary: #ffeb3b; /* Amarillo para máxima visibilidad */
            --accent: #ff5722;
            --success: #4caf50;
            --border: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; height: 100vh; display: flex; flex-direction: column; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-bottom: 15px; border-bottom: 2px solid var(--border); margin-bottom: 20px;
        }
        .timer { font-size: 1.5rem; font-weight: 700; color: var(--primary); }

        /* Grid de Pedidos */
        .kds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .kds-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            animation: slideIn 0.3s ease;
        }
        .kds-card.priority { border-color: var(--accent); }

        .card-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
        }
        .ticket-num { font-size: 1.4rem; font-weight: 700; color: var(--primary); }
        .elapsed { font-size: 0.9rem; font-weight: 700; }

        .card-body { padding: 15px; flex: 1; }
        .order-item {
            font-size: 1.3rem;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 5px;
        }
        .qty { color: var(--primary); font-weight: 700; margin-right: 10px; }

        .card-footer { padding: 10px; }
        .done-btn {
            width: 100%;
            padding: 15px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }
        .done-btn:active { transform: scale(0.98); background: #388e3c; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Efecto urgente */
        .urgent { animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { box-shadow: 0 0 5px var(--accent); } to { box-shadow: 0 0 20px var(--accent); } }
    </style>
</head>
<body>
    <header>
        <h1>CONTROL DE COCINA</h1>
        <div class="timer" id="clock">00:00:00</div>
        <div style="display:flex; gap: 20px; align-items:center;">
            <span><i class="fas fa-circle" style="color:var(--success)"></i> ONLINE</span>
            <button style="background:none; border:1px solid #555; color:white; padding:5px 10px; border-radius:5px;">LOGOUT</button>
        </div>
    </header>

    <div class="kds-grid" id="kdsGrid">
        <!-- Ejemplo de Pedido -->
        <div class="kds-card urgent">
            <div class="card-header">
                <span class="ticket-num">#T-48</span>
                <span class="elapsed">14:22 MIN</span>
            </div>
            <div class="card-body">
                <div class="order-item">
                    <span><span class="qty">2</span> POLLO ENTERO</span>
                </div>
                <div class="order-item">
                    <span><span class="qty">1</span> PATATAS RACIÓN</span>
                </div>
                <div class="order-item" style="color:var(--accent); font-size: 1rem;">
                    <i class="fas fa-sticky-note"></i> "Sin mucha sal las patatas"
                </div>
            </div>
            <div class="card-footer">
                <button class="done-btn">COMPLETAR</button>
            </div>
        </div>

        <div class="kds-card">
            <div class="card-header">
                <span class="ticket-num">#T-49</span>
                <span class="elapsed">03:15 MIN</span>
            </div>
            <div class="card-body">
                <div class="order-item">
                    <span><span class="qty">1</span> MEDIO POLLO</span>
                </div>
                <div class="order-item">
                    <span><span class="qty">2</span> CERVEZA ESPECIAL</span>
                </div>
            </div>
            <div class="card-footer">
                <button class="done-btn">COMPLETAR</button>
            </div>
        </div>
    </div>

    <script>
        // Reloj en tiempo real
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Aquí iría el polling a /api/orders?estado=EN_PREPARACION
    </script>
</body>
</html>
