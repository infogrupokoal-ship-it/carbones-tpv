<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS | Carbones y Pollos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Design System -->
    <link rel="stylesheet" href="/static/css/design_system.css">
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --primary: #f59e0b;
            --urgent: #ef4444;
        }
        body { background: var(--bg); }
        .kds-card {
            background: var(--card-bg);
            border: 2px solid #1e293b;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }
        .kds-card.urgent { border-color: var(--urgent); box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
        .kds-card.waiting { border-color: var(--primary); }
    </style>
</head>
<body class="p-4 h-screen flex flex-col text-white overflow-hidden">
    
    <!-- Navbar KDS -->
    <header class="flex justify-between items-center mb-6 bg-slate-900/50 p-6 rounded-3xl border border-white/5 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <span class="text-4xl">👨‍🍳</span>
            <div>
                <h1 class="text-2xl font-black leading-tight tracking-tighter">MONITOR DE COCINA</h1>
                <p class="text-xs font-bold text-slate-400 tracking-widest uppercase">Sistema de Producción v4.1</p>
            </div>
        </div>
        <div class="text-right">
            <div class="text-3xl font-black text-yellow-400 font-mono" id="clock">00:00:00</div>
            <div class="flex items-center justify-end gap-2 text-[10px] font-bold text-emerald-400">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                SISTEMA OPERATIVO
            </div>
        </div>
    </header>

    <!-- Orders Grid -->
    <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 flex-1 overflow-y-auto pb-10" id="kds-grid">
        <!-- Loader / No Orders -->
        <div class="col-span-full py-20 text-center glass-panel">
            <h3 class="text-2xl font-black text-slate-500">Sincronizando comanda...</h3>
        </div>
    </main>

    <script>
        const API_URL = "/api";

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('es-ES', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchOrders() {
            try {
                const res = await fetch(`${API_URL}/orders/?estado=EN_PREPARACION`);
                const orders = await res.json();
                renderOrders(orders);
            } catch (e) {
                console.error("KDS Error:", e);
            }
        }

        function renderOrders(orders) {
            const grid = document.getElementById('kds-grid');
            if(!orders || orders.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-40 text-center flex flex-col items-center">
                        <span class="text-8xl mb-6 opacity-20">🔥</span>
                        <h3 class="text-3xl font-black text-slate-600">COCINA DESPEJADA</h3>
                        <p class="text-slate-500 mt-2 font-medium">No hay pedidos pendientes de preparación.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = orders.map(order => {
                const mins = Math.floor((new Date() - new Date(order.fecha)) / 60000);
                const isUrgent = mins > 15;
                
                return `
                    <div class="kds-card ${isUrgent ? 'urgent' : 'waiting'} animate-in">
                        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                            <div>
                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">TICKET</p>
                                <p class="text-3xl font-black text-white">#${order.numero_ticket || order.id.slice(0,4)}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-black ${isUrgent ? 'text-red-400' : 'text-yellow-400'} uppercase tracking-widest">TIEMPO</p>
                                <p class="text-2xl font-black ${isUrgent ? 'text-red-400' : 'text-white'}">${mins}m</p>
                            </div>
                        </div>
                        <div class="p-6 flex-1">
                            <ul class="space-y-4">
                                ${order.items.map(i => `
                                    <li class="flex items-start gap-4">
                                        <span class="bg-slate-800 text-yellow-400 font-black px-3 py-1 rounded-lg text-xl">${i.cantidad}</span>
                                        <div class="flex-1">
                                            <p class="text-xl font-bold leading-tight">${i.nombre.toUpperCase()}</p>
                                            ${i.notas ? `<p class="text-sm text-yellow-500/80 italic mt-1 font-medium">⚠️ ${i.notas}</p>` : ''}
                                        </div>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        <div class="p-6 pt-0">
                            <button onclick="completarPedido('${order.id}')" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl text-xl shadow-lg shadow-emerald-900/20 active:scale-95 transition-all">
                                COMPLETADO
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function completarPedido(orderId) {
            try {
                await fetch(`${API_URL}/orders/${orderId}/estado?estado=LISTO`, { method: 'PUT' });
                fetchOrders();
            } catch (e) {
                alert("Error al completar");
            }
        }

        setInterval(fetchOrders, 5000);
        fetchOrders();
    </script>
</body>
</html>
