<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Portal | Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/enterprise_shell.css">
    <style>
        body { background: #050508; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050508 100%); }
        .node-sphere { 
            width: 400px; height: 400px; 
            background: radial-gradient(circle, rgba(79, 70, 229, 0.2) 0%, transparent 70%);
            filter: blur(40px);
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 4s infinite alternate;
        }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.8; } }
        .module-card { 
            backdrop-filter: blur(20px); 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .module-card:hover { 
            background: rgba(255, 255, 255, 0.05); 
            border-color: #4f46e5;
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 30px 60px -20px rgba(79, 70, 229, 0.3);
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center hero-gradient">
    <div class="node-sphere"></div>
    
    <div id="shell-root"></div>

    <div class="z-10 text-center mb-16 animate-in">
        <p class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.5em] mb-4">Enterprise Singularity V9.0</p>
        <h1 class="text-8xl font-black tracking-tighter uppercase mb-4">Quantum <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500">Portal</span></h1>
        <div class="flex items-center justify-center gap-6">
            <span class="flex items-center gap-2 text-[9px] font-black text-slate-500 uppercase tracking-widest"><i class="fa-solid fa-circle text-[6px] text-emerald-500 animate-pulse"></i> Systems Operational</span>
            <span class="w-1 h-1 bg-white/10 rounded-full"></span>
            <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Global Sync Active</span>
        </div>
    </div>

    <div class="z-10 grid grid-cols-2 md:grid-cols-4 gap-8 max-w-6xl w-full px-8 animate-in" style="animation-delay: 0.2s">
        <a href="/static/analytics.html" class="module-card p-10 rounded-[3rem] text-center group">
            <div class="w-16 h-16 bg-indigo-500/10 rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto group-hover:scale-110 transition-all">📈</div>
            <h3 class="text-sm font-black uppercase tracking-widest mb-2">Analytics</h3>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">Business Intelligence</p>
        </a>
        <a href="/static/caja.html" class="module-card p-10 rounded-[3rem] text-center group">
            <div class="w-16 h-16 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto group-hover:scale-110 transition-all">💰</div>
            <h3 class="text-sm font-black uppercase tracking-widest mb-2">TPV/Caja</h3>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">Operaciones Retail</p>
        </a>
        <a href="/static/kds.html" class="module-card p-10 rounded-[3rem] text-center group">
            <div class="w-16 h-16 bg-orange-500/10 rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto group-hover:scale-110 transition-all">🍳</div>
            <h3 class="text-sm font-black uppercase tracking-widest mb-2">Kitchen</h3>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">Control de Cocina</p>
        </a>
        <a href="/static/matrix.html" class="module-card p-10 rounded-[3rem] text-center group">
            <div class="w-16 h-16 bg-purple-500/10 rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto group-hover:scale-110 transition-all">🌌</div>
            <h3 class="text-sm font-black uppercase tracking-widest mb-2">Matrix</h3>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">Control Neural</p>
        </a>
    </div>

    <div class="fixed bottom-12 z-10 flex gap-4 animate-in" style="animation-delay: 0.4s">
        <button onclick="EnterpriseShell.toggleCommandPalette()" class="px-8 py-4 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition-all">
            <i class="fa-solid fa-search mr-2"></i> Abrir Consola (Ctrl + K)
        </button>
        <button onclick="location.href='/static/kiosko.html'" class="px-8 py-4 bg-indigo-600 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl shadow-indigo-500/20 hover:scale-105 active:scale-95 transition-all">
            Ver Kiosko B2C <i class="fa-solid fa-arrow-right ml-2"></i>
        </button>
    </div>

    <script src="/static/js/enterprise_shell.js"></script>
    <script>
        window.onload = () => {
            EnterpriseShell.init('Portal');
        };
    </script>
</body>
</html>
