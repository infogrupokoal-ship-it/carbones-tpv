<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking | Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap">
    <style>
        :root {
            --primary: #4f46e5;
            --bg-base: #f8fafc;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-base); 
            color: #1e293b;
            margin: 0;
        }
        .glass-panel {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }
        .progress-bar { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .bg-grid {
            position: fixed;
            inset: 0;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.01) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.01) 1px, transparent 1px);
            z-index: -1;
        }
        .status-dot { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="bg-grid"></div>

    <div id="module-telemetry" class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-16"></div>
<main class="w-full max-w-lg mx-auto">
        <div id="loading" class="text-center animate-pulse py-20">
            <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Sincronizando Orden...</p>
        </div>

        <div id="tracking-content" class="hidden opacity-0 transform translate-y-4 transition-all duration-700">
            <div class="glass-panel rounded-[3rem] p-10 text-center relative overflow-hidden bg-white/80 backdrop-blur-xl">
                <div class="flex justify-between items-center mb-10">
                    <div class="text-left">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Orden Localizada</p>
                        <h2 id="ticket-number" class="text-5xl font-black text-slate-900 tracking-tighter">#--</h2>
                    </div>
                    <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-3xl">📦</div>
                </div>

                <!-- Progress Visual -->
                <div class="relative mb-12 px-2">
                    <div class="overflow-hidden h-2.5 mb-6 flex rounded-full bg-slate-100 p-0.5 shadow-inner">
                        <div id="progress-bar" style="width: 0%" class="progress-bar rounded-full bg-indigo-600 shadow-[0_0_15px_rgba(79,70,229,0.3)]"></div>
                    </div>
                    
                    <div class="flex justify-between">
                        <div class="flex flex-col items-center gap-2 group">
                            <div id="dot-nuevo" class="status-dot w-3 h-3 rounded-full bg-slate-200"></div>
                            <span class="text-[8px] font-black uppercase tracking-widest text-slate-400">Recibido</span>
                        </div>
                        <div class="flex flex-col items-center gap-2">
                            <div id="dot-prep" class="status-dot w-3 h-3 rounded-full bg-slate-200"></div>
                            <span class="text-[8px] font-black uppercase tracking-widest text-slate-400">Cocina</span>
                        </div>
                        <div class="flex flex-col items-center gap-2">
                            <div id="dot-listo" class="status-dot w-3 h-3 rounded-full bg-slate-200"></div>
                            <span class="text-[8px] font-black uppercase tracking-widest text-slate-400">Listo</span>
                        </div>
                        <div class="flex flex-col items-center gap-2">
                            <div id="dot-comp" class="status-dot w-3 h-3 rounded-full bg-slate-200"></div>
                            <span class="text-[8px] font-black uppercase tracking-widest text-slate-400">Finalizado</span>
                        </div>
                    </div>
                </div>

                <div id="status-card" class="bg-indigo-50/50 border border-indigo-100 rounded-[2rem] p-8 mb-8 transition-all duration-500">
                    <h3 id="status-title" class="text-xl font-black text-slate-900 uppercase tracking-tight mb-2">Procesando...</h3>
                    <p id="status-message" class="text-xs font-medium text-slate-600 leading-relaxed">Estamos verificando el estado de tu pedido en tiempo real.</p>
                </div>

                <div id="delivery-info" class="hidden text-left p-6 bg-slate-50 rounded-2xl border border-slate-100 mb-8">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> Dirección de Envío
                    </p>
                    <p id="delivery-address" class="text-sm font-bold text-slate-800 leading-tight">--</p>
                </div>

                <button onclick="window.location.href='/static/kiosko.html'" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl transition-all active:scale-95">Realizar nuevo pedido</button>
            </div>

            <div class="mt-8 text-center">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Carbones y Pollos Enterprise Hub</p>
            </div>
        </div>

        <div id="error-screen" class="hidden text-center py-20">
            <div class="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-8 text-4xl">🤷‍♂️</div>
            <h2 class="text-3xl font-black text-slate-900 uppercase tracking-tighter mb-3">Orden Extraviada</h2>
            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-10">No hemos podido localizar este ticket.</p>
            <button onclick="window.location.href='/static/kiosko.html'" class="bg-indigo-600 text-white px-10 py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-100">Volver al Kiosko</button>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pedidoId = urlParams.get('pedido') || urlParams.get('ticket');

        if (!pedidoId) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-screen').classList.remove('hidden');
        } else {
            pollOrder();
            setInterval(pollOrder, 10000);
        }

        async function pollOrder() {
            try {
                const res = await fetch(`/api/orders/?limit=100`);
                if(!res.ok) throw new Error("Network error");
                const orders = await res.json();
                
                const order = orders.find(o => o.numero_ticket === pedidoId || o.id === pedidoId);
                
                document.getElementById('loading').classList.add('hidden');

                if (order) {
                    const content = document.getElementById('tracking-content');
                    content.classList.remove('hidden');
                    setTimeout(() => {
                        content.classList.remove('opacity-0', 'translate-y-4');
                    }, 50);
                    
                    document.getElementById('ticket-number').innerText = '#' + order.numero_ticket;
                    updateStatusUI(order.estado);

                    if (order.metodo_envio === 'DOMICILIO') {
                        document.getElementById('delivery-info').classList.remove('hidden');
                        document.getElementById('delivery-address').innerText = order.direccion || 'Domicilio en proceso...';
                    }
                } else {
                    document.getElementById('error-screen').classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
            }
        }

        function updateStatusUI(estado) {
            const bar = document.getElementById('progress-bar');
            const title = document.getElementById('status-title');
            const msg = document.getElementById('status-message');
            
            // Reset status dots
            ['nuevo', 'prep', 'listo', 'comp'].forEach(id => {
                document.getElementById('dot-' + id).className = "status-dot w-3 h-3 rounded-full bg-slate-200";
            });

            const activate = (id, color) => {
                const dot = document.getElementById('dot-' + id);
                dot.className = `status-dot w-4 h-4 rounded-full ${color} ring-4 ring-white shadow-sm`;
            };

            if (estado === 'NUEVO' || estado === 'ESPERANDO_PAGO') {
                bar.style.width = '15%';
                title.innerText = "¡Orden Recibida!";
                msg.innerText = "Tu pedido ha sido registrado con éxito. Entrará a cocina en unos instantes.";
                activate('nuevo', 'bg-indigo-600');
            } else if (estado === 'EN_PREPARACION') {
                bar.style.width = '45%';
                title.innerText = "En los Fogones";
                msg.innerText = "Nuestros chefs están preparando tu pedido con carbón de encina seleccionado.";
                activate('nuevo', 'bg-indigo-600');
                activate('prep', 'bg-indigo-600');
            } else if (estado === 'LISTO') {
                bar.style.width = '80%';
                title.innerText = "¡Todo Listo!";
                title.classList.add('text-indigo-600');
                msg.innerText = "Tu pedido está listo para ser recogido o entregado. ¡Ya casi está!";
                activate('nuevo', 'bg-indigo-600');
                activate('prep', 'bg-indigo-600');
                activate('listo', 'bg-indigo-600');
            } else if (estado === 'COMPLETADO') {
                bar.style.width = '100%';
                bar.className = "progress-bar rounded-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.3)]";
                title.innerText = "¡Disfrútalo!";
                title.className = "text-xl font-black text-emerald-600 uppercase tracking-tight mb-2";
                msg.innerText = "La orden ha sido finalizada con éxito. ¡Gracias por confiar en nosotros!";
                ['nuevo', 'prep', 'listo', 'comp'].forEach(id => activate(id, 'bg-emerald-500'));
            } else if (estado === 'CANCELADO') {
                bar.style.width = '100%';
                bar.className = "progress-bar rounded-full bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.3)]";
                title.innerText = "Orden Cancelada";
                title.className = "text-xl font-black text-red-600 uppercase tracking-tight mb-2";
                msg.innerText = "Este pedido ha sido anulado. Contacta con nosotros si tienes dudas.";
            }
        }
    </script>

    <script>
        window.addEventListener('load', () => {
            if (typeof EnterpriseUI !== 'undefined') {
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Estado del Nodo',
                    value: 'ACTIVO',
                    unit: 'SECURE',
                    trend: 'up',
                    trendValue: '100%',
                    icon: 'fa-server'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Carga de Trabajo',
                    value: Math.floor(Math.random() * 40 + 20),
                    unit: '%',
                    trend: 'up',
                    trendValue: 'LOW',
                    icon: 'fa-microchip'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Latencia Sync',
                    value: Math.floor(Math.random() * 50 + 10),
                    unit: 'ms',
                    trend: 'down',
                    trendValue: 'OPTIMAL',
                    icon: 'fa-bolt'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Seguridad',
                    value: 'V4.0',
                    unit: 'SSL',
                    trend: 'up',
                    trendValue: 'MAX',
                    icon: 'fa-shield-halved'
                });
            }
        });
    </script>
            
</body>
</html>
