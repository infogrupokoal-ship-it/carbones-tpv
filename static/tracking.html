<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking - Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        amber: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' },
                        slate: { 800: '#1e293b', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; }
        .progress-bar { transition: width 1s ease-in-out; }
    </style>
</head>
<body class="font-sans antialiased text-slate-800 flex flex-col min-h-screen">
    <header class="bg-slate-900 text-white p-4 shadow-md text-center sticky top-0 z-50">
        <h1 class="text-xl font-black uppercase tracking-widest"><span class="text-amber-500">🔥</span> Carbones <span class="text-amber-500">Tracker</span></h1>
    </header>

    <main class="flex-1 p-6 flex flex-col items-center justify-center max-w-lg mx-auto w-full">
        
        <div id="loading" class="text-center animate-pulse">
            <div class="w-16 h-16 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-sm">Buscando Pedido...</p>
        </div>

        <div id="tracking-content" class="w-full hidden opacity-0 transition-opacity duration-500">
            <div class="bg-white rounded-[2rem] shadow-xl p-8 text-center border border-slate-100 relative overflow-hidden">
                <div class="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-amber-400 to-amber-600"></div>
                
                <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Ticket #</p>
                <h2 id="ticket-number" class="text-4xl font-black text-slate-900 mb-8 tracking-tighter">--</h2>

                <!-- Barra de Progreso -->
                <div class="relative pt-1 mb-12">
                    <div class="flex justify-between mb-2">
                        <div class="text-center w-1/4">
                            <div id="icon-nuevo" class="w-10 h-10 mx-auto rounded-full bg-slate-200 flex items-center justify-center text-xl transition-colors duration-500 mb-2 shadow-sm">🧾</div>
                            <span class="text-[10px] font-black uppercase tracking-tighter text-slate-500 block">Recibido</span>
                        </div>
                        <div class="text-center w-1/4">
                            <div id="icon-prep" class="w-10 h-10 mx-auto rounded-full bg-slate-200 flex items-center justify-center text-xl transition-colors duration-500 mb-2 shadow-sm">👨‍🍳</div>
                            <span class="text-[10px] font-black uppercase tracking-tighter text-slate-500 block">Cocina</span>
                        </div>
                        <div class="text-center w-1/4">
                            <div id="icon-listo" class="w-10 h-10 mx-auto rounded-full bg-slate-200 flex items-center justify-center text-xl transition-colors duration-500 mb-2 shadow-sm">🛍️</div>
                            <span class="text-[10px] font-black uppercase tracking-tighter text-slate-500 block">Listo</span>
                        </div>
                        <div class="text-center w-1/4">
                            <div id="icon-comp" class="w-10 h-10 mx-auto rounded-full bg-slate-200 flex items-center justify-center text-xl transition-colors duration-500 mb-2 shadow-sm">✅</div>
                            <span class="text-[10px] font-black uppercase tracking-tighter text-slate-500 block">Entregado</span>
                        </div>
                    </div>
                    
                    <div class="overflow-hidden h-2 mb-4 text-xs flex rounded-full bg-slate-100 mx-4">
                        <div id="progress-bar" style="width: 0%" class="progress-bar shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-amber-500"></div>
                    </div>
                </div>

                <div class="bg-amber-50 border border-amber-100 rounded-2xl p-4">
                    <p id="status-message" class="text-amber-800 font-bold text-sm">Cargando estado actual...</p>
                </div>
            </div>

            <div class="mt-8 text-center">
                <button onclick="window.location.href='/static/kiosko.html'" class="text-slate-500 hover:text-slate-900 font-bold text-xs uppercase tracking-widest underline transition-colors">Volver al Kiosko</button>
            </div>
        </div>

        <div id="error-screen" class="hidden text-center">
            <div class="text-5xl mb-4">🤷‍♂️</div>
            <h2 class="text-xl font-black text-slate-900 uppercase tracking-tighter mb-2">Pedido no encontrado</h2>
            <p class="text-slate-500 text-sm mb-6">Asegúrate de que el número de ticket es correcto.</p>
            <button onclick="window.location.href='/static/kiosko.html'" class="bg-slate-900 text-white px-6 py-3 rounded-full font-black text-xs uppercase tracking-widest shadow-md">Volver al Kiosko</button>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        // Soporte tanto para ?pedido=UUID (nuevo) como ?ticket=NUMERO (antiguo)
        const pedidoId = urlParams.get('pedido') || urlParams.get('ticket');

        if (!pedidoId) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-screen').classList.remove('hidden');
        } else {
            // Asumimos que se pasó UUID si la longitud es grande, si no, es ticket number
            document.getElementById('ticket-number').innerText = pedidoId.length > 10 ? 'Consultando...' : pedidoId;
            pollOrder();
            setInterval(pollOrder, 5000);
        }

        async function pollOrder() {
            try {
                // Buscamos el pedido en los recientes
                const res = await fetch(`/api/orders/?limit=100`);
                if(!res.ok) throw new Error("Fallo en la red");
                const orders = await res.json();
                
                const order = orders.find(o => o.numero_ticket === pedidoId || o.id === pedidoId);
                
                document.getElementById('loading').classList.add('hidden');

                if (order) {
                    const content = document.getElementById('tracking-content');
                    content.classList.remove('hidden');
                    // Forzamos reflow para transición
                    void content.offsetWidth;
                    content.classList.remove('opacity-0');
                    
                    document.getElementById('ticket-number').innerText = order.numero_ticket;
                    updateStatusUI(order.estado);
                } else {
                    document.getElementById('error-screen').classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
            }
        }

        function updateStatusUI(estado) {
            const bar = document.getElementById('progress-bar');
            const msg = document.getElementById('status-message');
            
            // Reset icons
            ['nuevo', 'prep', 'listo', 'comp'].forEach(id => {
                document.getElementById('icon-' + id).className = "w-10 h-10 mx-auto rounded-full bg-slate-200 flex items-center justify-center text-xl transition-colors duration-500 mb-2 shadow-sm opacity-50 grayscale";
            });

            // Activar iconos
            const activate = (id, colorClass) => {
                const el = document.getElementById('icon-' + id);
                el.className = `w-12 h-12 mx-auto rounded-full ${colorClass} text-white flex items-center justify-center text-2xl transition-all duration-500 mb-1 shadow-lg transform scale-110`;
            };

            if (estado === 'NUEVO' || estado === 'ESPERANDO_PAGO') {
                bar.style.width = '15%';
                msg.innerText = "¡Hemos recibido tu pedido! En breve entra a cocina.";
                activate('nuevo', 'bg-blue-500');
            } else if (estado === 'EN_PREPARACION') {
                bar.style.width = '50%';
                msg.innerText = "Nuestros cocineros están preparando tu pedido con amor 🍗🔥";
                activate('nuevo', 'bg-amber-500');
                activate('prep', 'bg-amber-500');
            } else if (estado === 'LISTO') {
                bar.style.width = '80%';
                msg.innerHTML = "¡TU PEDIDO ESTÁ LISTO!<br><span class='text-xs font-normal'>Acércate a mostrador para recogerlo o espera al repartidor.</span>";
                activate('nuevo', 'bg-amber-500');
                activate('prep', 'bg-amber-500');
                activate('listo', 'bg-green-500');
            } else if (estado === 'COMPLETADO') {
                bar.style.width = '100%';
                msg.innerText = "Pedido entregado. ¡Que aproveche!";
                activate('nuevo', 'bg-green-500');
                activate('prep', 'bg-green-500');
                activate('listo', 'bg-green-500');
                activate('comp', 'bg-green-500');
            } else if (estado === 'CANCELADO') {
                bar.style.width = '100%';
                bar.classList.replace('bg-amber-500', 'bg-red-500');
                msg.innerText = "El pedido ha sido cancelado.";
            }
        }

        // --- Telemetría GPS (Rider/Client Tracking) ---
        function startTelemetry() {
            if (!navigator.geolocation) return;
            
            // Intentamos obtener la ubicación cada 15 segundos si está permitido
            setInterval(() => {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    
                    // Cálculo de distancia dummy o real si tuviéramos lat/lon del local
                    // Asumimos distancia dummy para el payload
                    try {
                        await fetch(`/api/orders/${pedidoId}/ubicacion`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ lat, lon, distancia_metros: Math.floor(Math.random() * 1000) })
                        });
                    } catch(e) { /* silent fail for telemetry */ }
                }, (err) => {
                    // console.warn("Telemetría deshabilitada o denegada");
                }, { enableHighAccuracy: true });
            }, 15000);
        }

        // Iniciar telemetría si se pasó el UUID largo
        if(pedidoId && pedidoId.length > 10) {
            setTimeout(startTelemetry, 3000);
        }
    </script>
</body>
</html>
