<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Live Tracking | Carbones y Pollos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Design System -->
    <link rel="stylesheet" href="/static/css/design_system.css">
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-8 overflow-hidden bg-slate-900">
    
    <div class="fixed inset-0 pointer-events-none overflow-hidden opacity-30">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-amber-500/20 blur-[120px] rounded-full"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-orange-600/20 blur-[120px] rounded-full"></div>
    </div>

    <div class="glass-panel w-full max-w-md p-10 text-center animate-in">
        <div class="relative inline-block mb-8">
            <div class="absolute inset-0 bg-amber-500/20 blur-2xl rounded-full animate-pulse"></div>
            <div class="relative bg-white/5 border border-amber-500/30 shadow-[0_0_20px_rgba(245,158,11,0.2)] p-8 rounded-full text-6xl" id="emoji-status">
                📍
            </div>
        </div>

        <h1 class="text-4xl font-black text-white tracking-tighter mb-4">EN <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-600">TRÁNSITO</span></h1>
        <p class="text-slate-400 font-medium text-lg mb-10 leading-relaxed">Compartir tu ubicación ayuda a que cocina prepare tu pedido en el momento justo.</p>
        
        <div class="bg-white/5 p-6 rounded-3xl border border-white/10 mb-10 hidden" id="status-panel">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Señal GPS Activa</p>
            <h2 class="text-2xl font-black text-emerald-400" id="status-text">CONECTANDO...</h2>
        </div>

        <button id="btn-start" onclick="iniciarTracking()" class="w-full bg-amber-500 text-slate-900 font-black py-6 rounded-2xl text-xl shadow-[0_0_20px_rgba(245,158,11,0.3)] hover:scale-[1.02] transition-transform active:scale-95 uppercase tracking-widest">
            COMPARTIR UBICACIÓN
        </button>
        
        <button id="btn-stop" onclick="detenerTracking()" class="w-full mt-6 py-4 rounded-2xl bg-white/5 border border-white/10 text-slate-400 font-black text-xs uppercase tracking-widest hidden">
            DETENER TRANSMISIÓN
        </button>

        <div class="mt-12 pt-8 border-t border-white/5">
            <p class="text-[10px] font-bold text-slate-600 uppercase tracking-[0.2em]">Carbones y Pollos Enterprise Logística</p>
        </div>
    </div>

    <script>
        const API_URL = "/api";
        const urlParams = new URLSearchParams(window.location.search);
        const pedidoId = urlParams.get('pedido');
        let watchId = null;

        // Tienda Coords
        const TIENDA_LAT = 39.4699; 
        const TIENDA_LON = -0.3763;

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return Math.floor(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))));
        }

        async function enviarUbicacion(lat, lon, dist) {
            if(!pedidoId) return;
            try {
                await fetch(`${API_URL}/orders/${pedidoId}/ubicacion`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat, lon, distancia_metros: dist })
                });
            } catch(e) {}
        }

        function iniciarTracking() {
            if(!pedidoId) { alert("Enlace inválido."); return; }
            
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-stop').classList.remove('hidden');
            document.getElementById('status-panel').classList.remove('hidden');
            document.getElementById('emoji-status').innerText = "🛰️";

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    const dist = calculateDistance(lat, lon, TIENDA_LAT, TIENDA_LON);
                    document.getElementById('status-text').innerText = `${dist}m A TIENDA`;
                    document.getElementById('emoji-status').innerText = "📡";
                    enviarUbicacion(lat, lon, dist);
                },
                (err) => {
                    alert("Por favor, permite el acceso al GPS para continuar.");
                    detenerTracking();
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }

        function detenerTracking() {
            if(watchId) navigator.geolocation.clearWatch(watchId);
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('btn-stop').classList.add('hidden');
            document.getElementById('status-panel').classList.add('hidden');
            document.getElementById('emoji-status').innerText = "📍";
        }
    </script>
</body>
</html>
