<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caja Maestra - Carbones y Pollos</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-gold: #fbbf24;
            --brand-emerald: #10b981;
            --brand-slate: #1e293b;
        }
        body { 
            font-family: 'Inter', sans-serif;
            user-select: none; 
            -webkit-user-select: none; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }
        .heading-font { font-family: 'Outfit', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .ticket-white {
            background: #ffffff;
            border-radius: 2rem;
            color: #1e293b;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: rotate(-1deg);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .ticket-white:hover {
            transform: rotate(0deg) translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .btn-confirm {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }
        .btn-confirm:active { transform: scale(0.95); }
        
        /* ESTILOS DE IMPRESIÓN (RECIBO ESC/POS Y CAJÓN) */
        @media print {
            body * { visibility: hidden; }
            #ticket-impresion, #ticket-impresion * { visibility: visible; }
            #ticket-impresion {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                font-family: 'Courier New', Courier, monospace;
                font-size: 14px;
                color: #000;
                padding: 10px;
                margin: 0;
            }
            .print-only { display: block !important; }
            .no-print { display: none !important; }
        }
        .print-only { display: none; }

        .animate-pop { animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-online { background: #10b981; box-shadow: 0 0 10px #10b981; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col text-white">
    
    <!-- Top Navigation -->
    <nav class="px-6 py-6 flex justify-between items-center bg-black/20 border-b border-white/5 backdrop-blur-xl sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-amber-500 rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-amber-500/20">💰</div>
            <div>
                <h1 class="heading-font text-2xl tracking-tight leading-none uppercase">Caja Maestra</h1>
                <div class="flex items-center mt-1">
                    <span class="status-dot status-online animate-pulse"></span>
                    <span class="text-[10px] font-black text-amber-500 uppercase tracking-widest">Enterprise v4.1 • Live</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="abrirCajaRemota()" class="bg-white/5 hover:bg-white/10 text-white px-5 py-3 rounded-2xl font-bold text-xs border border-white/10 transition-all flex items-center gap-2">
                <span>🔓</span> ABRIR CAJÓN
            </button>
            <button onclick="location.href='index.html'" class="bg-white/10 hover:bg-white/20 text-white px-5 py-3 rounded-2xl font-bold text-xs border border-white/10 transition-all">
                🏠 INICIO
            </button>
        </div>
    </nav>

    <!-- Main Viewport -->
    <main class="flex-1 overflow-y-auto p-6 md:p-12">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-4">
                <div>
                    <h2 class="heading-font text-4xl md:text-5xl text-white">Cola de Cobros</h2>
                    <p class="text-slate-400 mt-2 font-medium">Pedidos pendientes de validación fiscal y cierre de caja.</p>
                </div>
                <div id="stats-summary" class="flex gap-4">
                    <!-- Dynamic stats injected here -->
                </div>
            </div>

            <div id="caja-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10">
                <!-- Skeletons while loading -->
                <div class="glass-card h-80 animate-pulse flex items-center justify-center border-dashed border-white/20">
                    <p class="text-white/20 font-black uppercase tracking-tighter text-xl">Sincronizando...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification System -->
    <div id="toast-container" class="fixed bottom-10 right-10 z-[100] flex flex-col gap-4 no-print"></div>

    <!-- TICKET DE IMPRESIÓN (Oculto en pantalla, visible al imprimir) -->
    <div id="ticket-impresion" class="print-only">
        <!-- El contenido se inyecta dinámicamente -->
    </div>

    <script>
        const API_URL = "/api";
        let lastCount = -1;

        async function init() {
            cargarPedidos();
            setInterval(cargarPedidos, 3000);
        }

        async function cargarPedidos() {
            try {
                const res = await fetch(`${API_URL}/orders/?estado=ESPERANDO_PAGO`);
                const pedidos = await res.json();
                window.pedidosCaja = pedidos; // Guardar estado global para impresión
                
                const container = document.getElementById('caja-container');
                const stats = document.getElementById('stats-summary');
                
                if (pedidos.length !== lastCount) {
                    if (pedidos.length > lastCount && lastCount !== -1) {
                        showToast("🆕 ¡Nuevo pedido recibido!");
                    }
                    lastCount = pedidos.length;
                }

                if(!pedidos || pedidos.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full py-32 text-center glass-card border-dashed border-white/10">
                            <span class="text-8xl mb-6 block opacity-20">📭</span>
                            <h3 class="text-3xl heading-font text-white/40">Bandeja Vacía</h3>
                            <p class="text-white/20 mt-2 font-bold uppercase tracking-widest text-xs">No hay operaciones pendientes de cobro</p>
                        </div>
                    `;
                    stats.innerHTML = '';
                    return;
                }

                stats.innerHTML = `
                    <div class="bg-white/5 border border-white/10 px-6 py-3 rounded-2xl">
                        <span class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Pendientes</span>
                        <span class="text-2xl font-black text-amber-500">${pedidos.length}</span>
                    </div>
                    <div class="bg-white/5 border border-white/10 px-6 py-3 rounded-2xl">
                        <span class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Total Cola</span>
                        <span class="text-2xl font-black text-emerald-400">${pedidos.reduce((acc, p) => acc + p.total, 0).toFixed(2)}€</span>
                    </div>
                `;

                container.innerHTML = '';
                pedidos.forEach((ped, idx) => {
                    const delay = idx * 100;
                    let itemsHtml = ped.items.map(i => `
                        <div class="flex justify-between items-center py-3 border-b border-slate-100/50 group">
                            <div class="flex items-center gap-3">
                                <span class="w-6 h-6 flex items-center justify-center bg-slate-100 rounded-md text-[10px] font-black text-slate-500">${i.cantidad}</span>
                                <span class="font-bold text-slate-800 group-hover:text-amber-600 transition-colors">${i.nombre}</span>
                            </div>
                            <span class="text-slate-400 font-black text-sm">${(i.precio * i.cantidad).toFixed(2)}€</span>
                        </div>
                    `).join('');
                    
                    const card = document.createElement('div');
                    card.className = 'ticket-white animate-pop';
                    card.style.animationDelay = `${delay}ms`;
                    card.innerHTML = `
                        <div class="bg-slate-50 p-6 flex justify-between items-start rounded-t-[2rem] border-b-2 border-dashed border-slate-200">
                            <div>
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Ticket Operativo</span>
                                <h3 class="text-5xl font-black text-slate-900 tracking-tighter">${ped.numero_ticket}</h3>
                            </div>
                            <div class="text-right">
                                <span class="px-3 py-1 rounded-lg bg-amber-500 text-white text-[10px] font-black uppercase tracking-widest">${ped.origen}</span>
                                <p class="text-[10px] font-bold text-slate-400 mt-2">${new Date(ped.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                            </div>
                        </div>
                        <div class="p-8 flex-1 flex flex-col min-h-[300px]">
                            <div class="flex-1 mb-8">
                                ${itemsHtml}
                            </div>
                            
                            ${ped.notas_cliente ? `
                                <div class="mb-8 p-4 bg-amber-50 rounded-2xl border border-amber-100 italic text-sm text-amber-800 flex gap-3 items-start">
                                    <span class="text-lg">💬</span>
                                    "${ped.notas_cliente}"
                                </div>
                            ` : ''}

                            <div class="flex justify-between items-end mb-8">
                                <span class="font-black text-slate-300 text-xs uppercase tracking-widest mb-2">Total Bruto</span>
                                <span class="font-black text-slate-900 text-6xl tracking-tighter leading-none">${ped.total.toFixed(2)}<span class="text-2xl ml-1">€</span></span>
                            </div>

                            <button onclick="cobrarTKT('${ped.id}', '${ped.numero_ticket}')" class="btn-confirm w-full text-white p-6 rounded-[1.5rem] font-black text-xl flex items-center justify-center gap-3 transition-all hover:brightness-110">
                                <span>🤝</span> CONFIRMAR COBRO
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch(e) {
                console.error("Fallo de sincronización:", e);
            }
        }

        async function cobrarTKT(pedId, ticketNum) {
            // Animación de feedback inmediato
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="animate-spin">⏳</span> PROCESANDO...`;
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/orders/${pedId}/cobrar`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ metodo_pago: 'EFECTIVO' })
                });
                
                if(res.ok) {
                    // 1. OBTENER DATOS DEL PEDIDO PARA EL TICKET
                    const pedidoObj = window.pedidosCaja.find(p => p.id == pedId);
                    if (pedidoObj) {
                        const ticketDiv = document.getElementById('ticket-impresion');
                        let itemsHtml = pedidoObj.items.map(item => `<div>${item.cantidad}x ${item.nombre.substring(0,20)} ... ${(item.precio * item.cantidad).toFixed(2)}€</div>`).join('');
                        
                        ticketDiv.innerHTML = `
                            <div style="text-align: center; margin-bottom: 10px;">
                                <h2 style="font-size: 24px; font-weight: bold; margin: 0;">CARBONES Y POLLOS</h2>
                                <p style="margin: 0;">Ticket de Venta</p>
                                <p style="margin: 0;">Fecha: ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString()}</p>
                                <hr style="border-top: 1px dashed black; margin: 10px 0;">
                            </div>
                            <div style="margin-bottom: 10px;">
                                ${itemsHtml}
                            </div>
                            <hr style="border-top: 1px dashed black; margin: 10px 0;">
                            <div style="text-align: right; font-size: 18px; font-weight: bold;">
                                TOTAL: ${pedidoObj.total.toFixed(2)}€
                            </div>
                            <div style="text-align: center; margin-top: 20px;">
                                <h1 style="font-size: 32px; font-weight: bold; margin: 0;">TURNO: ${ticketNum}</h1>
                                <p>¡Gracias por tu compra!</p>
                            </div>
                        `;
                        // 2. DISPARAR IMPRESIÓN (Interceptado por DURAPOS para abrir cajón e imprimir)
                        window.print();
                    }

                    showToast(`✅ Ticket ${ticketNum} cobrado con éxito`);
                    cargarPedidos();
                } else {
                    showToast("❌ Error al procesar el pago");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch(e) {
                showToast("⚠️ Error de conexión con el servidor");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function abrirCajaRemota() {
            try {
                await fetch('/api/admin/abrir-cajon', { method: 'POST' });
                showToast("🔓 Comando de apertura enviado al cajón");
            } catch(e) {
                showToast("❌ Error al conectar con el hardware");
            }
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'glass-card bg-slate-800 text-white px-6 py-4 rounded-2xl shadow-2xl border border-white/10 flex items-center gap-3 animate-pop';
            toast.innerHTML = `<span>🔔</span> <span class="font-bold text-sm">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px) scale(0.9)';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        init();
    </script>
</body>
</html>
