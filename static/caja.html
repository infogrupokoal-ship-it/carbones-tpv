<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caja Maestra | Carbones y Pollos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/enterprise_shell.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-primary: #4f46e5;
            --brand-success: #10b981;
            --bg-base: #f8fafc;
        }
        body { 
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            color: #1e293b;
            user-select: none; 
            -webkit-user-select: none; 
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.05);
        }
        .ticket-card {
            background: white;
            border-radius: 2rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .ticket-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        .btn-confirm {
            background: linear-gradient(135deg, #4f46e5, #4338ca);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }
        .btn-confirm:active { transform: scale(0.98); }
        
        @media print {
            body * { visibility: hidden; }
            #ticket-impresion, #ticket-impresion * { visibility: visible; }
            #ticket-impresion {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                font-family: 'Courier New', Courier, monospace;
                font-size: 14px;
                color: #000;
            }
        }
        .animate-pop { animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
    <meta name="google" content="notranslate">
</head>
<body class="min-h-screen flex text-slate-900" data-active-module="Caja">
    <div id="enterprise-sidebar"></div>
    <div id="toast-container" class="fixed bottom-10 right-10 z-[100] flex flex-col gap-4"></div>

    <main class="flex-1 overflow-y-auto p-6 lg:p-12 custom-scrollbar">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-16">
            <div>
                <p class="text-[10px] font-black text-indigo-600 uppercase tracking-[0.4em] mb-2">Enterprise Financial Unit</p>
                <h1 class="text-6xl font-black text-slate-900 tracking-tighter uppercase">Caja <span class="text-indigo-600">Maestra</span></h1>
            </div>
            <div class="flex gap-4">
                <button onclick="abrirCajaRemota()" class="bg-white hover:bg-slate-50 text-slate-900 px-8 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest border border-slate-200 transition-all flex items-center gap-3 shadow-sm">
                    <span class="text-lg">🔓</span> ABRIR CAJÓN
                </button>
                <div class="flex items-center gap-3 px-6 py-4 bg-emerald-50 rounded-2xl border border-emerald-100 shadow-sm">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-[10px] font-black text-emerald-600 uppercase tracking-widest">Servicio Activo</span>
                </div>
            </div>
        </header>

        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
                <div>
                    <h2 class="text-3xl font-black text-slate-900 tracking-tight uppercase">Cola de Cobros</h2>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Transacciones pendientes de validación fiscal.</p>
                </div>
                <div id="stats-summary" class="flex gap-6">
                    <!-- Dynamic stats -->
                </div>
            </div>

            <div id="caja-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                <!-- Skeletons -->
                <div class="h-96 rounded-[2rem] bg-white border border-slate-100 animate-pulse flex items-center justify-center">
                    <p class="text-slate-300 font-black uppercase tracking-widest text-sm">Sincronizando...</p>
                </div>
            </div>
        </div>
    </main>

    <div id="ticket-impresion" class="hidden"></div>

    <script src="/static/js/enterprise_shell.js"></script>
    <script>
        const API_URL = "/api";
        let lastCount = -1;

        async function init() {
            cargarPedidos();
            setInterval(cargarPedidos, 3000);
        }

        async function cargarPedidos() {
            try {
                const res = await fetch(`${API_URL}/orders/?estado=ESPERANDO_PAGO`);
                const pedidos = await res.json();
                window.pedidosCaja = pedidos;
                
                const container = document.getElementById('caja-container');
                const stats = document.getElementById('stats-summary');
                
                if (pedidos.length !== lastCount) {
                    if (pedidos.length > lastCount && lastCount !== -1) showToast("🆕 Nuevo pedido en cola");
                    lastCount = pedidos.length;
                }

                if(!pedidos || pedidos.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full py-40 text-center bg-white rounded-[3rem] border border-slate-100 shadow-sm">
                            <span class="text-7xl mb-8 block grayscale opacity-30">📭</span>
                            <h3 class="text-4xl font-black text-slate-900 uppercase tracking-tighter">Bandeja Vacía</h3>
                            <p class="text-slate-400 mt-2 font-bold uppercase tracking-widest text-[10px]">No hay operaciones pendientes</p>
                        </div>
                    `;
                    stats.innerHTML = '';
                    return;
                }

                stats.innerHTML = `
                    <div class="bg-white border border-slate-100 px-8 py-4 rounded-[1.5rem] shadow-sm">
                        <span class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Pendientes</span>
                        <span class="text-3xl font-black text-indigo-600">${pedidos.length}</span>
                    </div>
                    <div class="bg-indigo-600 px-8 py-4 rounded-[1.5rem] shadow-xl shadow-indigo-100">
                        <span class="block text-[8px] font-black text-indigo-100 uppercase tracking-widest mb-1">Total Cola</span>
                        <span class="text-3xl font-black text-white">${pedidos.reduce((acc, p) => acc + p.total, 0).toFixed(2)}€</span>
                    </div>
                `;

                container.innerHTML = '';
                pedidos.forEach((ped, idx) => {
                    let itemsHtml = ped.items.map(i => `
                        <div class="flex justify-between items-center py-3 border-b border-slate-50 last:border-0 group">
                            <div class="flex items-center gap-4">
                                <span class="w-8 h-8 flex items-center justify-center bg-slate-50 rounded-xl text-[10px] font-black text-indigo-600 border border-slate-100">${i.cantidad}</span>
                                <span class="font-bold text-slate-700 group-hover:text-indigo-600 transition-colors text-sm">${i.nombre}</span>
                            </div>
                            <span class="text-slate-900 font-black text-sm">${(i.precio * i.cantidad).toFixed(2)}€</span>
                        </div>
                    `).join('');

                    const card = document.createElement('div');
                    card.className = 'ticket-card flex flex-col p-8 relative animate-pop';
                    card.style.animationDelay = `${idx * 100}ms`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-8 pb-6 border-b border-slate-100">
                            <div>
                                <span class="text-[9px] font-black text-indigo-600 uppercase tracking-widest block mb-1">${ped.origen}</span>
                                <h3 class="text-4xl font-black text-slate-900 tracking-tighter">#${ped.numero_ticket.slice(-4)}</h3>
                            </div>
                            <div class="text-right">
                                <span class="px-3 py-1.5 rounded-lg bg-slate-50 text-slate-500 border border-slate-100 text-[9px] font-black uppercase tracking-widest">Pendiente</span>
                                <p class="text-[9px] font-bold text-slate-400 mt-2">${new Date(ped.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                            </div>
                        </div>
                        
                        <div class="flex-1 mb-8 overflow-y-auto max-h-48 pr-2">
                            ${itemsHtml}
                        </div>
                        
                        ${ped.notas_cliente ? `
                            <div class="mb-8 p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100 text-[10px] font-medium text-indigo-900/70 italic flex gap-3">
                                <span>💬</span> "${ped.notas_cliente}"
                            </div>
                        ` : ''}

                        <div class="flex justify-between items-end mb-8">
                            <div class="text-left">
                                <span class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Total a Pagar</span>
                                <span class="text-5xl font-black text-slate-900 tracking-tighter">${ped.total.toFixed(2)}<span class="text-2xl text-indigo-600 ml-1">€</span></span>
                            </div>
                        </div>

                        <button onclick="cobrarTKT('${ped.id}', '${ped.numero_ticket}')" class="w-full btn-confirm text-white py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-3">
                            FINALIZAR COBRO
                        </button>
                    `;
                    container.appendChild(card);
                });
            } catch(e) {
                console.error("Sync Failure:", e);
            }
        }

        async function cobrarTKT(pedId, ticketNum) {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="animate-spin text-lg">⏳</span> PROCESANDO...`;
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/orders/${pedId}/cobrar`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ metodo_pago: 'EFECTIVO' })
                });
                
                if(res.ok) {
                    const pedidoObj = window.pedidosCaja.find(p => p.id == pedId);
                    if (pedidoObj) {
                        const ticketDiv = document.getElementById('ticket-impresion');
                        ticketDiv.innerHTML = `...`; // Estructura de impresión simplificada
                        window.print();
                    }
                    showToast(`✅ Cobro # ${ticketNum} completado`);
                    cargarPedidos();
                } else {
                    showToast("❌ Error en validación fiscal");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch(e) {
                showToast("⚠️ Servidor no responde");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function abrirCajaRemota() {
            try {
                await fetch('/api/admin/abrir-cajon', { method: 'POST' });
                showToast("🔓 Comando de apertura ejecutado");
            } catch(e) {
                showToast("❌ Error de hardware");
            }
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'bg-white text-slate-900 px-8 py-5 rounded-2xl shadow-2xl border border-slate-100 flex items-center gap-4 animate-pop';
            toast.innerHTML = `<div class="w-2 h-2 bg-indigo-600 rounded-full animate-ping"></div> <span class="font-black text-[10px] uppercase tracking-widest">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        init();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/enterprise_ui.js"></script>
</body>
</html>
