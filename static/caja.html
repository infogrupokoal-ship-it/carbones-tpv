<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caja Maestra - Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { user-select: none; -webkit-user-select: none; }</style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">
    
    <!-- Navbar Sup -->
    <div class="bg-emerald-700 p-5 border-b border-gray-200 flex justify-between items-center shadow-md">
        <h1 class="text-3xl font-black text-white">💰 TPV MAESTRA - COBROS</h1>
        <div class="flex gap-4">
            <button onclick="abrirCajaRemota()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-3 rounded-xl font-bold text-lg shadow-[0_0_15px_rgba(79,70,229,0.5)] active:scale-95 transition-all">🔓 ABRIR CAJA</button>
            <button onclick="location.href='index.html'" class="bg-emerald-900 hover:bg-emerald-800 text-white px-5 py-3 rounded-xl font-bold text-lg shadow-md active:scale-95 transition-all">Ver Menú Público</button>
            <button onclick="location.href='dashboard.html'" class="bg-yellow-400 hover:bg-yellow-500 text-gray-900 px-5 py-3 rounded-xl font-black text-lg shadow-md active:scale-95 transition-all">Ir al Dashboard</button>
        </div>
    </div>

    <!-- Contenido -->
    <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-4">
        <h2 class="text-2xl font-bold text-gray-700 mb-2">Turnos Esperando Pago</h2>
        <div id="caja-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="text-gray-500 font-bold text-xl ml-2 italic">Cargando turnos...</div>
        </div>
    </div>

    <script>
        if(!localStorage.getItem('auth_user')) {
            window.location.href = 'login.html';
        }
        
        const API_URL = "/api";

        let fallosConexion = 0;
        async function cargarPedidos() {
            try {
                // Traer los que el quiosco dejó ESPERANDO_PAGO
                const res = await fetch(`${API_URL}/pedidos?estado=ESPERANDO_PAGO`);
                const turnos = await res.json();
                
                fallosConexion = 0;
                document.getElementById('error-conexion')?.remove();

                const container = document.getElementById('caja-container');
                container.innerHTML = '';
                
                if(turnos.length === 0) {
                    container.innerHTML = `<div class="text-gray-500 font-bold text-2xl col-span-3">Nadie está esperando para pagar. 👍</div>`;
                    return;
                }

                for (let ped of turnos) {
                    const r = await fetch(`${API_URL}/pedidos/${ped.id}/items`);
                    ped.items = await r.json();
                    
                    let itemsHtml = ped.items.map(i => `<li class="text-lg font-medium text-gray-600 border-b py-1">${i.cantidad}x ${i.nombre}</li>`).join('');
                    
                    container.innerHTML += `
                        <div class="bg-white rounded-3xl overflow-hidden shadow-xl border-4 ${ped.origen.includes('WHATSAPP') ? 'border-emerald-400' : 'border-yellow-400'}">
                            <div class="${ped.origen.includes('WHATSAPP') ? 'bg-emerald-400 text-white' : 'bg-yellow-400 text-gray-900'} p-4 flex justify-between items-center">
                                <span class="font-black text-4xl">${ped.numero_ticket}</span>
                                <span class="font-bold text-xl uppercase tracking-widest">${ped.origen.includes('WHATSAPP') ? '📱 WHATSAPP' : '🖥️ KIOSKO'}</span>
                            </div>
                            <div class="p-6">
                                <ul class="mb-6 max-h-40 overflow-y-auto">${itemsHtml}</ul>
                                <div class="flex justify-between items-center mb-6">
                                    <span class="font-bold text-gray-500 text-xl">A Pagar:</span>
                                    <span class="font-black text-emerald-600 text-4xl">${ped.total.toFixed(2)}€</span>
                                </div>
                                <button onclick="cobrarTKT(${ped.id})" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white p-5 rounded-xl font-black text-2xl shadow-lg active:scale-95 transition-all">💸 CONFIRMAR PAGO</button>
                            </div>
                        </div>
                    `;
                }
            } catch(e) {
                console.error(e);
                fallosConexion++;
                if (fallosConexion >= 2) mostrarErrorConexion();
            }
        }

        function mostrarErrorConexion() {
            if(!document.getElementById('error-conexion')) {
                const overlay = document.createElement('div');
                overlay.id = 'error-conexion';
                overlay.className = "fixed inset-0 bg-red-900 bg-opacity-95 z-[999] flex flex-col items-center justify-center text-white";
                overlay.innerHTML = `
                    <div class="text-9xl mb-4">🔌</div>
                    <h1 class="text-5xl font-black mb-4 text-center">TPV DESCONECTADO</h1>
                    <p class="text-2xl font-bold text-center px-4 max-w-2xl">Asegúrate de haber encendido el TPV en Termux.</p>
                `;
                document.body.appendChild(overlay);
            }
        }

        async function cobrarTKT(pedId, metodo = "EFECTIVO") {
            try {
                await fetch(`${API_URL}/pedidos/${pedId}/cobrar`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ metodo_pago: metodo })
                });
                
                // El backend ya encola el comando de abrir caja e imprimir ticket de cocina y cliente
                // al procesar el cobro. No es necesario enviarlo de nuevo aquí.
                
                cargarPedidos();
            } catch(e) {
                alert("Error al confirmar cobrar: " + e);
            }
        }

        async function abrirCajaRemota() {
            try {
                const res = await fetch('/api/hardware/enqueue', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({accion: 'abrir_caja', origen: localStorage.getItem('auth_user') || 'app_admin'})
                });
                const data = await res.json();
                if(data.status !== 'ok') {
                    console.log('Error encolando acción:', data.msj);
                }
            } catch(e) {
                console.log('Error de red al intentar abrir caja');
            }
        }

        cargarPedidos();
        setInterval(cargarPedidos, 5000);
    </script>
</body>
</html>
