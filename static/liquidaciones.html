<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Settlements | Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/enterprise_shell.css">
    <style>
        :root {
            --brand-primary: #6366f1;
            --bg-base: #f8fafc;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-base); 
            margin: 0;
            color: #1e293b;
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.01) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.01) 1px, transparent 1px);
            z-index: -1;
            pointer-events: none;
        }
        .glass-panel {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }
        .table-header {
            background: #f1f5f9;
            text-transform: uppercase;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.1em;
            color: #64748b;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="bg-grid"></div>

    <main class="max-w-[1600px] mx-auto p-8 lg:p-20">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-10 mb-20">
            <div>
                <p class="text-[10px] font-black text-indigo-600 uppercase tracking-[0.5em] mb-4">Financial Settlements Unit</p>
                <h1 class="text-6xl lg:text-7xl font-black text-slate-900 tracking-tighter uppercase">
                    Cierre <span class="text-indigo-600">Financiero</span>
                </h1>
            </div>
            <div class="flex gap-4">
                <button onclick="syncLiquidaciones()" class="bg-white border border-slate-100 p-5 rounded-2xl shadow-sm text-slate-400 hover:text-indigo-600 transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
                <button class="bg-indigo-600 text-white font-black text-[10px] uppercase tracking-widest px-10 py-5 rounded-2xl shadow-xl shadow-indigo-100 hover:scale-105 active:scale-95 transition-all">
                    Generar Reporte Fiscal
                </button>
            </div>
        </header>

        <div id="module-telemetry" class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-16"></div>

        <!-- Summary -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
            <div class="glass-panel p-10 rounded-[3rem] border-l-8 border-indigo-500">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Ventas Brutas Periodo</p>
                <h3 class="text-5xl font-black text-slate-900 tracking-tighter">0.00€</h3>
            </div>
            <div class="glass-panel p-10 rounded-[3rem] border-l-8 border-emerald-500">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Liquidado a Drivers</p>
                <h3 class="text-5xl font-black text-emerald-600 tracking-tighter">0.00€</h3>
            </div>
            <div class="glass-panel p-10 rounded-[3rem] border-l-8 border-orange-500">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Gatos Operativos</p>
                <h3 class="text-5xl font-black text-orange-600 tracking-tighter">0.00€</h3>
            </div>
        </div>

        <div class="glass-panel rounded-[3rem] overflow-hidden">
            <h4 class="text-xs font-black text-slate-900 uppercase tracking-[0.3em] p-10 border-b border-slate-50">Desglose de Liquidaciones</h4>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="table-header">
                            <th class="px-10 py-6">Entidad / Colaborador</th>
                            <th class="px-10 py-6">Concepto</th>
                            <th class="px-10 py-6 text-center">Tickets</th>
                            <th class="px-10 py-6 text-right">Volumen</th>
                            <th class="px-10 py-6 text-right">Comisión</th>
                            <th class="px-10 py-6 text-right">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="settlements-body" class="divide-y divide-slate-50 text-slate-900 font-bold text-xs">
                        <!-- Dynamic Rows -->
                        <tr class="hover:bg-slate-50 transition-all">
                            <td class="px-10 py-8">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-black">DA</div>
                                    <p class="font-black uppercase">Driver Alpha</p>
                                </div>
                            </td>
                            <td class="px-10 py-8 text-slate-400">Servicios de Reparto</td>
                            <td class="px-10 py-8 text-center">14</td>
                            <td class="px-10 py-8 text-right font-black">450.00€</td>
                            <td class="px-10 py-8 text-right font-black text-indigo-600">35.00€</td>
                            <td class="px-10 py-8 text-right">
                                <span class="text-[8px] font-black uppercase tracking-widest px-3 py-1 bg-orange-50 text-orange-600 rounded-full">Pendiente</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/static/js/enterprise_shell.js"></script>
    <script>
        window.onload = () => {
            EnterpriseShell.init('Cierre Financiero');
        };

        function syncLiquidaciones() {
            alert("FINANCIAL SYNC: Recalculando balances de la red...");
        }
    </script>

    <script>
        window.addEventListener('load', () => {
            if (typeof EnterpriseUI !== 'undefined') {
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Estado del Nodo',
                    value: 'ACTIVO',
                    unit: 'SECURE',
                    trend: 'up',
                    trendValue: '100%',
                    icon: 'fa-server'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Carga de Trabajo',
                    value: Math.floor(Math.random() * 40 + 20),
                    unit: '%',
                    trend: 'up',
                    trendValue: 'LOW',
                    icon: 'fa-microchip'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Latencia Sync',
                    value: Math.floor(Math.random() * 50 + 10),
                    unit: 'ms',
                    trend: 'down',
                    trendValue: 'OPTIMAL',
                    icon: 'fa-bolt'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Seguridad',
                    value: 'V4.0',
                    unit: 'SSL',
                    trend: 'up',
                    trendValue: 'MAX',
                    icon: 'fa-shield-halved'
                });
            }
        });
    </script>
            
</body>
</html>
