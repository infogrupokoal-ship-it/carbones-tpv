<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS - Cocina Carbones y Pollos Enterprise</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .card-grad { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .order-card { animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .urgente { border: 2px solid #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.5; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    
    <header class="bg-slate-950/80 backdrop-blur-md p-6 border-b border-slate-800 flex justify-between items-center z-10">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center font-black text-slate-900 shadow-lg shadow-orange-500/20">K</div>
            <h1 class="text-2xl font-black tracking-tighter text-white">CENTRAL DE COCINA</h1>
        </div>
        <div class="flex gap-8 items-center">
            <div class="text-right">
                <p id="clock" class="text-3xl font-black text-orange-500">00:00:00</p>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Sincronizado con VPS</p>
            </div>
        </div>
    </header>

        <div id="module-telemetry" class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-16"></div>
    
    <main id="orders-container" class="flex-1 p-8 flex gap-8 overflow-x-auto items-start">
        <!-- Pedidos dinámicos aquí -->
    </main>

    <footer class="p-4 bg-slate-950/50 border-t border-slate-900 flex justify-between text-[10px] font-bold text-slate-600 uppercase tracking-widest">
        <span>Sistema Operativo KDS v2.0-pro</span>
        <span id="status-text">Conectado - Escaneando Pedidos...</span>
    </footer>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchPedidos() {
            try {
                const response = await fetch('/api/orders/');
                if(!response.ok) throw new Error("API Offline");
                const orders = await response.json();
                renderPedidos(orders.filter(o => o.estado === 'RECIBIDO' || o.estado === 'EN_PREPARACION'));
                document.getElementById('status-text').innerText = `Última Sync: ${new Date().toLocaleTimeString()} | Total: ${orders.length}`;
            } catch (error) {
                document.getElementById('status-text').innerText = "⚠️ ERROR DE CONEXIÓN";
            }
        }

        function renderPedidos(orders) {
            const container = document.getElementById('orders-container');
            container.innerHTML = '';
            
            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = `order-card min-w-[350px] max-w-[350px] glass rounded-[2.5rem] card-grad flex flex-col shadow-2xl ${order.estado === 'URGENTE' ? 'urgente' : ''}`;
                
                let itemsHtml = '';
                // Asumiendo que order.detalles tiene los productos (ajustar según tu modelo real de Repository)
                const items = order.items || [];
                items.forEach(item => {
                    itemsHtml += `
                        <div class="py-3 border-b border-slate-800/50 flex justify-between items-start">
                            <div class="flex-1">
                                <span class="text-xl font-black text-orange-400 mr-2">${item.cantidad}x</span>
                                <span class="text-lg font-bold text-slate-200">${item.nombre || 'Producto'}</span>
                            </div>
                        </div>
                    `;
                });

                const timeDiff = Math.floor((new Date() - new Date(order.fecha)) / 60000);
                const timeColor = timeDiff > 15 ? 'text-red-500 blink' : 'text-slate-400';

                card.innerHTML = `
                    <div class="p-6 border-b border-white/5 flex justify-between items-center">
                        <div>
                            <p class="text-xs font-bold text-slate-500 uppercase">Pedido</p>
                            <h2 class="text-2xl font-black text-white">#${order.numero_ticket || order.id.slice(-4)}</h2>
                        </div>
                        <div class="text-right">
                            <p class="${timeColor} font-black text-lg">${timeDiff}m</p>
                        </div>
                    </div>
                    <div class="p-6 flex-1 overflow-y-auto">
                        ${itemsHtml}
                        ${order.notas ? `<div class="mt-4 p-4 bg-red-500/10 border border-red-500/30 rounded-2xl text-red-400 text-sm font-bold">⚠️ ${order.notas}</div>` : ''}
                    </div>
                    <div class="p-6">
                        <button onclick="marcarListo('${order.id}')" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 py-4 rounded-2xl font-black text-lg shadow-lg shadow-emerald-500/20 transition-all active:scale-95">
                            MARCAR LISTO
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function marcarListo(id) {
            try {
                await fetch(`/api/orders/${id}/status`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ estado: 'LISTO' })
                });
                fetchPedidos();
            } catch (error) {
                console.error("Error updating order status");
            }
        }

        setInterval(fetchPedidos, 5000);
        fetchPedidos();
    </script>

    <script>
        window.addEventListener('load', () => {
            if (typeof EnterpriseUI !== 'undefined') {
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Estado del Nodo',
                    value: 'ACTIVO',
                    unit: 'SECURE',
                    trend: 'up',
                    trendValue: '100%',
                    icon: 'fa-server'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Carga de Trabajo',
                    value: Math.floor(Math.random() * 40 + 20),
                    unit: '%',
                    trend: 'up',
                    trendValue: 'LOW',
                    icon: 'fa-microchip'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Latencia Sync',
                    value: Math.floor(Math.random() * 50 + 10),
                    unit: 'ms',
                    trend: 'down',
                    trendValue: 'OPTIMAL',
                    icon: 'fa-bolt'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Seguridad',
                    value: 'V4.0',
                    unit: 'SSL',
                    trend: 'up',
                    trendValue: 'MAX',
                    icon: 'fa-shield-halved'
                });
            }
        });
    </script>
            
</body>
</html>
