<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repartidores Pro - Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .order-card { transition: all 0.3s ease; }
        .order-card:active { transform: scale(0.98); }
        .status-badge { font-size: 0.65rem; font-weight: 900; padding: 0.25rem 0.75rem; border-radius: 9999px; text-transform: uppercase; }
    </style>
</head>
<body class="min-h-screen p-4 pb-24">
    
    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-black uppercase tracking-tighter">Panel <span class="text-amber-500">Reparto</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Enterprise Delivery Engine</p>
        </div>
        <div class="h-10 w-10 bg-amber-500 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/20">🛵</div>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass-card p-4 rounded-3xl text-center">
            <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Entregados hoy</p>
            <p class="text-3xl font-black text-emerald-400">12</p>
        </div>
        <div class="glass-card p-4 rounded-3xl text-center">
            <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Propina Est.</p>
            <p class="text-3xl font-black text-amber-500">24.50€</p>
        </div>
    </div>

    <h2 class="text-xs font-black uppercase tracking-[0.2em] text-slate-500 mb-4 ml-2">Pedidos en Ruta / Pendientes</h2>
    
    <div id="orders-container" class="space-y-4">
        <!-- Dinámico -->
        <div class="animate-pulse space-y-4">
            <div class="h-24 bg-white rounded-3xl"></div>
            <div class="h-24 bg-white rounded-3xl"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-6 left-6 right-6 h-16 glass-card rounded-2xl flex items-center justify-around px-4 z-50">
        <button class="text-amber-500 flex flex-col items-center"><span class="text-xl">📦</span><span class="text-[8px] font-bold mt-1 uppercase">Pedidos</span></button>
        <button class="text-slate-500 flex flex-col items-center"><span class="text-xl">📍</span><span class="text-[8px] font-bold mt-1 uppercase">Mapa</span></button>
        <button class="text-slate-500 flex flex-col items-center"><span class="text-xl">📊</span><span class="text-[8px] font-bold mt-1 uppercase">Stats</span></button>
        <button class="text-slate-500 flex flex-col items-center"><span class="text-xl">⚙️</span><span class="text-[8px] font-bold mt-1 uppercase">Perfil</span></button>
    </nav>

    <script>
        async function loadOrders() {
            try {
                const res = await fetch('/api/orders/activas');
                const orders_all = await res.json();
                const orders = orders_all.filter(o => o.metodo_envio === 'DOMICILIO' && ['PREPARADO', 'EN_CAMINO'].includes(o.estado));
                const container = document.getElementById('orders-container');
                
                if(orders.length === 0) {
                    container.innerHTML = `<div class="py-20 text-center opacity-20"><p class="text-4xl mb-4">🏠</p><p class="text-xs font-black uppercase tracking-widest">Sin entregas pendientes</p></div>`;
                    return;
                }

                container.innerHTML = orders.map(o => `
                    <div class="order-card glass-card p-5 rounded-[2rem] flex flex-col gap-4 relative overflow-hidden ${o.estado === 'EN_CAMINO' ? 'border-amber-500/50' : ''}">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[10px] font-black text-amber-500 uppercase tracking-widest">#${o.numero_ticket}</span>
                                <h3 class="text-lg font-black uppercase tracking-tight mt-1">${o.total.toFixed(2)}€</h3>
                            </div>
                            <span class="status-badge ${o.estado === 'EN_CAMINO' ? 'bg-emerald-500/20 text-emerald-500' : 'bg-amber-500/20 text-amber-500'}">${o.estado}</span>
                        </div>
                        <div class="flex items-center gap-3 text-slate-500">
                            <span class="text-xl">📍</span>
                            <p class="text-xs font-bold leading-tight">${o.direccion || 'Sin dirección'}</p>
                        </div>
                        <div class="flex gap-2">
                            ${o.estado === 'PREPARADO' 
                                ? `<button onclick="updateStatus('${o.id}', 'EN_CAMINO')" class="flex-1 py-3 bg-white text-slate-900 rounded-xl text-[10px] font-black uppercase tracking-widest">Aceptar Entrega</button>`
                                : `<button onclick="updateStatus('${o.id}', 'ENTREGADO')" class="flex-1 py-3 bg-emerald-500 text-slate-900 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-emerald-500/30">Marcar Entregado</button>`
                            }
                            <button onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.direccion || '')}')" class="w-12 h-12 glass-card flex items-center justify-center rounded-xl text-xl" title="Abrir Mapa">🧭</button>
                            ${o.cliente_telefono ? `
                            <a href="https://wa.me/${o.cliente_telefono.replace(/\s+/g, '')}?text=Hola ${o.cliente_nombre}, soy tu repartidor de Carbones y Pollos. Estoy en camino con tu pedido #${o.numero_ticket}." 
                               target="_blank"
                               class="w-12 h-12 glass-card flex items-center justify-center rounded-xl text-xl hover:bg-emerald-500/20 transition-all"
                               title="WhatsApp Cliente">
                                🟢
                            </a>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }

        async function updateStatus(id, status) {
            await fetch(`/api/orders/${id}/estado?estado=${status}`, { method: 'PUT' });
            loadOrders();
        }

        setInterval(loadOrders, 10000);
        loadOrders();
    </script>
</body>
</html>
