<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Matrix | Singularity Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f8fafc; overflow: hidden; }
        .matrix-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        .node {
            position: absolute;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            z-index: 10;
        }
        .node:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: #6366f1;
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }
        .node i { font-size: 2rem; margin-bottom: 0.5rem; color: #6366f1; }
        .node span { font-[10px] font-black uppercase tracking-widest text-slate-400; }
        
        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        
        .status-overlay {
            position: fixed; bottom: 40px; left: 40px; right: 40px;
            padding: 2rem; border-radius: 2rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    <canvas id="connections"></canvas>

    <div class="fixed top-20 left-20">
        <h1 class="text-6xl font-black text-white tracking-tighter uppercase leading-none">Enterprise <span class="text-indigo-500">Matrix</span></h1>
        <p class="text-xs font-bold text-slate-500 uppercase tracking-[0.5em] mt-4">Singularity Control Node V5.0</p>
    </div>

    <div id="nodes-container"></div>

    <div class="status-overlay backdrop-blur-md">
        <div class="flex items-center gap-6">
            <div class="flex flex-col">
                <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Global Status</span>
                <span class="text-xl font-black text-emerald-500 uppercase">Synced & Secure</span>
            </div>
            <div class="h-10 w-px bg-slate-800"></div>
            <div class="flex flex-col">
                <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Active Threads</span>
                <span class="text-xl font-black text-white uppercase">128 Operations</span>
            </div>
        </div>
        <button onclick="window.location.href='/static/portal.html'" class="px-10 py-4 rounded-2xl bg-indigo-600 text-white font-black text-[10px] uppercase tracking-widest shadow-2xl hover:scale-105 transition-all">
            Volver al Hub
        </button>
    </div>

    <script>
        const modules = [
            { id: 'Caja', icon: 'fa-cash-register', x: 200, y: 400 },
            { id: 'KDS', icon: 'fa-fire-burner', x: 400, y: 300 },
            { id: 'Stock', icon: 'fa-box-open', x: 600, y: 400 },
            { id: 'Fleet', icon: 'fa-truck-fast', x: 800, y: 300 },
            { id: 'Analytics', icon: 'fa-brain', x: 1000, y: 500 },
            { id: 'ERP', icon: 'fa-file-invoice-dollar', x: 400, y: 600 },
            { id: 'RRHH', icon: 'fa-users-gear', x: 700, y: 600 },
            { id: 'Marketing', icon: 'fa-bullhorn', x: 900, y: 700 },
            { id: 'IoT', icon: 'fa-microchip', x: 200, y: 700 }
        ];

        function initMatrix() {
            const container = document.getElementById('nodes-container');
            const canvas = document.getElementById('connections');
            const ctx = canvas.getContext('2d');
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            modules.forEach(m => {
                const div = document.createElement('div');
                div.className = 'node';
                div.style.left = `${m.x}px`;
                div.style.top = `${m.y}px`;
                div.innerHTML = `<i class="fas ${m.icon}"></i><span>${m.id}</span>`;
                div.onclick = () => window.location.href = `/static/${m.id.toLowerCase()}.html`;
                container.appendChild(div);
            });

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = 'rgba(99, 102, 241, 0.15)';
                ctx.lineWidth = 1;

                modules.forEach((m1, i) => {
                    modules.forEach((m2, j) => {
                        if (i < j) {
                            ctx.beginPath();
                            ctx.moveTo(m1.x + 60, m1.y + 60);
                            ctx.lineTo(m2.x + 60, m2.y + 60);
                            ctx.stroke();
                        }
                    });
                });

                requestAnimationFrame(draw);
            }
            draw();
        }

        window.onload = initMatrix;
        window.onresize = () => {
            const canvas = document.getElementById('connections');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
