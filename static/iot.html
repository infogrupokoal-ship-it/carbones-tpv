<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT & Kitchen Telemetry | TPV Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/industrial_light.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .glass-panel { background: white; border: 1px solid #f1f5f9; box-shadow: 0 4px 20px -2px rgba(0,0,0,0.03); border-radius: 1.5rem; }
        .temp-dial { width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
    </style>
    <link rel="stylesheet" href="/static/css/enterprise_shell.css">
</head>
<body data-active-module="IoT Equipos" class="h-screen w-screen overflow-hidden flex bg-slate-50">

    <aside id="enterprise-sidebar" class="w-[280px] h-full bg-white border-r border-slate-100 flex-shrink-0 z-50 hidden md:block transition-all duration-300"></aside>

    <main class="flex-1 h-full flex flex-col relative overflow-hidden">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-8 flex-shrink-0 z-40">
            <div>
                <h1 class="text-xl font-black tracking-tight text-slate-900">IoT Telemetry</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Control de Equipamiento en Tiempo Real</p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="fetchTelemetry()" class="h-10 px-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-xs rounded-xl flex items-center gap-2 transition-all">
                    <span class="material-symbols-outlined text-[18px]">refresh</span>
                    Ping Sensors
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6" id="sensors-grid">
                <!-- Sensors will be injected here -->
            </div>

            <div class="glass-panel p-6">
                <h3 class="text-sm font-black text-slate-900 uppercase tracking-wider mb-4">Registro de Mantenimiento Predictivo</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-100">
                                <th class="py-3 px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Equipo</th>
                                <th class="py-3 px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Último Mantenimiento</th>
                                <th class="py-3 px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Desgaste Estimado</th>
                                <th class="py-3 px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Acción Recomendada</th>
                            </tr>
                        </thead>
                        <tbody id="maintenance-logs" class="text-sm">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/enterprise_shell.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            EnterpriseShell.init('IoT Telemetry');
            fetchTelemetry();
            setInterval(fetchTelemetry, 30000); // Auto-update every 30s
        });

        async function fetchTelemetry() {
            try {
                // Mock data since /api/iot might not be fully populated with real sensors
                const sensors = [
                    { name: 'Cámara Frigorífica 1', type: 'temp', value: -18.5, unit: '°C', status: 'OPTIMAL', wear: 12 },
                    { name: 'Horno Brasa A', type: 'temp', value: 320, unit: '°C', status: 'ACTIVE', wear: 45 },
                    { name: 'Freidora 1 (Aceite)', type: 'quality', value: 85, unit: '%', status: 'WARNING', wear: 80 },
                    { name: 'Sistema Extracción', type: 'flow', value: 1200, unit: 'm3/h', status: 'OPTIMAL', wear: 30 }
                ];

                const grid = document.getElementById('sensors-grid');
                grid.innerHTML = '';
                
                sensors.forEach(s => {
                    let colorClass = 'text-emerald-600 bg-emerald-50 border-emerald-200';
                    let dialColor = 'border-emerald-500 text-emerald-700';
                    let icon = 'thermostat';
                    
                    if(s.status === 'WARNING') {
                        colorClass = 'text-amber-600 bg-amber-50 border-amber-200';
                        dialColor = 'border-amber-500 text-amber-700';
                        icon = 'warning';
                    }

                    grid.innerHTML += `
                        <div class="glass-panel p-6 flex flex-col items-center justify-center text-center relative overflow-hidden">
                            <div class="absolute top-4 right-4 flex items-center gap-2">
                                <div class="w-2 h-2 rounded-full ${s.status === 'OPTIMAL' ? 'bg-emerald-500' : 'bg-amber-500'} status-pulse"></div>
                            </div>
                            <span class="material-symbols-outlined text-[32px] text-slate-300 mb-4">${icon}</span>
                            <div class="temp-dial border-4 ${dialColor} mb-4">
                                ${s.value}<span class="text-sm ml-1">${s.unit}</span>
                            </div>
                            <h3 class="text-sm font-black text-slate-900">${s.name}</h3>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">${s.status}</p>
                        </div>
                    `;
                });

                const tbody = document.getElementById('maintenance-logs');
                tbody.innerHTML = '';
                sensors.forEach(s => {
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-slate-50">
                            <td class="py-4 px-4 font-bold text-slate-800">${s.name}</td>
                            <td class="py-4 px-4 text-slate-500 text-xs">Hace 14 días</td>
                            <td class="py-4 px-4">
                                <div class="w-full bg-slate-100 rounded-full h-2">
                                    <div class="bg-${s.wear > 70 ? 'amber' : 'emerald'}-500 h-2 rounded-full" style="width: ${s.wear}%"></div>
                                </div>
                            </td>
                            <td class="py-4 px-4 text-right">
                                <button class="px-4 py-2 bg-slate-100 hover:bg-indigo-50 text-indigo-600 font-bold text-[10px] uppercase tracking-wider rounded-lg transition-colors">
                                    Agendar Revisión
                                </button>
                            </td>
                        </tr>
                    `;
                });

            } catch (error) {
                console.error("Error fetching telemetry", error);
            }
        }
    </script>
</body>
</html>
