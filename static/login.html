<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acceso Industrial | Carbones & Pollos</title>
    
    <!-- Design System Tokens -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #f59e0b;
            --primary-dark: #d97706;
            --bg-dark: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: fixed;
            inset: 0;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
            z-index: -1;
            pointer-events: none;
        }
        .glass-auth-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.1);
        }
        .input-premium {
            background: white;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-premium:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            outline: none;
        }
        .btn-premium {
            background: var(--brand-primary);
            box-shadow: 0 10px 30px -10px rgba(79, 70, 229, 0.5);
            transition: all 0.3s ease;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -15px rgba(79, 70, 229, 0.6);
        }
        .btn-premium:active { transform: translateY(0); }
        
        .toast {
            animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.1);
            border: 1px solid #f1f5f9;
        }
        @keyframes slideIn { from { transform: translateX(100%) scale(0.9); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }
        
        .logo-glow {
            box-shadow: 0 0 40px rgba(79, 70, 229, 0.15);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">
    <div class="bg-grid"></div>
    <div id="toast-container" class="fixed top-8 right-8 z-[100] flex flex-col gap-4 w-96"></div>

    <main class="glass-auth-panel w-full max-w-md mx-4 p-12 rounded-[3rem] animate-pop">
        <header class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-[1.5rem] bg-indigo-50 border border-indigo-100 mb-8 logo-glow">
                <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase">Enterprise <span class="text-indigo-600">Access</span></h1>
            <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.3em] mt-3">Carbones y Pollos • Industrial v3.0</p>
        </header>

        <div id="module-telemetry" class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-16"></div>

        <div id="login-container">
            <form id="login-form" class="space-y-8">
                <div class="space-y-2">
                    <label for="user" class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Terminal ID</label>
                    <div class="relative">
                        <input id="user" type="text" class="input-premium w-full py-5 pl-6 pr-6 rounded-2xl font-black text-slate-900 placeholder-slate-300" required autocomplete="username" placeholder="OPERADOR">
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="pass" class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Access Key</label>
                    <div class="relative">
                        <input id="pass" type="password" class="input-premium w-full py-5 pl-6 pr-6 rounded-2xl font-black text-slate-900 placeholder-slate-300 tracking-widest" required autocomplete="current-password" placeholder="••••••••">
                    </div>
                </div>

                <div id="error-msg" class="hidden bg-red-50 border border-red-100 text-red-600 p-5 rounded-2xl text-[10px] font-black uppercase tracking-widest text-center animate-shake">
                    Credenciales No Válidas
                </div>

                <button type="submit" id="btn-submit" class="btn-premium w-full text-white font-black text-[11px] uppercase tracking-[0.3em] py-6 rounded-2xl flex justify-center items-center gap-3">
                    <span>Ingresar al Sistema</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </form>
        </div>

        <div id="role-selector" class="hidden opacity-0 transition-opacity duration-500">
            <h2 class="text-center text-[10px] font-black text-indigo-500 uppercase tracking-[0.4em] mb-6">Seleccione Modalidad Operativa</h2>
            <div class="grid grid-cols-1 gap-4">
                
                <!-- TPV Mode -->
                <button onclick="selectMode('tpv')" class="w-full text-left bg-white border border-slate-200 hover:border-emerald-500 p-6 rounded-2xl transition-all group hover:shadow-xl hover:shadow-emerald-500/10 hover:-translate-y-1">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-500 flex items-center justify-center text-xl group-hover:bg-emerald-500 group-hover:text-white transition-colors">💰</div>
                        <div>
                            <h3 class="font-black text-slate-900 uppercase tracking-tight">Terminal TPV</h3>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Venta rápida e interfaz de caja</p>
                        </div>
                    </div>
                </button>

                <!-- Turno Mañanas -->
                <button onclick="selectMode('morning')" class="w-full text-left bg-white border border-slate-200 hover:border-amber-500 p-6 rounded-2xl transition-all group hover:shadow-xl hover:shadow-amber-500/10 hover:-translate-y-1">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-amber-50 text-amber-500 flex items-center justify-center text-xl group-hover:bg-amber-500 group-hover:text-white transition-colors">🌅</div>
                        <div>
                            <h3 class="font-black text-slate-900 uppercase tracking-tight">Responsable Mañanas</h3>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Supervisión y control AM</p>
                        </div>
                    </div>
                </button>

                <!-- Turno Tardes -->
                <button onclick="selectMode('afternoon')" class="w-full text-left bg-white border border-slate-200 hover:border-indigo-500 p-6 rounded-2xl transition-all group hover:shadow-xl hover:shadow-indigo-500/10 hover:-translate-y-1">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-indigo-50 text-indigo-500 flex items-center justify-center text-xl group-hover:bg-indigo-500 group-hover:text-white transition-colors">🌃</div>
                        <div>
                            <h3 class="font-black text-slate-900 uppercase tracking-tight">Responsable Tardes</h3>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Supervisión y control PM</p>
                        </div>
                    </div>
                </button>

            </div>
        </div>

        <footer class="mt-16 pt-8 border-t border-slate-50 text-center">
            <p class="text-slate-300 text-[8px] font-black uppercase tracking-[0.4em]">Propiedad de Carbones y Pollos La Granja S.L.</p>
        </footer>
    </main>

    <script src="/static/js/ui_components.js"></script>
    <script>
        function showToast(title, message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast flex items-center gap-5';
            
            const isError = type === 'error';
            const iconColor = isError ? 'text-red-500' : 'text-indigo-600';
            const iconBg = isError ? 'bg-red-50' : 'bg-indigo-50';

            toast.innerHTML = `
                <div class="w-12 h-12 rounded-2xl ${iconBg} flex items-center justify-center shrink-0">
                    <svg class="w-6 h-6 ${iconColor}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        ${isError ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>' : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>'}
                    </svg>
                </div>
                <div>
                    <p class="text-slate-900 font-black text-[10px] uppercase tracking-widest">${title}</p>
                    <p class="text-slate-400 text-[9px] font-bold uppercase mt-1">${message}</p>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(20px)'; setTimeout(() => toast.remove(), 500); }, 4000);
        }

        const form = document.getElementById('login-form');
        const loginContainer = document.getElementById('login-container');
        const roleSelector = document.getElementById('role-selector');
        const btn = document.getElementById('btn-submit');
        const btnText = btn.querySelector('span');
        const error = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            error.classList.add('hidden');
            
            const originalText = btnText.innerText;
            btnText.innerText = "VERIFICANDO...";
            btn.classList.add('opacity-50', 'pointer-events-none');

            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ username: form.user.value, pin: form.pass.value })
                });
                
                if(r.ok) {
                    const data = await r.json();
                    localStorage.setItem('auth_user', data.username);
                    localStorage.setItem('auth_role', data.role);
                    localStorage.setItem('auth_token', data.access_token);
                    
                    // Show role selector instead of redirecting
                    loginContainer.style.display = 'none';
                    roleSelector.classList.remove('hidden');
                    setTimeout(() => roleSelector.classList.remove('opacity-0'), 50);

                } else {
                    error.classList.remove('hidden');
                    btnText.innerText = originalText;
                    btn.classList.remove('opacity-50', 'pointer-events-none');
                    showToast("Acceso Denegado", "Las credenciales no coinciden con nuestros registros.");
                }
            } catch(ex) {
                showToast("Fallo Crítico", "No se pudo contactar con el núcleo del sistema.");
                btnText.innerText = originalText;
                btn.classList.remove('opacity-50', 'pointer-events-none');
            }
        });

        function selectMode(mode) {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
            
            setTimeout(() => {
                if (mode === 'tpv') {
                    localStorage.setItem('active_shift', 'tpv');
                    window.location.href = 'tpv.html';
                } else if (mode === 'morning') {
                    localStorage.setItem('active_shift', 'MAÑANAS');
                    window.location.href = 'portal.html';
                } else if (mode === 'afternoon') {
                    localStorage.setItem('active_shift', 'TARDES');
                    window.location.href = 'portal.html';
                }
            }, 600);
        }
    </script>

    <script>
        window.addEventListener('load', () => {
            if (typeof EnterpriseUI !== 'undefined') {
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Estado del Nodo',
                    value: 'ACTIVO',
                    unit: 'SECURE',
                    trend: 'up',
                    trendValue: '100%',
                    icon: 'fa-server'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Carga de Trabajo',
                    value: Math.floor(Math.random() * 40 + 20),
                    unit: '%',
                    trend: 'up',
                    trendValue: 'LOW',
                    icon: 'fa-microchip'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Latencia Sync',
                    value: Math.floor(Math.random() * 50 + 10),
                    unit: 'ms',
                    trend: 'down',
                    trendValue: 'OPTIMAL',
                    icon: 'fa-bolt'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Seguridad',
                    value: 'V4.0',
                    unit: 'SSL',
                    trend: 'up',
                    trendValue: 'MAX',
                    icon: 'fa-shield-halved'
                });
            }
        });
    </script>
            
</body>
</html>
