<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Enterprise - Carbones y Pollos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b; /* amber-500 */
            --bg-base: #020617; /* slate-950 */
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-base);
            margin: 0;
            overflow: hidden;
        }
        /* Dynamic Grid Background */
        .bg-grid {
            position: absolute;
            inset: -100%;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
        }
        /* Radial Glow */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.1) 0%, transparent 60%);
            filter: blur(60px);
            z-index: 1;
            pointer-events: none;
        }
        /* Premium Glass Panel */
        .glass-auth-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            z-index: 10;
        }
        /* Input Styling */
        .input-premium {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-premium:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
            outline: none;
        }
        /* Button Glow */
        .btn-glow {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .btn-glow::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }
        .btn-glow:hover::after {
            opacity: 1;
            transform: scale(1);
        }
        .btn-glow:active { transform: scale(0.98); }
        
        /* Toast Notifications */
        .toast {
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards, slideOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards 4s;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.1) inset;
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
        }
        @keyframes slideIn { from { transform: translateX(120%) scale(0.9); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0) scale(1); opacity: 1; } to { transform: translateX(120%) scale(0.9); opacity: 0; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">
    
    <!-- Background Effects -->
    <div class="bg-grid"></div>
    <div class="ambient-glow"></div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none w-80"></div>

    <!-- Main Auth Panel -->
    <main class="glass-auth-panel w-full max-w-md mx-4 p-8 rounded-[2rem]">
        
        <!-- Header -->
        <header class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-amber-500/10 border border-amber-500/20 mb-6 shadow-[0_0_30px_rgba(245,158,11,0.2)] relative">
                <div class="absolute inset-0 bg-amber-500/20 blur-xl rounded-full"></div>
                <svg class="w-8 h-8 text-amber-500 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight">SISTEMA <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500">CLOUD</span></h1>
            <p class="text-slate-400 text-sm font-medium mt-2 tracking-wide">Acceso restringido para personal autorizado</p>
        </header>

        <!-- Form -->
        <form id="login-form" class="space-y-6">
            
            <div class="space-y-1">
                <label for="user" class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Identificador de Usuario</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <input id="user" type="text" class="input-premium w-full py-4 pl-12 pr-4 rounded-xl font-mono text-sm placeholder-slate-600" required autocomplete="username" placeholder="admin">
                </div>
            </div>

            <div class="space-y-1">
                <label for="pass" class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Clave de Acceso</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                    </div>
                    <input id="pass" type="password" class="input-premium w-full py-4 pl-12 pr-4 rounded-xl font-mono text-sm placeholder-slate-600 tracking-widest" required autocomplete="current-password" placeholder="••••••••">
                </div>
            </div>

            <div id="error-msg" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-xl text-xs font-bold text-center flex items-center justify-center gap-2">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <span>Credenciales incorrectas o usuario inactivo.</span>
            </div>

            <button type="submit" id="btn-submit" class="btn-glow w-full bg-gradient-to-r from-amber-500 to-orange-600 text-white font-black text-sm uppercase tracking-[0.2em] py-4 rounded-xl shadow-[0_10px_20px_-10px_rgba(245,158,11,0.5)] flex justify-center items-center gap-2">
                <span>INICIAR SESIÓN</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>

        <footer class="mt-10 pt-6 border-t border-white/5 text-center flex flex-col gap-1">
            <p class="text-slate-500 text-[9px] font-black uppercase tracking-[0.3em]">Carbones y Pollos Enterprise Suite</p>
            <p class="text-slate-600 text-[8px] font-bold uppercase tracking-widest">Build v3.0-PRO • Conexión Segura</p>
        </footer>
    </main>

    <script>
        // Sistema de Notificaciones Premium
        function showToast(title, message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            const isError = type === 'error';
            const iconColorClass = isError ? 'text-red-400' : 'text-emerald-400';
            const iconBgClass = isError ? 'bg-red-500/10 border-red-500/20' : 'bg-emerald-500/10 border-emerald-500/20';
            const iconSvg = isError 
                ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>'
                : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>';

            toast.innerHTML = `
                <div class="w-10 h-10 rounded-full ${iconBgClass} border flex items-center justify-center shrink-0">
                    <svg class="w-5 h-5 ${iconColorClass}" fill="none" stroke="currentColor" viewBox="0 0 24 24">${iconSvg}</svg>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-white font-bold text-xs uppercase tracking-wide truncate">${title}</p>
                    <p class="text-slate-400 text-[10px] font-medium mt-0.5 leading-snug">${message}</p>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 4500);
        }

        const form = document.getElementById('login-form');
        const btn = document.getElementById('btn-submit');
        const btnText = btn.querySelector('span');
        const error = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            error.classList.add('hidden');
            
            // Estado de carga
            const originalText = btnText.innerText;
            btnText.innerText = "VERIFICANDO...";
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btn.disabled = true;

            const payload = { username: form.user.value, password: form.pass.value };
            
            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(payload)
                });
                
                if(r.ok) {
                    const data = await r.json();
                    localStorage.setItem('auth_user', data.username);
                    localStorage.setItem('auth_role', data.role);
                    
                    // Transición de salida suave
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.5s ease';
                    
                    setTimeout(() => {
                        window.location.href = 'portal.html';
                    }, 500);
                    
                } else {
                    error.classList.remove('hidden');
                    // Efecto de sacudida (shake) simple
                    form.classList.add('animate-pulse');
                    setTimeout(() => form.classList.remove('animate-pulse'), 500);
                    
                    btnText.innerText = "REINTENTAR";
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                    btn.disabled = false;
                }
            } catch(ex) {
                showToast("Fallo de Red", "Error crítico de comunicación con el servidor. Compruebe su conexión.");
                btnText.innerText = originalText;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
