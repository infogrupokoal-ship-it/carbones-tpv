<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Enterprise - Carbones y Pollos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Design System -->
    <link rel="stylesheet" href="/static/css/design_system.css">
    <style>
        .login-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(40px);
        }
        .toast {
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards, slideOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards 3s;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: auto;
            color: white;
        }
        @keyframes slideIn { from { transform: translateX(100%) scale(0.95); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0) scale(1); opacity: 1; } to { transform: translateX(100%) scale(0.95); opacity: 0; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div class="login-glow"></div>

    <div class="glass-panel w-full max-w-md animate-in">
        <div class="text-center mb-10">
            <div class="inline-flex p-4 rounded-full bg-amber-500/10 border border-amber-500/20 mb-6 shadow-[0_0_30px_rgba(245,158,11,0.2)]">
                <svg class="w-10 h-10 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-4xl font-black text-white tracking-tighter">SISTEMA <span class="text-gradient">CLOUD</span></h1>
            <p class="text-slate-400 font-medium mt-2">Acceso restringido para personal autorizado</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Identificador de Usuario</label>
                <input id="user" type="text" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white font-mono text-sm outline-none focus:border-amber-500/80 focus:ring-1 focus:ring-amber-500/50 transition-all placeholder-slate-700" required autocomplete="username" placeholder="admin">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Clave de Acceso</label>
                <input id="pass" type="password" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white font-mono text-sm outline-none focus:border-amber-500/80 focus:ring-1 focus:ring-amber-500/50 transition-all placeholder-slate-700 tracking-widest" required autocomplete="current-password" placeholder="••••••••">
            </div>

            <div id="error-msg" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-2xl text-sm font-bold text-center">
                ⚠️ Credenciales incorrectas o usuario inactivo.
            </div>

            <button type="submit" id="btn-submit" class="btn-primary w-full !text-lg !py-4 shadow-orange-500/20">
                INICIAR SESIÓN
            </button>
        </form>

        <p class="mt-10 text-center text-slate-500 text-[10px] font-bold uppercase tracking-widest">
            &copy; 2026 Carbones y Pollos Enterprise
        </p>
    </div>

    <script>
        function showToast(title, message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div class="w-8 h-8 rounded-full ${type==='error'?'bg-red-500/20 text-red-500':'bg-emerald-500/20 text-emerald-500'} flex items-center justify-center">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <div>
                    <p class="text-white font-black text-xs">${title}</p>
                    <p class="text-slate-400 text-[10px] font-medium">${message}</p>
                </div>`;
            container.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3500);
        }

        const form = document.getElementById('login-form');
        const btn = document.getElementById('btn-submit');
        const error = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            error.classList.add('hidden');
            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            const payload = { username: form.user.value, password: form.pass.value };
            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(payload)
                });
                if(r.ok) {
                    const data = await r.json();
                    localStorage.setItem('auth_user', data.username);
                    localStorage.setItem('auth_role', data.role);
                    window.location.href = 'portal.html';
                } else {
                    error.classList.remove('hidden');
                    btn.innerText = "REINTENTAR";
                    btn.disabled = false;
                }
            } catch(ex) {
                showToast("Fallo de Red", "Error crítico de comunicación con el servidor.");
                btn.innerText = "INICIAR SESIÓN";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
