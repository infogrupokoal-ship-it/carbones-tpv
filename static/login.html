<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Access | Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #4f46e5;
            --bg-base: #f8fafc;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-base);
            margin: 0;
            overflow: hidden;
            color: #1e293b;
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
            z-index: -1;
            pointer-events: none;
        }
        .glass-auth-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.1);
        }
        .input-premium {
            background: white;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-premium:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            outline: none;
        }
        .btn-premium {
            background: var(--brand-primary);
            box-shadow: 0 10px 30px -10px rgba(79, 70, 229, 0.5);
            transition: all 0.3s ease;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -15px rgba(79, 70, 229, 0.6);
        }
        .btn-premium:active { transform: translateY(0); }
        
        .toast {
            animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.1);
            border: 1px solid #f1f5f9;
        }
        @keyframes slideIn { from { transform: translateX(100%) scale(0.9); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }
        
        .logo-glow {
            box-shadow: 0 0 40px rgba(79, 70, 229, 0.15);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">
    <div class="bg-grid"></div>
    <div id="toast-container" class="fixed top-8 right-8 z-[100] flex flex-col gap-4 w-96"></div>

    <main class="glass-auth-panel w-full max-w-md mx-4 p-12 rounded-[3rem] animate-pop">
        <header class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-[1.5rem] bg-indigo-50 border border-indigo-100 mb-8 logo-glow">
                <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase">Enterprise <span class="text-indigo-600">Access</span></h1>
            <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.3em] mt-3">Carbones y Pollos • Industrial v3.0</p>
        </header>

        <form id="login-form" class="space-y-8">
            <div class="space-y-2">
                <label for="user" class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Terminal ID</label>
                <div class="relative">
                    <input id="user" type="text" class="input-premium w-full py-5 pl-6 pr-6 rounded-2xl font-black text-slate-900 placeholder-slate-300" required autocomplete="username" placeholder="OPERADOR">
                </div>
            </div>

            <div class="space-y-2">
                <label for="pass" class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Access Key</label>
                <div class="relative">
                    <input id="pass" type="password" class="input-premium w-full py-5 pl-6 pr-6 rounded-2xl font-black text-slate-900 placeholder-slate-300 tracking-widest" required autocomplete="current-password" placeholder="••••••••">
                </div>
            </div>

            <div id="error-msg" class="hidden bg-red-50 border border-red-100 text-red-600 p-5 rounded-2xl text-[10px] font-black uppercase tracking-widest text-center animate-shake">
                Credenciales No Válidas
            </div>

            <button type="submit" id="btn-submit" class="btn-premium w-full text-white font-black text-[11px] uppercase tracking-[0.3em] py-6 rounded-2xl flex justify-center items-center gap-3">
                <span>Ingresar al Sistema</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>

        <footer class="mt-16 pt-8 border-t border-slate-50 text-center">
            <p class="text-slate-300 text-[8px] font-black uppercase tracking-[0.4em]">Propiedad de Carbones y Pollos La Granja S.L.</p>
        </footer>
    </main>

    <script>
        function showToast(title, message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast flex items-center gap-5';
            
            const isError = type === 'error';
            const iconColor = isError ? 'text-red-500' : 'text-indigo-600';
            const iconBg = isError ? 'bg-red-50' : 'bg-indigo-50';

            toast.innerHTML = `
                <div class="w-12 h-12 rounded-2xl ${iconBg} flex items-center justify-center shrink-0">
                    <svg class="w-6 h-6 ${iconColor}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        ${isError ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>' : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>'}
                    </svg>
                </div>
                <div>
                    <p class="text-slate-900 font-black text-[10px] uppercase tracking-widest">${title}</p>
                    <p class="text-slate-400 text-[9px] font-bold uppercase mt-1">${message}</p>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(20px)'; setTimeout(() => toast.remove(), 500); }, 4000);
        }

        const form = document.getElementById('login-form');
        const btn = document.getElementById('btn-submit');
        const btnText = btn.querySelector('span');
        const error = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            error.classList.add('hidden');
            
            const originalText = btnText.innerText;
            btnText.innerText = "VERIFICANDO...";
            btn.classList.add('opacity-50', 'pointer-events-none');

            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ username: form.user.value, password: form.pass.value })
                });
                
                if(r.ok) {
                    const data = await r.json();
                    localStorage.setItem('auth_user', data.username);
                    localStorage.setItem('auth_role', data.role);
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                    setTimeout(() => window.location.href = 'portal.html', 800);
                } else {
                    error.classList.remove('hidden');
                    btnText.innerText = originalText;
                    btn.classList.remove('opacity-50', 'pointer-events-none');
                    showToast("Acceso Denegado", "Las credenciales no coinciden con nuestros registros.");
                }
            } catch(ex) {
                showToast("Fallo Crítico", "No se pudo contactar con el núcleo del sistema.");
                btnText.innerText = originalText;
                btn.classList.remove('opacity-50', 'pointer-events-none');
            }
        });
    </script>
</body>
</html>
