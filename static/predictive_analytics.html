<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOI - Predictive Intelligence | TPV Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="p-4 lg:p-10">
    <!-- Shell Header -->
    <header class="flex flex-col lg:flex-row lg:items-center justify-between mb-10 gap-6">
        <div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tight flex items-center gap-3">
                <i class="fa-solid fa-brain gradient-text"></i>
                AOI <span class="text-slate-300 font-light">|</span> <span class="gradient-text">Predictive Analytics</span>
            </h1>
            <p class="text-slate-500 font-medium mt-1 uppercase text-[10px] tracking-[0.3em]">Advanced Operations Intelligence V9.2</p>
        </div>
        <div class="flex gap-3">
            <button onclick="fetchData()" class="px-6 py-3 bg-white text-slate-900 font-black rounded-2xl border border-slate-100 hover:border-indigo-200 transition-all shadow-sm flex items-center gap-2">
                <i class="fa-solid fa-rotate"></i> ACTUALIZAR
            </button>
            <button class="px-6 py-3 bg-indigo-600 text-white font-black rounded-2xl shadow-xl shadow-indigo-200 hover:scale-105 active:scale-95 transition-all">
                EXPORTAR INFORME
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Revenue Prediction -->
        <div class="lg:col-span-2 glass p-8 rounded-[40px] card-shadow relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8">
                <span class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">Confidence: <span id="confidence">--</span>%</span>
            </div>
            <h3 class="text-xl font-black text-slate-900 mb-8 uppercase tracking-tighter flex items-center gap-2">
                <i class="fa-solid fa-chart-line text-indigo-500"></i> Previsión de Ingresos (24h)
            </h3>
            <div class="flex items-end gap-2 mb-10">
                <span class="text-7xl font-black tracking-tighter text-slate-900" id="predicted-rev">€0.00</span>
                <span class="text-slate-400 font-bold mb-3 text-xl">estimados</span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="factors-container">
                <!-- Factors will be injected here -->
            </div>
        </div>

        <!-- ESG Monitoring -->
        <div class="bg-slate-900 p-8 rounded-[40px] text-white card-shadow relative overflow-hidden">
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-emerald-500/20 blur-3xl rounded-full"></div>
            <h3 class="text-xl font-black mb-8 uppercase tracking-tighter flex items-center gap-2">
                <i class="fa-solid fa-leaf text-emerald-400"></i> ESG Impact Tracker
            </h3>
            <div class="space-y-6">
                <div class="flex justify-between items-center">
                    <span class="text-slate-400 text-sm font-bold">CO2 Ahorrado</span>
                    <span class="text-xl font-black text-emerald-400" id="co2-saved">-- kg</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-slate-400 text-sm font-bold">Desperdicio Evitado</span>
                    <span class="text-xl font-black text-emerald-400" id="waste-saved">-- kg</span>
                </div>
                <div class="pt-6 border-t border-slate-800">
                    <div class="p-4 bg-emerald-500/10 rounded-2xl border border-emerald-500/20">
                        <span class="text-[10px] font-black text-emerald-400 uppercase tracking-widest block mb-1">Status Ambiental</span>
                        <span class="text-lg font-black" id="esg-rating">Analizando...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Menu Engineering -->
        <div class="lg:col-span-3 glass p-8 rounded-[40px] card-shadow">
            <h3 class="text-xl font-black text-slate-900 mb-8 uppercase tracking-tighter flex items-center gap-2">
                <i class="fa-solid fa-utensils text-indigo-500"></i> Optimizador de Carta (AI-Driven)
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="opt-container">
                <!-- Optimization tips will be injected here -->
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                // Prediction
                const predRes = await fetch('/api/aoi/predictive');
                const predData = await predRes.json();
                document.getElementById('predicted-rev').innerText = `€${predData.predicted_revenue.toFixed(2)}`;
                document.getElementById('confidence').innerText = predData.confidence_score;
                
                const factorsCont = document.getElementById('factors-container');
                factorsCont.innerHTML = predData.factors.map(f => `
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Factor de Impacto</span>
                        <span class="text-sm font-bold text-slate-800">${f}</span>
                    </div>
                `).join('');

                // ESG
                const esgRes = await fetch('/api/aoi/esg');
                const esgData = await esgRes.json();
                document.getElementById('co2-saved').innerText = `${esgData.co2_saved_kg} kg`;
                document.getElementById('waste-saved').innerText = `${esgData.food_waste_saved_kg} kg`;
                document.getElementById('esg-rating').innerText = esgData.rating;

                // Optimization
                const optRes = await fetch('/api/aoi/optimization');
                const optData = await optRes.json();
                const optCont = document.getElementById('opt-container');
                optCont.innerHTML = optData.map(o => `
                    <div class="p-6 bg-white border border-slate-100 rounded-3xl hover:shadow-xl transition-all">
                        <span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest">${o.action}</span>
                        <h4 class="text-lg font-black text-slate-900 mt-4">${o.product}</h4>
                        <p class="text-slate-500 text-xs font-medium mt-1">${o.reason}</p>
                    </div>
                `).join('');

            } catch (error) {
                console.error("Error fetching AOI data:", error);
            }
        }

        window.onload = fetchData;
    </script>
</body>
</html>
