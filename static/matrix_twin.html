<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEOS | Digital Twin Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: #94a3b8; overflow: hidden; }
        .grid-bg {
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .matrix-node {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .matrix-node:hover {
            transform: scale(1.05);
            background: rgba(30, 41, 59, 0.8);
            border-color: #6366f1;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.33); opacity: 1; }
            80%, 100% { opacity: 0; }
        }
        .status-pulse::before {
            content: '';
            position: absolute;
            width: 300%;
            height: 300%;
            background: inherit;
            border-radius: 50%;
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .digital-line {
            background: linear-gradient(90deg, transparent, #6366f1, transparent);
            height: 1px;
            width: 100%;
            position: absolute;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="grid-bg h-screen w-screen flex flex-col">

    <header class="p-8 border-b border-white/5 flex justify-between items-center backdrop-blur-xl bg-slate-950/50 z-10">
        <div>
            <h1 class="text-2xl font-black text-white tracking-tighter uppercase">Quantum Matrix <span class="text-indigo-500">Twin</span></h1>
            <p class="text-[10px] font-mono uppercase tracking-[0.3em] opacity-50">Industrial Surveillance System v12.0</p>
        </div>
        <div class="flex gap-8 text-[10px] font-mono">
            <div class="flex flex-col">
                <span class="opacity-40">Uptime</span>
                <span class="text-emerald-400 font-bold" id="uptime-val">99.998%</span>
            </div>
            <div class="flex flex-col">
                <span class="opacity-40">Active Nodes</span>
                <span class="text-indigo-400 font-bold" id="nodes-count">--</span>
            </div>
            <div class="flex flex-col">
                <span class="opacity-40">Neural Load</span>
                <span class="text-amber-400 font-bold" id="load-val">--%</span>
            </div>
        </div>
    </header>

    <main class="flex-1 relative p-12 overflow-hidden">
        <div class="digital-line"></div>
        
        <div id="nodes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Nodes will be injected here -->
        </div>

        <!-- Global Status Card -->
        <div class="absolute bottom-12 right-12 w-96 bg-slate-900/80 backdrop-blur-2xl p-8 rounded-[2rem] border border-white/5 shadow-2xl">
            <h3 class="text-xs font-bold text-white mb-6 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500 status-pulse relative"></span>
                SYSTEM HEALTH ADVISOR
            </h3>
            <div id="health-advisor" class="space-y-4 text-[11px] font-medium italic opacity-80">
                Analizando integridad de la red...
            </div>
        </div>
    </main>

    <script>
        async function updateMatrix() {
            try {
                const response = await fetch('/api/telemetry/global-nodes');
                const data = await response.json();
                
                const grid = document.getElementById('nodes-grid');
                grid.innerHTML = data.nodes.map(node => `
                    <div class="matrix-node bg-slate-900/40 backdrop-blur-md p-6 rounded-3xl border border-white/5 flex flex-col gap-4">
                        <div class="flex justify-between items-start">
                            <div class="w-10 h-10 rounded-2xl bg-white/5 flex items-center justify-center text-xl">
                                ${getNodeIcon(node.type)}
                            </div>
                            <span class="text-[9px] font-mono px-2 py-1 bg-white/5 rounded-lg border border-white/5">
                                ${node.id}
                            </span>
                        </div>
                        <div>
                            <h4 class="text-white font-black text-sm uppercase tracking-tight">${node.type.replace('_', ' ')}</h4>
                            <p class="text-[10px] opacity-40 font-mono">${node.status}</p>
                        </div>
                        <div class="space-y-2 mt-4">
                            <div class="flex justify-between text-[9px] font-mono">
                                <span>LOAD</span>
                                <span class="${node.load > 80 ? 'text-rose-400' : 'text-indigo-400'}">${node.load}%</span>
                            </div>
                            <div class="h-1 bg-white/5 rounded-full overflow-hidden">
                                <div class="h-full bg-indigo-500" style="width: ${node.load}%"></div>
                            </div>
                            <div class="flex justify-between text-[9px] font-mono pt-1">
                                <span>TEMP</span>
                                <span>${node.temp.toFixed(1)}°C</span>
                            </div>
                        </div>
                    </div>
                `).join('');

                document.getElementById('nodes-count').innerText = data.active_nodes;
                
                // Fetch insights
                const insightRes = await fetch('/api/telemetry/insights');
                const insightData = await insightRes.json();
                
                document.getElementById('load-val').innerText = `${insightData.system_health.neural_load}%`;
                document.getElementById('health-advisor').innerHTML = insightData.insights.map(i => `
                    <div class="flex gap-2">
                        <span class="text-indigo-500">>></span>
                        <span>${i.message}</span>
                    </div>
                `).join('');

            } catch (e) {
                console.error("Matrix Sync Failure:", e);
            }
        }

        function getNodeIcon(type) {
            switch(type) {
                case 'TABLET': return '📱';
                case 'PRINTER': return '🖨️';
                case 'IOT_OVEN': return '🔥';
                case 'IOT_FRYER': return '🍟';
                case 'MOBILE_NODE': return '🛵';
                default: return '🛰️';
            }
        }

        setInterval(updateMatrix, 3000);
        updateMatrix();
    </script>
</body>
</html>
