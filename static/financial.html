<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Intelligence | Carbones Quantum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #fbfcfe; font-family: 'Outfit', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 20px 60px -15px rgba(0,0,0,0.03); }
    </style>
</head>
<body class="p-8 lg:p-16" data-active-module="Caja">
    <script src="/static/js/enterprise_shell.js"></script>

    <div class="max-w-[1400px] mx-auto space-y-12 animate-in">
        <header class="flex justify-between items-end">
            <div>
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-xl text-white">💰</div>
                    <h1 class="text-4xl font-black tracking-tighter uppercase leading-none">Intelligence <span class="text-emerald-600">Financial</span></h1>
                </div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.5em]">Real-time Cashflow & Yield Matrix</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass-card p-10 rounded-[3rem] border-l-8 border-emerald-500">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Cash in Hand</p>
                <h3 class="text-4xl font-black tracking-tighter">€4.850,20</h3>
            </div>
            <div class="glass-card p-10 rounded-[3rem] border-l-8 border-indigo-500">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Pending Payouts</p>
                <h3 class="text-4xl font-black tracking-tighter text-indigo-600">€1.120,00</h3>
            </div>
            <div class="glass-card p-10 rounded-[3rem] border-l-8 border-rose-500">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Daily Expenses</p>
                <h3 class="text-4xl font-black tracking-tighter text-rose-600">€450,15</h3>
            </div>
        </div>

        <div class="glass-card rounded-[4rem] p-12 overflow-hidden">
            <h2 class="text-xs font-black uppercase tracking-[0.4em] text-slate-400 mb-10">Transacciones Recientes</h2>
            <div class="space-y-4">
                ${[1,2,3,4,5].map(i => `
                    <div class="flex items-center justify-between p-6 bg-white/50 rounded-3xl hover:bg-white transition-all cursor-pointer group">
                        <div class="flex items-center gap-6">
                            <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-lg">🍔</div>
                            <div>
                                <p class="text-sm font-black uppercase tracking-tight">Pedido #402${i}</p>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">Visa • Hace ${i*5} min</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-emerald-600">+€${(Math.random()*50 + 10).toFixed(2)}</p>
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Completed</p>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>
    </div>
</body>
</html>
