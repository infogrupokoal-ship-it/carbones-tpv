<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configuración | Carbones y Pollos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Design System -->
    <!-- Design System -->
    <link rel="stylesheet" href="/static/css/design_system.css">
    <style>
        .toast {
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards, slideOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards 3s;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: auto;
            color: white;
            z-index: 9999;
        }
        @keyframes slideIn { from { transform: translateX(100%) scale(0.95); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0) scale(1); opacity: 1; } to { transform: translateX(100%) scale(0.95); opacity: 0; } }
    </style>
</head>
<body class="min-h-screen bg-slate-900 pb-32">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <!-- Header -->
    <header class="glass-panel sticky top-0 z-50 !rounded-none !border-x-0 !border-t-0 p-6 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="p-3 bg-white/5 rounded-2xl border border-white/10">
                <span class="text-2xl">⚙️</span>
            </div>
            <div>
                <h1 class="text-xl font-black text-white tracking-tighter">CONFIGURACIÓN</h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Ajustes del Sistema v4.1</p>
            </div>
        </div>
        <a href="index.html" class="p-3 bg-white/5 rounded-2xl border border-white/10 text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </a>
    </header>

    <main class="max-w-xl mx-auto p-6 space-y-8 animate-in">
        
        <!-- Breadcrumbs Corporativos -->
        <nav class="breadcrumb">
            <a href="index.html">Admin</a>
            <span class="text-white">Configuracion</span>
        </nav>
        
        <!-- System Health -->
        <section class="glass-panel p-8">
            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Estado de Infraestructura</h3>
            <div class="space-y-4">
                <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/10">
                    <span class="text-sm font-bold text-white">Servidor Backend</span>
                    <span class="px-3 py-1 bg-emerald-500/20 text-emerald-400 text-[10px] font-black rounded-lg">ACTIVO</span>
                </div>
                <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/10">
                    <span class="text-sm font-bold text-white">Base de Datos</span>
                    <span class="px-3 py-1 bg-emerald-500/20 text-emerald-400 text-[10px] font-black rounded-lg">CONECTADO</span>
                </div>
                <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/10">
                    <span class="text-sm font-bold text-white">IA Gemini Engine</span>
                    <span class="px-3 py-1 bg-emerald-500/20 text-emerald-400 text-[10px] font-black rounded-lg">LISTO</span>
                </div>
            </div>
        </section>

        <!-- Quick Actions -->
        <section class="space-y-4">
            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4 ml-1">Acciones Rápidas</h3>
            
            <button onclick="showToast('Backup', 'Iniciando volcado de seguridad...', 'info')" class="w-full glass-panel p-6 flex items-center gap-6 hover:bg-white/10 transition-all active:scale-95 text-left">
                <div class="p-4 bg-blue-500/20 rounded-2xl text-2xl">💾</div>
                <div>
                    <h4 class="text-lg font-bold text-white">Backup de Datos</h4>
                    <p class="text-xs text-slate-500">Exportar base de datos a nube externa.</p>
                </div>
            </button>

            <button onclick="window.location.href='/docs'" class="w-full glass-panel p-6 flex items-center gap-6 hover:bg-white/10 transition-all active:scale-95 text-left">
                <div class="p-4 bg-purple-500/20 rounded-2xl text-2xl">📖</div>
                <div>
                    <h4 class="text-lg font-bold text-white">Documentación API</h4>
                    <p class="text-xs text-slate-500">Ver esquemas técnicos y endpoints.</p>
                </div>
            </button>

            <button onclick="localStorage.clear(); window.location.href='/static/login.html';" class="w-full glass-panel p-6 flex items-center gap-6 hover:bg-red-500/10 transition-all active:scale-95 text-left border-red-500/20">
                <div class="p-4 bg-red-500/20 rounded-2xl text-2xl">🚪</div>
                <div>
                    <h4 class="text-lg font-bold text-red-400">Cerrar Sesión</h4>
                    <p class="text-xs text-slate-600">Finalizar sesión en este dispositivo.</p>
                </div>
            </button>
        </section>

        <!-- Danger Zone -->
        <section class="p-8 border-2 border-dashed border-red-500/20 rounded-[2.5rem]">
            <h3 class="text-xs font-black text-red-500 uppercase tracking-widest mb-4">Zona de Peligro</h3>
            <button onclick="if(confirm('¿BORRAR TODO EL SISTEMA? Esta acción no se puede deshacer.')) showToast('Peligro', 'Esta acción requiere confirmación del superadmin', 'error');" class="w-full py-4 bg-red-500 text-white rounded-2xl font-black text-xs tracking-widest uppercase shadow-xl shadow-red-500/20 active:scale-95 transition-all">
                REINICIAR FÁBRICA
            </button>
        </section>

    </main>

    <!-- Footer -->
    <footer class="fixed bottom-0 left-0 w-full p-8 text-center bg-slate-900/80 backdrop-blur-md">
        <p class="text-[10px] font-black text-slate-600 uppercase tracking-[0.3em]">TPV Enterprise v4.1 &copy; 2026</p>
    </footer>

</body>
<script>
    function showToast(title, message, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        
        let iconHtml;
        if (type === 'error') {
            iconHtml = `<div class="w-8 h-8 rounded-full bg-red-500/20 flex items-center justify-center text-red-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg></div>`;
        } else if (type === 'success') {
            iconHtml = `<div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg></div>`;
        } else {
            iconHtml = `<div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>`;
        }

        toast.innerHTML = `${iconHtml}<div><p class="text-white font-black text-xs">${title}</p><p class="text-slate-400 text-[10px] font-medium">${message}</p></div>`;
        container.appendChild(toast);
        setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3500);
    }
</script>
</html>
