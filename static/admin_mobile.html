<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Carbones y Pollos</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff5722;
            --primary-dark: #e64a19;
            --accent: #ff9800;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: var(--text); 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.2rem; color: var(--primary); }
        .logo i { font-size: 1.5rem; }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Container */
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg); pointer-events: none;
        }
        .stat-card h3 { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; color: var(--text); }
        .stat-card .trend { font-size: 0.75rem; color: var(--success); display: flex; align-items: center; gap: 3px; }

        /* Main Menu */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .menu-item {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
        }
        .menu-item:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .menu-item i { font-size: 2rem; color: var(--primary); }
        .menu-item span { font-weight: 600; font-size: 0.95rem; }

        /* List Section */
        .section-title { margin: 30px 0 15px; font-size: 1.1rem; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .section-title a { font-size: 0.8rem; color: var(--primary); text-decoration: none; }

        .order-list { display: flex; flex-direction: column; gap: 12px; }
        .order-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .order-info h4 { font-size: 0.95rem; margin-bottom: 2px; }
        .order-info p { font-size: 0.75rem; color: var(--text-muted); }
        .order-price { text-align: right; }
        .order-price .amt { font-weight: 700; font-size: 1.1rem; display: block; }
        .order-status { 
            font-size: 0.7rem; 
            padding: 2px 8px; 
            border-radius: 10px; 
            background: rgba(245, 158, 11, 0.1); 
            color: var(--warning);
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(255, 87, 34, 0.4);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .fab:active { transform: scale(0.9); rotate: 90deg; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-drumstick-bite"></i>

        </div>
        <div class="status-badge">

        </div>

    <div class="container">

        <div class="section-title animate" style="animation-delay: 0.2s;">
            <span>Últimos Pedidos</span>
            <a href="#">Ver todos <i class="fas fa-chevron-right"></i></a>
        </div>

        <div class="order-list animate" style="animation-delay: 0.3s;" id="orderList">
            <!-- Cargado vía JS -->
            <div class="order-item">
                <div class="order-info">
                    <h4>Ticket #T-42</h4>

                </div>
                <div class="order-price">
                    <span class="amt">24.50€</span>
                    <span class="order-status">PENDIENTE</span>
                </div>
            </div>
            <div class="order-item">
                <div class="order-info">
                    <h4>Ticket #T-41</h4>
                    <p>Hace 12 minutos • Quiosco</p>
                </div>
                <div class="order-price">
                    <span class="amt">18.20€</span>
                    <span class="order-status" style="color:var(--success); background:rgba(16,185,129,0.1)">PAGADO</span>
                </div>
            </div>
        </div>
    </div>

    <div class="fab">
        <i class="fas fa-plus"></i>
    </div>

        document.addEventListener('DOMContentLoaded', () => {
            console.log("Dashboard Enterprise Cargado");

        });

</body>
</html>
