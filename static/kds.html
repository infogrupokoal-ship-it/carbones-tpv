<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS Kitchen Central | Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #020617; 
            color: white; 
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            height: 100vh;
        }
        .order-card {
            background: #0f172a;
            border-radius: 1.5rem;
            border: 2px solid #1e293b;
            display: flex;
            flex-direction: column;
            animation: slideIn 0.3s ease-out;
        }
        .order-card.priority { border-color: #f59e0b; }
        .order-card.urgent { border-color: #ef4444; background: #450a0a; }
        
        .item-row { border-bottom: 1px solid #1e293b; padding: 1rem 0; }
        .item-row:last-child { border-bottom: none; }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .pulse-green { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); animation: pulse-g 2s infinite; }
        .pulse-red { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); animation: pulse-r 2s infinite; }
        @keyframes pulse-g { 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        @keyframes pulse-r { 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="flex flex-col">

    <!-- KDS Header -->
    <nav class="fixed top-0 left-0 w-full bg-black/80 backdrop-blur-md border-b border-white/5 z-50 transition-colors duration-500" id="kds-header">
        <div class="max-w-[120rem] mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='/static/portal.html'" class="text-stone-500 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                </button>
                <div class="w-px h-6 bg-white/10"></div>
                <div class="flex items-center gap-2">
                    <div class="h-6 w-6 bg-orange-600 rounded flex items-center justify-center text-xs shadow-lg shadow-orange-900/40">🔥</div>
                    <span class="text-white font-black tracking-widest text-xs uppercase">KDS <span class="text-orange-500">Central</span></span>
                </div>
            </div>

            <!-- Resumen de Producción (Métricas en tiempo real) -->
            <div id="production-summary" class="hidden md:flex gap-6 items-center border-x border-white/10 px-6 h-full">
                <!-- Inyectado via JS -->
            </div>

            <div class="flex items-center gap-6">
                <div class="text-right flex items-center gap-4">
                    <p id="clock" class="text-xl font-black text-white font-mono tracking-tighter">00:00:00</p>
                    <div class="flex items-center justify-end gap-2">
                        <span id="sync-dot" class="h-2 w-2 rounded-full bg-emerald-500 pulse-green"></span>
                        <p id="status-text" class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Sincronizado</p>
                    </div>
                </div>
                <div class="w-px h-6 bg-white/10"></div>
                <div class="flex gap-2">
                    <button onclick="loadOrders()" class="h-8 w-8 bg-white/5 rounded flex items-center justify-center hover:bg-white/10 transition-all border border-white/5 active:scale-90 text-sm">🔄</button>
                    <button onclick="toggleAudio()" id="audio-btn" class="h-8 w-8 bg-white/5 rounded flex items-center justify-center hover:bg-white/10 transition-all border border-white/5 active:scale-90 text-sm">🔔</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Rush Mode Alert -->
    <div id="rush-banner" class="hidden mt-16 bg-red-600/20 border-b border-red-500/30 text-red-500 py-2 px-6 text-center animate-pulse backdrop-blur-md">
        <p class="text-xs font-black uppercase tracking-[0.3em]">⚠️ RUSH MODE ACTIVATED: ALTA DEMANDA EN COCINA ⚠️</p>
    </div>

    <!-- Orders Grid -->
    <main id="kds-grid" class="flex-1 overflow-x-auto flex gap-6 p-6 mt-16 no-scrollbar">
        <div class="flex flex-col items-center justify-center w-full space-y-8">
            <div class="relative">
                <div class="text-9xl animate-pulse">🍗</div>
                <div class="absolute -top-4 -right-4 h-12 w-12 bg-orange-600 rounded-full flex items-center justify-center animate-bounce shadow-xl border-4 border-[#020617]">
                    <span class="text-2xl font-black">Zzz</span>
                </div>
            </div>
            <div class="text-center space-y-2">
                <h2 class="text-4xl font-black uppercase tracking-tighter text-slate-400">Cocina en Calma</h2>
                <p class="text-slate-600 font-bold tracking-[0.2em] uppercase text-sm">Esperando transmisiones del terminal de pedidos...</p>
            </div>
            <div class="flex gap-4">
                <div class="h-1.5 w-12 bg-slate-800 rounded-full overflow-hidden">
                    <div class="h-full bg-orange-500 animate-[loading_2s_infinite]"></div>
                </div>
            </div>
        </div>
    </main>

    <style>
        @keyframes loading {
            0% { width: 0%; margin-left: 0%; }
            50% { width: 50%; margin-left: 25%; }
            100% { width: 0%; margin-left: 100%; }
        }
    </style>

    <audio id="ping-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const API_URL = "/api";
        let activeOrders = [];
        let lastOrderCount = 0;
        let audioEnabled = false;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js')
                .then(reg => console.log('✅ Service Worker KDS Registrado:', reg))
                .catch(err => console.error('❌ Service Worker KDS Fallido:', err));
        }

        function toggleAudio() {
            audioEnabled = !audioEnabled;
            document.getElementById('audio-btn').innerText = audioEnabled ? '🔔' : '🔕';
            if (audioEnabled) {
                document.getElementById('ping-sound').play().catch(() => {});
            }
        }

        async function loadOrders() {
            try {
                const res = await fetch(`${API_URL}/orders/?estado=EN_PREPARACION`);
                const data = await res.json();
                if(data.offline) throw new Error("Offline mode triggered by Service Worker");
                
                activeOrders = data;
                localStorage.setItem('kds_orders_backup', JSON.stringify(activeOrders));
                
                // Notificación de nuevo pedido
                if (activeOrders.length > lastOrderCount && audioEnabled) {
                    document.getElementById('ping-sound').play().catch(() => {});
                }
                lastOrderCount = activeOrders.length;
                
                document.getElementById('status-text').innerText = "Sincronizado";
                document.getElementById('sync-dot').classList.replace('bg-red-500', 'bg-emerald-500');
                document.getElementById('sync-dot').classList.replace('pulse-red', 'pulse-green');
                
                renderKDS();
                updateSummary();
                checkRushMode();
            } catch (e) {
                console.warn("⚠️ Conexión perdida, usando Caché Local (Modo Resiliencia KDS)...");
                document.getElementById('status-text').innerText = "OFFLINE MODE";
                document.getElementById('sync-dot').classList.replace('bg-emerald-500', 'bg-red-500');
                document.getElementById('sync-dot').classList.replace('pulse-green', 'pulse-red');
                
                const backup = localStorage.getItem('kds_orders_backup');
                if (backup) {
                    activeOrders = JSON.parse(backup);
                    renderKDS();
                    updateSummary();
                    checkRushMode();
                }
            }
        }

        function updateSummary() {
            const summary = document.getElementById('production-summary');
            const totals = {};
            
            activeOrders.forEach(o => {
                o.items.forEach(it => {
                    totals[it.nombre] = (totals[it.nombre] || 0) + it.cantidad;
                });
            });

            const topItems = Object.entries(totals).sort((a,b) => b[1] - a[1]).slice(0, 3);
            
            if (topItems.length > 0) {
                summary.classList.remove('hidden');
                summary.innerHTML = topItems.map(([name, qty]) => `
                    <div class="flex flex-col justify-center">
                        <p class="text-[8px] font-black text-slate-500 uppercase">${name.slice(0,15)}</p>
                        <p class="text-sm font-black text-white">x${qty}</p>
                    </div>
                `).join('');
            } else {
                summary.classList.add('hidden');
            }
        }

        function checkRushMode() {
            const urgentCount = activeOrders.filter(o => {
                const elapsedMin = Math.floor((new Date() - new Date(o.fecha)) / 60000);
                return elapsedMin > 10;
            }).length;

            const header = document.getElementById('kds-header');
            const banner = document.getElementById('rush-banner');

            if (urgentCount >= 3 || activeOrders.length >= 8) {
                header.classList.replace('bg-black/80', 'bg-red-950/80');
                banner.classList.remove('hidden');
                grid.classList.replace('mt-16', 'mt-0'); // Banner takes space
            } else {
                header.classList.replace('bg-red-950/80', 'bg-black/80');
                banner.classList.add('hidden');
                grid.classList.replace('mt-0', 'mt-16');
            }
        }

        function renderKDS() {
            const grid = document.getElementById('kds-grid');
            if (activeOrders.length === 0) {
                grid.innerHTML = `<div class="flex flex-col items-center justify-center w-full opacity-20">
                                    <div class="text-9xl mb-4 animate-bounce">🍗</div>
                                    <p class="text-2xl font-black uppercase tracking-[0.5em]">Cocina en Silencio</p>
                                  </div>`;
                return;
            }

            grid.innerHTML = activeOrders.map(order => {
                const elapsedMin = Math.floor((new Date() - new Date(order.fecha)) / 60000);
                const isUrgent = elapsedMin > 15;
                const isPriority = order.origen === 'DELIVERY' || elapsedMin > 8;

                return `
                    <div class="order-card w-[380px] shrink-0 ${isUrgent ? 'urgent' : (isPriority ? 'priority' : '')} shadow-2xl">
                        <div class="p-6 border-b border-white/5 flex justify-between items-start bg-white/5">
                            <div>
                                <h3 class="text-4xl font-black text-white leading-none">#${order.numero_ticket.slice(-4)}</h3>
                                <div class="flex items-center gap-2 mt-3">
                                    <span class="px-2 py-0.5 rounded bg-white/10 text-[10px] font-black tracking-widest">${order.origen}</span>
                                    <span class="text-[10px] font-bold text-slate-400 italic">${new Date(order.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="text-3xl font-black ${isUrgent ? 'text-white animate-pulse' : 'text-orange-500'}">${elapsedMin}m</span>
                                <p class="text-[8px] font-black opacity-40 uppercase tracking-tighter">Tiempo Espera</p>
                            </div>
                        </div>
                        
                        <div class="flex-1 p-6 overflow-y-auto space-y-4 no-scrollbar">
                            ${order.items.map(it => `
                                <div class="item-row group">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-3xl font-black text-white group-hover:text-orange-500 transition-colors">x${it.cantidad}</span>
                                        <span class="text-[10px] font-bold text-slate-500 bg-white/5 px-2 py-1 rounded-full uppercase border border-white/5">${it.categoria || 'ASADO'}</span>
                                    </div>
                                    <h4 class="text-xl font-bold text-orange-100 uppercase tracking-tight">${it.nombre}</h4>
                                </div>
                            `).join('')}
                            
                            ${order.notas_cliente ? `
                                <div class="bg-yellow-500/10 p-4 rounded-2xl border border-yellow-500/20 mt-4">
                                    <p class="text-[10px] font-black text-yellow-500 uppercase mb-1 tracking-widest">Instrucciones Especiales</p>
                                    <p class="text-sm font-bold text-yellow-100 leading-tight">${order.notas_cliente}</p>
                                </div>
                            ` : ''}

                            ${order.metodo_envio === 'DOMICILIO' ? `
                                <div class="bg-blue-500/10 p-4 rounded-2xl border border-blue-500/20 mt-4 animate-pulse">
                                    <p class="text-[10px] font-black text-blue-400 uppercase mb-1 tracking-widest flex items-center gap-2">
                                        <span>🛵</span> DIRECCIÓN DE ENTREGA
                                    </p>
                                    <p class="text-sm font-bold text-blue-100 leading-tight">${order.direccion || 'Dirección no especificada'}</p>
                                </div>
                            ` : ''}
                        </div>

                        <div class="p-6 bg-black/20">
                            <button onclick="finishOrder('${order.id}')" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-5 rounded-2xl text-xl font-black shadow-lg shadow-emerald-900/40 transition-all active:scale-95 flex items-center justify-center gap-3">
                                <span>LISTO PARA SERVIR</span>
                                <span class="text-2xl">✅</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function finishOrder(id) {
            try {
                const res = await fetch(`${API_URL}/orders/${id}/estado?estado=LISTO`, { method: 'PUT' });
                if (res.ok) {
                    loadOrders();
                }
            } catch (e) {
                console.error("Error finalizing order", e);
            }
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            document.getElementById('status-text').innerText = "Sincronizado";
            document.getElementById('sync-dot').classList.replace('bg-red-500', 'bg-emerald-500');
            document.getElementById('sync-dot').classList.replace('pulse-red', 'pulse-green');
        }

        setInterval(updateClock, 1000);
        setInterval(loadOrders, 5000);
        loadOrders();
    </script>
</body>
</html>
