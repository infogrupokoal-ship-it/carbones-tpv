<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS Kitchen Central | Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #020617; 
            color: white; 
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            height: 100vh;
        }
        .order-card {
            background: #0f172a;
            border-radius: 1.5rem;
            border: 2px solid #1e293b;
            display: flex;
            flex-direction: column;
            animation: slideIn 0.3s ease-out;
        }
        .order-card.priority { border-color: #f59e0b; }
        .order-card.urgent { border-color: #ef4444; background: #450a0a; }
        
        .item-row { border-bottom: 1px solid #1e293b; padding: 1rem 0; }
        .item-row:last-child { border-bottom: none; }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col">

    <!-- KDS Header -->
    <header class="bg-[#0f172a] border-b-2 border-slate-800 p-6 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="h-10 w-10 bg-orange-600 rounded-lg flex items-center justify-center text-xl">🔪</div>
            <h1 class="text-2xl font-black tracking-tighter uppercase">Kitchen <span class="text-orange-500">Display</span></h1>
        </div>
        <div class="flex items-center gap-8">
            <div class="text-right">
                <p id="clock" class="text-2xl font-bold text-slate-400">00:00:00</p>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Estado: Operativo</p>
            </div>
            <div class="flex gap-2">
                <button onclick="loadOrders()" class="h-12 w-12 bg-slate-800 rounded-xl flex items-center justify-center hover:bg-slate-700">🔄</button>
            </div>
        </div>
    </header>

    <!-- Orders Grid -->
    <main id="kds-grid" class="flex-1 overflow-x-auto flex gap-6 p-6 no-scrollbar">
        <!-- Inyectado via JS -->
        <div class="flex flex-col items-center justify-center w-full opacity-20">
            <div class="text-8xl mb-4">🍗</div>
            <p class="text-xl font-bold">Esperando pedidos...</p>
        </div>
    </main>

    <script>
        const API_URL = "/api";
        let activeOrders = [];

        async function loadOrders() {
            try {
                const res = await fetch(`${API_URL}/orders?estado=EN_PREPARACION`);
                activeOrders = await res.json();
                renderKDS();
            } catch (e) {
                console.error("KDS sync error", e);
            }
        }

        function renderKDS() {
            const grid = document.getElementById('kds-grid');
            if (activeOrders.length === 0) {
                grid.innerHTML = `<div class="flex flex-col items-center justify-center w-full opacity-20">
                                    <div class="text-8xl mb-4">🍗</div>
                                    <p class="text-xl font-bold uppercase tracking-widest">Cocina en Silencio</p>
                                  </div>`;
                return;
            }

            grid.innerHTML = activeOrders.map(order => {
                const elapsedMin = Math.floor((new Date() - new Date(order.fecha)) / 60000);
                const isUrgent = elapsedMin > 15;
                const isPriority = order.origen === ' DELIVERY' || elapsedMin > 8;

                return `
                    <div class="order-card w-[350px] shrink-0 ${isUrgent ? 'urgent' : (isPriority ? 'priority' : '')}">
                        <div class="p-5 border-b border-white/5 flex justify-between items-start">
                            <div>
                                <h3 class="text-3xl font-black text-white leading-none">${order.numero_ticket}</h3>
                                <p class="text-[10px] font-bold text-slate-500 uppercase mt-2 tracking-widest">${order.origen}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-xl font-black ${isUrgent ? 'text-white' : 'text-orange-500'}">${elapsedMin}m</span>
                                <p class="text-[8px] font-black opacity-40 uppercase">Espera</p>
                            </div>
                        </div>
                        
                        <div class="flex-1 p-5 overflow-y-auto space-y-4">
                            ${order.items.map(it => `
                                <div class="item-row">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-2xl font-black text-white">x${it.cantidad}</span>
                                        <span class="text-xs font-bold text-slate-400 bg-white/5 px-2 py-0.5 rounded uppercase">${it.nombre.slice(0,10)}</span>
                                    </div>
                                    <h4 class="text-xl font-bold text-orange-200 uppercase">${it.nombre}</h4>
                                </div>
                            `).join('')}
                            
                            ${order.notas_cliente ? `
                                <div class="bg-yellow-500/10 p-3 rounded-xl border border-yellow-500/20">
                                    <p class="text-[10px] font-black text-yellow-500 uppercase mb-1">Nota del Cliente</p>
                                    <p class="text-sm font-bold text-yellow-100">${order.notas_cliente}</p>
                                </div>
                            ` : ''}
                        </div>

                        <div class="p-5">
                            <button onclick="finishOrder('${order.id}')" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl text-xl font-black shadow-lg shadow-emerald-900/40 transition-all active:scale-95">
                                COMPLETAR
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function finishOrder(id) {
            try {
                const res = await fetch(`${API_URL}/orders/${id}/estado?estado=LISTO`, { method: 'PUT' });
                if (res.ok) {
                    loadOrders();
                }
            } catch (e) {
                alert("Error al finalizar pedido.");
            }
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }

        setInterval(updateClock, 1000);
        setInterval(loadOrders, 5000); // Poll cada 5s
        loadOrders();
    </script>
</body>
</html>
