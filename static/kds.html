<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KDS Singularity | Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/enterprise_shell.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; }
        .order-card {
            background: #1e293b;
            border-bottom: 8px solid #334155;
            transition: all 0.3s ease;
        }
        .order-card.priority-high { border-bottom-color: #ef4444; }
        .order-card.priority-medium { border-bottom-color: #f59e0b; }
        .item-row { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .timer { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="p-6 pt-24" data-active-module="KDS">
    <div class="max-w-[100vw] mx-auto">
        <header class="flex justify-between items-center mb-8 bg-slate-900/50 p-6 rounded-3xl backdrop-blur-xl border border-white/5">
            <div>
                <h1 class="text-4xl font-black tracking-tighter">KITCHEN DISPLAY SYSTEM</h1>
                <p class="text-slate-500 font-bold uppercase tracking-widest text-[10px]">Active Orders: <span id="active-count">0</span></p>
            </div>
            <div class="flex gap-4">
                <div class="px-6 py-3 bg-emerald-500/10 rounded-2xl border border-emerald-500/20">
                    <p class="text-[8px] font-black text-emerald-500 uppercase mb-1">Avg. Prep Time</p>
                    <p class="text-xl font-black">12:45 <span class="text-xs">min</span></p>
                </div>
            </div>
        </header>

        <div id="kds-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- Order cards will be injected here -->
        </div>
    </div>

    <script>
        EnterpriseShell.init('KDS');

        let currentOrderIds = new Set();
        
        // Cargar Sonido (Campana de Servicio)
        const bellSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2868/2868-preview.mp3');

        async function loadOrders() {
            try {
                const res = await fetch('/api/pedidos');
                const orders = await res.json();
                const grid = document.getElementById('kds-grid');
                grid.innerHTML = '';
                
                const activeOrders = orders.filter(o => o.estado === 'PENDIENTE' || o.estado === 'EN_PREPARACION');
                document.getElementById('active-count').innerText = activeOrders.length;

                // Detectar si hay pedidos nuevos basados en el ID para sonar la campana (fallback si falla WS)
                const newIds = new Set(activeOrders.map(o => o.id));
                let hasNew = false;
                for (let id of newIds) {
                    if (!currentOrderIds.has(id)) hasNew = true;
                }
                if (hasNew && currentOrderIds.size > 0) {
                    bellSound.play().catch(e => console.log('Autoplay policy blocked sound', e));
                }
                currentOrderIds = newIds;

                activeOrders.forEach(order => {
                    const card = document.createElement('div');
                    card.className = `order-card p-6 rounded-3xl flex flex-col h-full ${order.id % 3 === 0 ? 'priority-high' : ''}`;
                    
                    const timeDiff = Math.floor((new Date() - new Date(order.fecha)) / 1000);
                    const minutes = Math.floor(timeDiff / 60);
                    const seconds = timeDiff % 60;

                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">#${order.numero_ticket}</p>
                                <h3 class="text-2xl font-black">${order.cliente?.nombre || 'Anónimo'}</h3>
                            </div>
                            <div class="timer text-xl font-bold ${minutes > 15 ? 'text-red-500' : 'text-emerald-400'}">
                                ${minutes}:${seconds.toString().padStart(2, '0')}
                            </div>
                        </div>
                        <div class="flex-grow space-y-3 mb-6">
                            ${order.items.map(item => `
                                <div class="item-row pb-2 flex justify-between">
                                    <span class="font-bold"><span class="text-indigo-400">x${item.cantidad}</span> ${item.nombre}</span>
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="updateOrder(${order.id}, 'PREPARADO')" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-black uppercase tracking-widest text-xs transition-all">
                            MARCAR LISTO
                        </button>
                    `;
                    grid.appendChild(card);
                });
            } catch(e) { console.error(e); }
        }

        async function updateOrder(id, status) {
            await fetch(`/api/pedidos/${id}/estado?nuevo_estado=${status}`, { method: 'PUT' });
            loadOrders();
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${protocol}//${window.location.host}/api/ws/kds`);
            
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.type === 'new_order') {
                    bellSound.play().catch(e => console.log('Autoplay blocked:', e));
                    loadOrders(); // Recargar inmediatamente
                    // Mostrar notificación visual efímera
                    if(typeof EnterpriseUI !== 'undefined') {
                        EnterpriseUI.notify(`¡NUEVO PEDIDO RECIBIDO! #${data.payload.ticket}`, 'success');
                    }
                }
            };
            
            ws.onclose = function() {
                console.log('WS KDS cerrado. Reconectando...');
                setTimeout(connectWebSocket, 3000);
            };
        }

        // Init
        connectWebSocket();
        setInterval(loadOrders, 5000); // Polling as backup and for updating timers
        loadOrders();
    </script>
</body>
</html>
