<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS | Kitchen Display System - Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f1f5f9; overflow: hidden; }
        .order-card { background: #1e293b; border: 1px solid #334155; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .order-card.ready { opacity: 0.5; transform: scale(0.95); pointer-events: none; }
        .order-card.priority { border-left: 12px solid #f59e0b; }
        .order-card.delivery { border-left: 12px solid #3b82f6; }
        .urgent-pulse { animation: urgent 1s infinite; }
        @keyframes urgent { 0% { border-color: #334155; } 50% { border-color: #ef4444; background: #450a0a; } 100% { border-color: #334155; } }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #455a64; border-radius: 10px; }
        
        .timer-badge { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="h-screen flex flex-col p-6">
    <header class="flex justify-between items-center mb-8 bg-slate-800/80 backdrop-blur-md p-6 rounded-[2rem] border border-slate-700 shadow-2xl">
        <div class="flex items-center gap-6">
            <div class="w-14 h-14 bg-amber-500 rounded-3xl flex items-center justify-center text-3xl shadow-lg shadow-amber-500/20">🔥</div>
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter">Kitchen <span class="text-amber-500">Master</span></h1>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Operational Dashboard | <span id="current-time">00:00:00</span></p>
            </div>
        </div>
        <div class="flex gap-4">
            <div class="bg-slate-900/50 px-8 py-3 rounded-2xl border border-slate-700 text-center">
                <span class="text-[9px] block text-slate-500 font-black uppercase tracking-widest mb-1">Activos</span>
                <span id="count-pending" class="text-3xl font-black text-amber-500">0</span>
            </div>
            <div class="bg-slate-900/50 px-8 py-3 rounded-2xl border border-slate-700 text-center">
                <span class="text-[9px] block text-slate-500 font-black uppercase tracking-widest mb-1">Turno</span>
                <span id="shift-label" class="text-3xl font-black text-blue-400">---</span>
            </div>
        </div>
    </header>

    <main id="kds-grid" class="flex-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6 overflow-y-auto custom-scrollbar pr-2 pb-10">
        <!-- Loader inicial -->
        <div class="flex flex-col items-center justify-center col-span-full opacity-10 py-60">
            <div class="text-[120px] animate-bounce">🍗</div>
            <h2 class="text-4xl font-black uppercase tracking-[0.5em]">Sincronizando...</h2>
        </div>
    </main>

    <!-- Notificador de Audio (Opcional) -->
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        let orders = [];
        let lastOrderCount = 0;
        const grid = document.getElementById('kds-grid');

        async function fetchOrders() {
            try {
                const res = await fetch('/api/orders/pending');
                if (res.ok) {
                    const newOrders = await res.json();
                    
                    // Sonido si hay pedidos nuevos
                    if (newOrders.length > lastOrderCount) {
                        document.getElementById('alert-sound').play().catch(() => {});
                    }
                    
                    orders = newOrders;
                    lastOrderCount = orders.length;
                    renderOrders();
                }
            } catch (e) { console.error("KDS Sync Error:", e); }
        }

        function renderOrders() {
            if (orders.length === 0) {
                grid.innerHTML = `
                <div class="flex flex-col items-center justify-center col-span-full opacity-10 py-60">
                    <div class="text-[120px]">🔥</div>
                    <h2 class="text-4xl font-black uppercase tracking-[0.5em]">Cocina Despejada</h2>
                </div>`;
                document.getElementById('count-pending').innerText = "0";
                return;
            }

            document.getElementById('count-pending').innerText = orders.length;
            
            grid.innerHTML = orders.map(order => {
                const timeDiff = Math.floor((new Date() - new Date(order.fecha)) / 60000);
                const isUrgent = timeDiff > 12;
                const isDelivery = order.metodo_envio === 'DOMICILIO';
                const typeLabel = isDelivery ? '🛵 DOMICILIO' : '🏪 LOCAL';
                
                return `
                <div class="order-card flex flex-col rounded-[2.5rem] overflow-hidden shadow-2xl ${isUrgent ? 'urgent-pulse' : ''} ${isDelivery ? 'delivery' : 'priority'} animate-fade-in">
                    <div class="bg-white/5 p-6 flex justify-between items-center border-b border-white/5">
                        <div>
                            <span class="text-4xl font-black text-white block">#${order.numero_ticket}</span>
                            <span class="text-[10px] font-black uppercase tracking-widest text-amber-500">${typeLabel}</span>
                        </div>
                        <div class="timer-badge px-4 py-2 rounded-2xl border border-white/10">
                            <span class="text-xl font-black ${isUrgent ? 'text-red-500' : 'text-slate-400'}">${timeDiff}'</span>
                        </div>
                    </div>
                    
                    <div class="p-6 flex-1 overflow-y-auto custom-scrollbar">
                        <ul class="space-y-6">
                            ${order.items.map(it => `
                                <li class="flex gap-4">
                                    <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center font-black text-slate-900 text-xl flex-shrink-0">${it.cantidad}</div>
                                    <div class="flex-1">
                                        <p class="text-lg font-black uppercase leading-tight text-white">${it.nombre}</p>
                                        ${it.notas ? `<p class="text-xs text-amber-500/80 mt-1 font-bold">⚠️ ${it.notas}</p>` : ''}
                                    </div>
                                </li>
                            `).join('')}
                        </ul>
                        
                        ${isDelivery && order.direccion ? `
                        <div class="mt-8 p-4 bg-blue-500/10 border border-blue-500/20 rounded-2xl">
                            <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-1">Dirección de Envío</p>
                            <p class="text-xs font-bold text-slate-300">${order.direccion}</p>
                        </div>
                        ` : ''}
                    </div>

                    <div class="p-4 bg-black/40">
                        <button onclick="updateStatus('${order.id}', 'LISTO', this)" class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 text-white font-black uppercase tracking-[0.2em] text-sm rounded-[1.5rem] transition-all shadow-lg active:scale-95 flex items-center justify-center gap-3">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            Completar
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        }

        async function updateStatus(id, status, btn) {
            btn.innerHTML = '<span class="animate-spin text-2xl">🌀</span>';
            btn.classList.add('opacity-50', 'pointer-events-none');
            
            try {
                const res = await fetch(`/api/orders/${id}/estado?estado=${status}`, { method: 'PUT' });
                if (res.ok) {
                    const card = btn.closest('.order-card');
                    card.classList.add('ready');
                    card.style.transform = 'translateY(100px)';
                    card.style.opacity = '0';
                    setTimeout(fetchOrders, 400);
                }
            } catch (e) { console.error("KDS Update Fail:", e); }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString();
            document.getElementById('shift-label').innerText = now.getHours() >= 18 ? 'NOCHE' : 'MAÑANA';
        }

        setInterval(updateClock, 1000);
        setInterval(fetchOrders, 5000);
        
        updateClock();
        fetchOrders();
    </script>
</body>
</html>
