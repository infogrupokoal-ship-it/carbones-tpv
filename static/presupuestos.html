<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Quotes | Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/enterprise_shell.css">
</head>
<body class="min-h-screen">
    <div class="bg-grid-industrial"></div>

    <div class="flex h-screen overflow-hidden">
        <div id="enterprise-sidebar"></div>

        <main class="flex-1 p-8 lg:p-20 overflow-y-auto">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-10 mb-20">
                <div>
                    <p class="text-[10px] font-black text-indigo-600 uppercase tracking-[0.5em] mb-4">Commercial Pipeline Unit</p>
                    <h1 class="text-6xl lg:text-7xl font-black text-slate-900 tracking-tighter uppercase">
                        Master <span class="text-indigo-600">Quotes</span>
                    </h1>
                </div>
                <button class="bg-indigo-600 text-white font-black text-[10px] uppercase tracking-widest px-10 py-5 rounded-2xl shadow-xl shadow-indigo-100 hover:scale-105 active:scale-95 transition-all">
                    Nueva Cotización
                </button>
            </header>

        <div id="module-telemetry" class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-16"></div>

            <!-- Pipeline Status -->
            <div class="flex gap-4 mb-16 overflow-x-auto pb-4">
                <button class="px-8 py-3 rounded-2xl bg-white border border-slate-100 text-[10px] font-black uppercase tracking-widest text-indigo-600 shadow-sm">Todos (24)</button>
                <button class="px-8 py-3 rounded-2xl bg-white border border-slate-50 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-slate-600 transition-all">Borradores (5)</button>
                <button class="px-8 py-3 rounded-2xl bg-white border border-slate-50 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-slate-600 transition-all">Enviados (12)</button>
                <button class="px-8 py-3 rounded-2xl bg-white border border-slate-50 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-slate-600 transition-all">Aceptados (7)</button>
            </div>

            <!-- Quote Cards -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="glass-panel p-10 rounded-[3rem] relative group cursor-pointer hover:border-indigo-200 transition-all">
                    <div class="absolute top-10 right-10">
                        <span class="badge badge-indigo">Enviado</span>
                    </div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">#PR-2024-001</p>
                    <h4 class="text-2xl font-black text-slate-900 uppercase tracking-tighter mb-2">Evento Corporativo Alpha</h4>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-10">Catering / 50 Personas</p>
                    
                    <div class="flex items-end justify-between">
                        <div>
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Presupuesto Total</p>
                            <h3 class="text-4xl font-black text-slate-900 tracking-tighter">1.250€</h3>
                        </div>
                        <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white transition-all">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-10 rounded-[3rem] border-dashed border-2 flex flex-col items-center justify-center opacity-40 hover:opacity-100 transition-all cursor-pointer">
                    <div class="w-20 h-20 rounded-full bg-slate-100 flex items-center justify-center mb-6">
                        <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                    <p class="text-[10px] font-black uppercase tracking-[0.3em]">Nueva Propuesta</p>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/enterprise_shell.js"></script>
    <script>
        window.onload = () => {
            EnterpriseShell.init('Presupuestos');
        };
    </script>

    <script>
        window.addEventListener('load', () => {
            if (typeof EnterpriseUI !== 'undefined') {
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Estado del Nodo',
                    value: 'ACTIVO',
                    unit: 'SECURE',
                    trend: 'up',
                    trendValue: '100%',
                    icon: 'fa-server'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Carga de Trabajo',
                    value: Math.floor(Math.random() * 40 + 20),
                    unit: '%',
                    trend: 'up',
                    trendValue: 'LOW',
                    icon: 'fa-microchip'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Latencia Sync',
                    value: Math.floor(Math.random() * 50 + 10),
                    unit: 'ms',
                    trend: 'down',
                    trendValue: 'OPTIMAL',
                    icon: 'fa-bolt'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Seguridad',
                    value: 'V4.0',
                    unit: 'SSL',
                    trend: 'up',
                    trendValue: 'MAX',
                    icon: 'fa-shield-halved'
                });
            }
        });
    </script>
            
</body>
</html>
