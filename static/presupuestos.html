<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Comercial | TPV Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/enterprise_shell.css">
    <style>
        :root {
            --primary: #3b82f6;
            --bg-base: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.05);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-base); 
            margin: 0;
            color: #1e293b;
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.01) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.01) 1px, transparent 1px);
            z-index: -2;
            pointer-events: none;
        }
        .ambient-glow {
            position: fixed;
            top: -20%;
            left: -10%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.05) 0%, transparent 60%);
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.05);
        }
        .quote-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .quote-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex min-h-screen">
    <div class="bg-grid"></div>
    <div class="ambient-glow"></div>

    <!-- Main Workspace -->
    <main class="flex-1 p-8 lg:p-12 overflow-y-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12 border-b border-slate-100 pb-8">
            <div>
                <h1 class="text-4xl lg:text-5xl font-black text-slate-900 tracking-tighter uppercase">Gestión de <span class="text-indigo-600">Presupuestos</span></h1>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-[0.3em] mt-3 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                    Pipeline Comercial • Enterprise v3.0
                </p>
            </div>
            <button onclick="openModal()" class="bg-slate-900 hover:bg-slate-800 text-white font-black text-xs uppercase tracking-widest px-8 py-4 rounded-2xl shadow-xl transition-all transform active:scale-95 flex items-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                Nueva Cotización
            </button>
        </header>

        <!-- Filters -->
        <div class="flex gap-4 mb-10 overflow-x-auto pb-2">
            <button onclick="filterQuotes('ALL')" class="px-6 py-2 rounded-xl bg-white border border-slate-100 text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 transition-all shadow-sm">Todos</button>
            <button onclick="filterQuotes('BORRADOR')" class="px-6 py-2 rounded-xl bg-white border border-slate-100 text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 transition-all shadow-sm">Borradores</button>
            <button onclick="filterQuotes('ENVIADO')" class="px-6 py-2 rounded-xl bg-blue-50 border border-blue-100 text-blue-600 text-[10px] font-black uppercase tracking-widest hover:bg-blue-100 transition-all shadow-sm">Enviados</button>
            <button onclick="filterQuotes('ACEPTADO')" class="px-6 py-2 rounded-xl bg-emerald-50 border border-emerald-100 text-emerald-600 text-[10px] font-black uppercase tracking-widest hover:bg-emerald-100 transition-all shadow-sm">Aceptados</button>
        </div>

        <!-- Grid de Presupuestos -->
        <div id="quotes-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
            <!-- Loading -->
            <div class="col-span-full py-40 text-center opacity-30">
                <div class="text-5xl animate-bounce mb-4">📄</div>
                <p class="text-xs font-black uppercase tracking-widest">Sincronizando Pipeline...</p>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden col-span-full py-40 text-center">
            <div class="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">🏜️</div>
            <h3 class="text-xl font-black text-slate-900 uppercase tracking-tight">Sin Movimiento Comercial</h3>
            <p class="text-slate-500 text-sm mt-2 mb-8">Empieza creando una propuesta para tus clientes.</p>
            <button onclick="openModal()" class="bg-white border border-slate-200 text-slate-900 font-black text-[10px] uppercase tracking-widest px-6 py-3 rounded-xl transition-all">Crear Presupuesto</button>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal-presupuesto" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm hidden opacity-0 transition-all duration-300">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] p-12 border border-white shadow-2xl transform scale-95 transition-all duration-300">
            <div class="flex justify-between items-center mb-10">
                <h3 class="text-2xl font-black text-slate-900 tracking-tighter uppercase">Nueva <span class="text-blue-500">Propuesta</span></h3>
                <button onclick="closeModal()" class="p-3 hover:bg-slate-100 rounded-full transition-all text-slate-400">✕</button>
            </div>

            <form id="quote-form" onsubmit="saveQuote(event)" class="space-y-8">
                <div class="grid grid-cols-2 gap-8">
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Cliente</label>
                        <select id="q-cliente" class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-sm focus:bg-white focus:border-blue-500 outline-none transition-all">
                            <option value="">Consumidor Final</option>
                        </select>
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Fecha Límite</label>
                        <input type="date" id="q-fecha" class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-sm focus:bg-white focus:border-blue-500 outline-none transition-all">
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Desglose Comercial</label>
                    <div id="items-list" class="space-y-3 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Items -->
                    </div>
                    <button type="button" onclick="addItemRow()" class="w-full py-4 bg-slate-50 hover:bg-slate-100 border border-dashed border-slate-200 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-500">
                        + Agregar Producto/Servicio
                    </button>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-[0.2em] text-sm rounded-[2rem] transition-all shadow-xl shadow-blue-600/20">
                        Finalizar y Emitir Presupuesto
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/enterprise_shell.js"></script>
    <script>
        EnterpriseShell.init('Pipeline Comercial');

        let quotes = [];
        let productos = [];
        let clientes = [];

        async function init() {
            await Promise.all([fetchQuotes(), fetchProductos(), fetchClientes()]);
            renderQuotes();
            populateSelects();
        }

        async function fetchQuotes() {
            try {
                const res = await fetch('/api/commercial/quotes');
                quotes = await res.json();
            } catch (e) { console.error(e); }
        }

        async function fetchProductos() {
            try {
                const res = await fetch('/api/inventory/products');
                productos = await res.json();
            } catch (e) { console.error(e); }
        }

        async function fetchClientes() {
            try {
                const res = await fetch('/api/customers');
                clientes = await res.json();
            } catch (e) { console.error(e); }
        }

        function renderQuotes(filter = 'ALL') {
            const grid = document.getElementById('quotes-grid');
            const empty = document.getElementById('empty-state');
            const filtered = filter === 'ALL' ? quotes : quotes.filter(q => q.estado === filter);
            
            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            
            empty.classList.add('hidden');
            grid.innerHTML = filtered.map(q => `
                <div class="glass-panel p-8 rounded-[2.5rem] quote-card bg-white">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[9px] font-black text-slate-400 block uppercase tracking-widest mb-1">${q.numero_presupuesto}</span>
                            <h3 class="text-xl font-black text-slate-900 uppercase tracking-tight">${q.cliente_nombre || 'Consumidor Final'}</h3>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${q.estado === 'ACEPTADO' ? 'bg-emerald-50 text-emerald-600' : 'bg-blue-50 text-blue-600'}">
                            ${q.estado}
                        </span>
                    </div>
                    
                    <div class="space-y-3 mb-8 border-l-2 border-slate-50 pl-4">
                        ${q.items.slice(0, 2).map(it => `
                            <div class="flex justify-between text-xs text-slate-500">
                                <span class="font-bold">${it.cantidad}x ${it.nombre}</span>
                                <span class="font-black text-slate-900">${(it.cantidad * it.precio_unitario).toFixed(2)}€</span>
                            </div>
                        `).join('')}
                        ${q.items.length > 2 ? `<p class="text-[9px] text-slate-300 font-bold uppercase">+ ${q.items.length - 2} conceptos más</p>` : ''}
                    </div>

                    <div class="flex items-center justify-between pt-6 border-t border-slate-50">
                        <div class="text-2xl font-black text-slate-900">${q.total.toFixed(2)}<span class="text-xs ml-1 font-bold text-slate-400">€</span></div>
                        <div class="flex gap-2">
                            <button onclick="sendToWhatsApp('${q.id}')" class="p-3 bg-emerald-50 text-emerald-600 rounded-2xl hover:bg-emerald-100 transition-all">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.038 3.284l-.542 2.317 2.134-.549c.954.514 2.02.788 3.137.789h.001c3.182 0 5.767-2.587 5.768-5.767 0-3.18-2.586-5.766-5.767-5.766zm3.375 8.203c-.147.415-.744.757-1.025.795-.27.037-.534.058-1.57-.369-1.035-.427-1.705-1.487-1.757-1.558-.052-.071-.444-.592-.444-1.129 0-.537.28-.801.379-.905.1-.104.216-.131.288-.131.072 0 .144.001.206.004.066.002.155-.025.242.185.087.21.298.728.324.781.026.053.043.114.007.185-.035.071-.053.114-.107.175-.053.061-.112.136-.16.182-.053.053-.109.111-.047.219.062.107.276.455.592.736.406.363.748.475.856.529.108.053.171.044.234-.029.062-.073.271-.318.344-.426.072-.108.145-.091.243-.054.1.036.634.3.744.354.11.053.183.08.21.125.027.045.027.26-.12.675z"/></svg>
                            </button>
                            <button onclick="changeStatus('${q.id}', 'ACEPTADO')" class="p-3 bg-blue-600 text-white rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-600/20">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function populateSelects() {
            const sel = document.getElementById('q-cliente');
            sel.innerHTML = '<option value="">Consumidor Final</option>' + 
                clientes.map(c => `<option value="${c.id}">${c.nombre} (${c.telefono})</option>`).join('');
        }

        let itemRows = 0;
        function addItemRow() {
            const list = document.getElementById('items-list');
            const id = `row-${itemRows++}`;
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex gap-4 p-2 bg-slate-50 rounded-2xl border border-slate-100";
            div.innerHTML = `
                <select class="flex-1 bg-transparent text-sm font-bold p-2 outline-none">
                    <option value="">Seleccionar Producto...</option>
                    ${productos.map(p => `<option value="${p.id}">${p.nombre} - ${p.precio}€</option>`).join('')}
                </select>
                <input type="number" value="1" min="1" class="w-20 bg-white rounded-xl text-center font-black text-sm outline-none border border-slate-100">
                <button type="button" onclick="document.getElementById('${id}').remove()" class="p-2 text-slate-300 hover:text-red-500 transition-colors">✕</button>
            `;
            list.appendChild(div);
        }

        function openModal() {
            const m = document.getElementById('modal-presupuesto');
            m.classList.remove('hidden');
            setTimeout(() => { m.classList.remove('opacity-0'); m.querySelector('div').classList.remove('scale-95'); }, 10);
            if (itemRows === 0) addItemRow();
        }

        function closeModal() {
            const m = document.getElementById('modal-presupuesto');
            m.classList.add('opacity-0'); m.querySelector('div').classList.add('scale-95');
            setTimeout(() => m.classList.add('hidden'), 300);
        }

        async function saveQuote(e) {
            e.preventDefault();
            const items = [];
            document.querySelectorAll('#items-list > div').forEach(row => {
                const prodId = row.querySelector('select').value;
                const qty = row.querySelector('input').value;
                if (prodId) items.push({ producto_id: prodId, cantidad: parseInt(qty) });
            });

            const data = {
                cliente_id: document.getElementById('q-cliente').value || null,
                fecha_validez: document.getElementById('q-fecha').value || null,
                items: items
            };

            try {
                const res = await fetch('/api/commercial/quotes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) { await fetchQuotes(); renderQuotes(); closeModal(); }
            } catch (e) { alert("Error"); }
        }

        async function changeStatus(id, status) {
            try {
                const res = await fetch(`/api/commercial/quotes/${id}/status?estado=${status}`, { method: 'PUT' });
                if (res.ok) { await fetchQuotes(); renderQuotes(); }
            } catch (e) { console.error(e); }
        }

        function sendToWhatsApp(id) {
            const q = quotes.find(quote => quote.id === id);
            if (!q) return;
            const msg = `Hola! Soy de Carbones y Pollos. Te envío el presupuesto ${q.numero_presupuesto} por un total de ${q.total.toFixed(2)}€. ¿Deseas confirmarlo?`;
            window.open(`https://wa.me/34600000000?text=${encodeURIComponent(msg)}`, '_blank');
        }

        init();
    </script>
</body>
</html>
