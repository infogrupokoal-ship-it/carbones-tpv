<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPV Enterprise | Carbones y Pollos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tpv_premium.css">
    <style>
        /* Ajustes específicos para el layout base */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Categorías -->
        <aside id="cat-sidebar">
            <div class="p-4 flex flex-col items-center border-bottom border-color mb-4">
                <span class="text-[10px] font-black tracking-widest text-secondary">TPV v2.0</span>
            </div>
            <div id="cat-list">
                <!-- Injected via JS -->
            </div>
        </aside>

        <!-- Área Principal: Buscador y Parrilla de Productos -->
        <main id="product-area">
            <header class="p-6 border-bottom border-color flex items-center justify-between glass">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-accent-fire rounded-2xl flex items-center justify-center text-2xl">🔥</div>
                    <div>
                        <h1 class="text-xl font-black uppercase tracking-tight m-0">Carbones y Pollos</h1>
                        <p class="text-[9px] text-secondary font-bold uppercase tracking-widest">NIF: B24823270 | Av. Malvarrosa 112</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <input type="text" id="main-search" placeholder="Buscar producto (F2)..." 
                            class="bg-surface border border-color rounded-xl px-10 py-3 text-sm font-bold w-64 focus:border-accent-fire outline-none transition-all">
                        <span class="absolute left-4 top-3.5 opacity-30">🔍</span>
                    </div>
                    <div id="status-badge" class="flex items-center gap-2 px-4 py-2 bg-emerald-500/10 rounded-full border border-emerald-500/20">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                        <span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Online</span>
                    </div>
                </div>
            </header>

            <section id="prod-grid-container" class="product-grid">
                <!-- Injected via JS -->
            </section>
        </main>

        <!-- Sidebar Ticket -->
        <aside id="ticket-sidebar">
            <div class="ticket-header">
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-secondary uppercase tracking-widest">Operación Activa</span>
                    <h2 class="text-lg font-black uppercase m-0">Ticket #<span id="ticket-num">---</span></h2>
                </div>
                <button onclick="clearTicket()" class="text-[10px] font-black text-red-500 uppercase hover:bg-red-500/10 px-3 py-2 rounded-lg transition-all">Limpiar</button>
            </div>

            <div id="ticket-list" class="ticket-items">
                <!-- Items injected here -->
                <div id="empty-hint" class="flex flex-col items-center justify-center h-full opacity-20">
                    <span class="text-6xl mb-4">🛒</span>
                    <p class="font-black uppercase text-sm tracking-widest">Carrito Vacío</p>
                </div>
            </div>

            <div class="ticket-footer glass">
                <div class="flex flex-col gap-3 mb-6">
                    <div class="flex justify-between items-center px-2">
                        <span class="text-secondary font-bold">Subtotal</span>
                        <span id="txt-subtotal" class="font-black">0.00 €</span>
                    </div>
                    <div class="flex justify-between items-center px-2">
                        <span class="text-secondary font-bold">IVA (10%)</span>
                        <span id="txt-iva" class="font-black">0.00 €</span>
                    </div>
                    <div class="flex justify-between items-center px-2 pt-3 border-top border-color">
                        <span class="text-xl font-black uppercase">Total</span>
                        <span id="txt-total" class="text-3xl font-black text-accent-fire">0.00 €</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <select id="sel-payment" class="bg-surface border border-color rounded-xl p-3 font-bold outline-none text-xs">
                        <option value="EFECTIVO">💵 EFECTIVO</option>
                        <option value="TARJETA" selected>💳 TARJETA</option>
                        <option value="BIZUM">📱 BIZUM</option>
                    </select>
                    <select id="sel-origin" class="bg-surface border border-color rounded-xl p-3 font-bold outline-none text-xs">
                        <option value="MOSTRADOR">🏪 MOSTRADOR</option>
                        <option value="TELEFONO">📞 TELÉFONO</option>
                        <option value="DELIVERY">🛵 DELIVERY</option>
                    </select>
                </div>

                <button onclick="processCheckout()" class="btn-checkout">
                    Confirmar Pago
                </button>
            </div>
        </aside>
    </div>

    <!-- Modales, Overlays, etc. -->
    <div id="modal-success" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[200] hidden flex items-center justify-center">
        <div class="bg-surface border border-color rounded-[2.5rem] p-12 text-center max-w-sm w-full animate-bounce-in">
            <span class="text-7xl mb-6 block">🍗</span>
            <h2 class="text-3xl font-black uppercase mb-2">¡Venta Exitosa!</h2>
            <p class="text-secondary font-bold mb-8 uppercase tracking-widest">Imprimiendo tickets...</p>
            <div class="flex flex-col gap-3">
                <button onclick="closeSuccess()" class="bg-accent-fire text-white font-black py-4 rounded-2xl uppercase tracking-widest">Siguiente Pedido</button>
                <button onclick="forcePrint()" class="bg-white/5 text-secondary font-black py-4 rounded-2xl uppercase tracking-widest hover:bg-white/10">Re-Imprimir</button>
            </div>
        </div>
    </div>

    <script>
        // Lógica Industrial TPV
        let state = {
            products: [],
            categories: [],
            cart: [],
            activeCat: null,
            lastTicket: null
        };

        const CONFIG = {
            api: '/api',
            iva: 0.10
        };

        // Eventos de búsqueda
        document.getElementById('main-search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.nombre.toLowerCase().includes(term) || 
                p.categoria.toLowerCase().includes(term)
            );
            renderProducts(filtered);
        });

        // Hotkeys
        window.addEventListener('keydown', (e) => {
            if (e.key === 'F2') {
                e.preventDefault();
                document.getElementById('main-search').focus();
            }
        });

        async function init() {
            await loadCatalog();
            setupEvents();
            render();
        }

        async function loadCatalog() {
            try {
                const res = await fetch(`${CONFIG.api}/productos/`);
                const data = await res.json();
                state.products = Array.isArray(data) ? data : (data.value || []);
                
                // Extraer categorías únicas
                const catMap = {};
                state.products.forEach(p => {
                    if (p.categoria_id && !catMap[p.categoria_id]) {
                        catMap[p.categoria_id] = p.categoria || "General";
                    }
                });
                state.categories = Object.entries(catMap).map(([id, nombre]) => ({ id, nombre }));
                
                if (state.categories.length > 0) state.activeCat = state.categories[0].id;
            } catch (e) {
                console.error("Fallo al cargar catálogo", e);
            }
        }

        function setupEvents() {
            document.getElementById('main-search').addEventListener('input', (e) => {
                renderProducts(e.target.value.toLowerCase());
            });

            window.addEventListener('keydown', (e) => {
                if (e.key === 'F2') {
                    e.preventDefault();
                    document.getElementById('main-search').focus();
                }
            });
        }

        function render() {
            renderCategories();
            renderProducts();
            renderCart();
        }

        function renderCategories() {
            const list = document.getElementById('cat-list');
            list.innerHTML = state.categories.map(cat => `
                <div onclick="setActiveCat('${cat.id}')" class="cat-item ${state.activeCat === cat.id ? 'active' : ''}">
                    <span class="emoji">${getEmoji(cat.nombre)}</span>
                    <span class="name">${cat.nombre}</span>
                </div>
            `).join('');
        }

        function setActiveCat(id) {
            state.activeCat = id;
            renderCategories();
            renderProducts();
        }

        function renderProducts(search = "") {
            const grid = document.getElementById('prod-grid-container');
            const filtered = state.products.filter(p => {
                const matchCat = !state.activeCat || p.categoria_id === state.activeCat;
                const matchSearch = p.nombre.toLowerCase().includes(search);
                return matchCat && matchSearch && p.is_active;
            });

            grid.innerHTML = filtered.map(p => `
                <div onclick="addToCart('${p.id}')" class="prod-card">
                    <span class="price-tag">${Number(p.price || p.precio).toFixed(2)}€</span>
                    <img src="${p.imagen_url || '/static/img/placeholder.png'}" onerror="this.src='https://via.placeholder.com/150?text=Pollos'">
                    <p class="font-black text-sm leading-tight">${p.nombre}</p>
                    <p class="text-[9px] text-secondary font-bold uppercase">${p.categoria || ''}</p>
                </div>
            `).join('');
        }

        function renderCart() {
            const list = document.getElementById('ticket-list');
            const hint = document.getElementById('empty-hint');
            
            if (state.cart.length === 0) {
                list.innerHTML = "";
                list.appendChild(hint);
                hint.style.display = "flex";
            } else {
                hint.style.display = "none";
                list.innerHTML = state.cart.map(item => `
                    <div class="ticket-item">
                        <div class="flex-1">
                            <p class="font-black text-sm m-0">${item.nombre}</p>
                            <p class="text-[10px] text-secondary font-bold">${item.precio.toFixed(2)}€ x ${item.cantidad}</p>
                        </div>
                        <div class="qty-controls">
                            <button onclick="updateQty('${item.producto_id}', -1)" class="btn-qty">−</button>
                            <span class="font-black text-sm w-4 text-center">${item.cantidad}</span>
                            <button onclick="updateQty('${item.producto_id}', 1)" class="btn-qty">+</button>
                        </div>
                        <span class="font-black text-sm min-w-[50px] text-right">${(item.precio * item.cantidad).toFixed(2)}€</span>
                    </div>
                `).join('');
            }

            updateTotals();
        }

        function updateTotals() {
            const subtotal = state.cart.reduce((acc, i) => acc + (i.precio * i.cantidad), 0);
            const iva = subtotal * CONFIG.iva;
            const total = subtotal + iva;

            document.getElementById('txt-subtotal').innerText = subtotal.toFixed(2) + " €";
            document.getElementById('txt-iva').innerText = iva.toFixed(2) + " €";
            document.getElementById('txt-total').innerText = total.toFixed(2) + " €";
        }

        function addToCart(id) {
            const prod = state.products.find(p => p.id === id);
            const existing = state.cart.find(i => i.producto_id === id);
            
            if (existing) {
                existing.cantidad++;
            } else {
                state.cart.push({
                    producto_id: id,
                    nombre: prod.nombre,
                    precio: Number(prod.price || prod.precio),
                    cantidad: 1
                });
            }
            renderCart();
        }

        function updateQty(id, delta) {
            const item = state.cart.find(i => i.producto_id === id);
            if (item) {
                item.cantidad += delta;
                if (item.cantidad <= 0) {
                    state.cart = state.cart.filter(i => i.producto_id !== id);
                }
            }
            renderCart();
        }

        function clearTicket() {
            if (confirm("¿Vaciar ticket actual?")) {
                state.cart = [];
                renderCart();
            }
        }

        async function processCheckout() {
            if (state.cart.length === 0) return;

            const payload = {
                items: state.cart.map(i => ({ producto_id: i.producto_id, cantidad: i.cantidad })),
                metodo_pago: document.getElementById('sel-payment').value,
                origen: document.getElementById('sel-origin').value,
                estado_inicial: 'COMPLETADO',
                metodo_envio: 'LOCAL'
            };

            try {
                const res = await fetch(`${CONFIG.api}/orders/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const order = await res.json();
                if (res.ok) {
                    state.lastTicket = order;
                    // Encolar impresión automática (Zero-Touch)
                    await enqueuePrint(order);
                    showSuccess();
                } else {
                    alert("Error: " + order.detail);
                }
            } catch (e) {
                alert("Fallo de conexión");
            }
        }

        async function enqueuePrint(order) {
            try {
                // Nuevo endpoint de cola de impresión
                await fetch(`${CONFIG.api}/print/queue/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        order_id: order.numero_ticket,
                        device_id: 'TPV_MOSTRADOR_01',
                        job_type: 'TICKET_CLIENTE',
                        payload: {
                            ticket_number: order.numero_ticket,
                            items: state.cart,
                            total: order.total,
                            payment: order.metodo_pago
                        }
                    })
                });
            } catch (e) {
                console.warn("No se pudo encolar impresión automática", e);
            }
        }

        function showSuccess() {
            document.getElementById('modal-success').classList.remove('hidden');
        }

        function closeSuccess() {
            document.getElementById('modal-success').classList.add('hidden');
            state.cart = [];
            renderCart();
        }

        function getEmoji(name) {
            name = name.toLowerCase();
            if (name.includes('pollo')) return '🍗';
            if (name.includes('pizza')) return '🍕';
            if (name.includes('burger') || name.includes('hamburguesa')) return '🍔';
            if (name.includes('arroz')) return '🥘';
            if (name.includes('bebida')) return '🥤';
            if (name.includes('postre')) return '🍰';
            if (name.includes('combo')) return '🛍️';
            return '🍽️';
        }

        init();
    </script>
</body>
</html>
