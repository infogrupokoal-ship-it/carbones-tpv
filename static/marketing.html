<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Hub | Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/enterprise_shell.css">
    <style>
        :root {
            --brand-primary: #ec4899; /* Pink for Marketing */
            --bg-base: #f8fafc;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-base); 
            margin: 0;
            color: #1e293b;
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.01) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.01) 1px, transparent 1px);
            z-index: -1;
            pointer-events: none;
        }
        .glass-panel {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }
        .marketing-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .marketing-card:hover {
            transform: translateY(-5px);
            border-color: var(--brand-primary);
        }
    </style>
    <meta name="google" content="notranslate">
</head>
<body data-active-module="Marketing" class="min-h-screen">
    <div id="enterprise-sidebar"></div>
    <div class="bg-grid"></div>

    <main class="max-w-[1600px] mx-auto p-8 lg:p-20">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-10 mb-20">
            <div>
                <p class="text-[10px] font-black text-pink-600 uppercase tracking-[0.5em] mb-4">Growth & Engagement Unit</p>
                <h1 class="text-6xl lg:text-7xl font-black text-slate-900 tracking-tighter uppercase">
                    Marketing <span class="text-pink-600">Hub</span>
                </h1>
            </div>
            <div class="flex gap-4">
                <button onclick="openTemplateModal()" class="bg-pink-600 text-white font-black text-[10px] uppercase tracking-widest px-10 py-5 rounded-2xl shadow-xl shadow-pink-100 hover:scale-105 active:scale-95 transition-all">
                    Nueva Campaña WA
                </button>
            </div>
        </header>

        <!-- Metrics Row -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-16">
            <div class="glass-panel p-10 rounded-[3rem]">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Alcance Total</p>
                <h3 id="stat-reach" class="text-4xl font-black text-slate-900 tracking-tighter">12.4K</h3>
            </div>
            <div class="glass-panel p-10 rounded-[3rem]">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Open Rate WA</p>
                <h3 id="stat-open" class="text-4xl font-black text-emerald-500 tracking-tighter">94%</h3>
            </div>
            <div class="glass-panel p-10 rounded-[3rem]">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Conversion Ratio</p>
                <h3 id="stat-conv" class="text-4xl font-black text-pink-600 tracking-tighter">18.5%</h3>
            </div>
            <div class="glass-panel p-10 rounded-[3rem]">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">ROI Est.</p>
                <h3 id="stat-roi" class="text-4xl font-black text-slate-900 tracking-tighter">4.2x</h3>
            </div>
        </div>

        <div class="flex items-center justify-between mb-10 px-2">
            <h4 class="text-xs font-black text-slate-900 uppercase tracking-[0.3em]">Campañas Activas & Plantillas</h4>
            <div class="h-px flex-1 bg-slate-50 mx-10"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="campaigns-grid">
            <!-- Campaign Cards -->
            <div class="glass-panel marketing-card p-10 rounded-[3rem] relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50/50 rounded-full -mr-16 -mt-16 -z-10 group-hover:scale-110 transition-transform"></div>
                <div class="flex justify-between items-start mb-10">
                    <div class="w-14 h-14 rounded-2xl bg-white border border-slate-100 flex items-center justify-center text-2xl shadow-sm">🍗</div>
                    <span class="text-[8px] font-black uppercase tracking-widest px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full">Activa</span>
                </div>
                <h4 class="text-xl font-black text-slate-900 uppercase tracking-tighter mb-2">Oferta Pollo + Patatas</h4>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-relaxed mb-8">Envío masivo a clientes recurrentes con cupón de descuento 10%.</p>
                <div class="flex justify-between items-center text-[9px] font-black uppercase tracking-widest text-slate-400">
                    <span>Reach: 2400</span>
                    <button class="text-pink-600 hover:scale-110 transition-all">Ver Informe →</button>
                </div>
            </div>

            <div class="glass-panel marketing-card p-10 rounded-[3rem] border-dashed border-slate-200 bg-slate-50/30 flex flex-col items-center justify-center text-center group cursor-pointer">
                <div class="w-16 h-16 rounded-full bg-white border border-slate-100 flex items-center justify-center text-2xl mb-4 group-hover:rotate-90 transition-all shadow-sm">+</div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Crear Nueva Estrategia</p>
            </div>
        </div>
    </main>

    <script src="/static/js/enterprise_shell.js"></script>
    <script>
        window.onload = () => {
            EnterpriseShell.init('Marketing Hub');
        };

        function openTemplateModal() {
            // Future implementation
            alert("Marketing Wizard: Iniciando flujo de creación...");
        }
    </script>
</body>
</html>
