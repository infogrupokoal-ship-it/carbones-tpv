<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Hub | TPV Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/enterprise_shell.css">
    <style>
        :root {
            --primary: #10b981;
            --bg-base: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.05);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-base); 
            margin: 0;
            color: #1e293b;
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.01) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.01) 1px, transparent 1px);
            z-index: -2;
            pointer-events: none;
        }
        .ambient-glow {
            position: fixed;
            top: -20%;
            left: -10%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.05) 0%, transparent 60%);
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.05);
        }
        .wa-card { transition: all 0.3s ease; }
        .wa-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex min-h-screen">
    <div class="bg-grid"></div>
    <div class="ambient-glow"></div>

    <!-- Main Workspace -->
    <main class="flex-1 p-8 lg:p-12 overflow-y-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h1 class="text-4xl lg:text-5xl font-black text-slate-900 tracking-tighter uppercase">Marketing <span class="text-emerald-500">Hub</span></h1>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-[0.3em] mt-3 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    WhatsApp Automation • Enterprise v3.0
                </p>
            </div>
            <button onclick="document.getElementById('modalTemplate').classList.remove('hidden')" class="bg-slate-900 hover:bg-slate-800 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl transition-all active:scale-95 flex items-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                Nueva Plantilla
            </button>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-panel p-6 rounded-3xl border-l-4 border-emerald-500">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-2">Mensajes Enviados (30d)</p>
                <h3 class="text-4xl font-black text-slate-900 tracking-tighter">1,240</h3>
            </div>
            <div class="glass-panel p-6 rounded-3xl border-l-4 border-blue-500">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-2">Tasa de Apertura</p>
                <h3 class="text-4xl font-black text-blue-600 tracking-tighter">92.4%</h3>
            </div>
            <div class="glass-panel p-6 rounded-3xl border-l-4 border-amber-500">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-2">Clics en Ofertas</p>
                <h3 class="text-4xl font-black text-amber-600 tracking-tighter">185</h3>
            </div>
        </div>

        <h3 class="text-sm font-black text-slate-900 uppercase tracking-[0.2em] mb-8">Plantillas WhatsApp</h3>
        
        <!-- Templates Grid -->
        <div id="templates-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="glass-panel h-48 animate-pulse rounded-3xl"></div>
            <div class="glass-panel h-48 animate-pulse rounded-3xl"></div>
            <div class="glass-panel h-48 animate-pulse rounded-3xl"></div>
        </div>
    </main>

    <!-- Modals -->
    <div id="modalTemplate" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-6">
        <div class="bg-white max-w-lg w-full p-12 rounded-[3rem] shadow-2xl relative">
            <button onclick="document.getElementById('modalTemplate').classList.add('hidden')" class="absolute top-8 right-8 text-slate-400 hover:text-slate-900">✕</button>
            <h3 class="text-2xl font-black text-slate-900 mb-10 uppercase tracking-tighter">Crear <span class="text-emerald-500">Plantilla</span></h3>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-3 ml-1">Identificador</label>
                    <input id="t-nombre" type="text" placeholder="Ej: BIENVENIDA_CLIENTE" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 text-sm focus:bg-white focus:border-emerald-500 transition-all outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-3 ml-1">Categoría</label>
                    <select id="t-categoria" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 text-sm focus:bg-white focus:border-emerald-500 transition-all outline-none">
                        <option value="COMERCIAL">Marketing Comercial</option>
                        <option value="RECORDATORIO">Recordatorio Operativo</option>
                        <option value="ALERTA">Alerta Crítica</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-3 ml-1">Contenido ({{nombre}}, {{link}})</label>
                    <textarea id="t-contenido" rows="4" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 text-sm focus:bg-white focus:border-emerald-500 transition-all outline-none resize-none"></textarea>
                </div>
                <button onclick="saveTemplate()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-5 rounded-[2rem] font-black uppercase tracking-widest transition-all shadow-xl shadow-emerald-600/20">Guardar Plantilla</button>
            </div>
        </div>
    </div>

    <div id="modalSend" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-6">
        <div class="bg-white max-w-lg w-full p-12 rounded-[3rem] shadow-2xl relative">
            <button onclick="document.getElementById('modalSend').classList.add('hidden')" class="absolute top-8 right-8 text-slate-400 hover:text-slate-900">✕</button>
            <h3 class="text-2xl font-black text-slate-900 mb-10 uppercase tracking-tighter">Enviar <span class="text-emerald-500">Campaña</span></h3>
            
            <div class="space-y-6">
                <div class="space-y-3">
                    <label class="text-[10px] font-black text-slate-400 uppercase block ml-1 tracking-widest">Destinatarios</label>
                    <div id="clientes-list" class="bg-slate-50 border border-slate-100 rounded-2xl p-4 max-h-48 overflow-y-auto custom-scrollbar space-y-2">
                        <!-- Clientes -->
                    </div>
                </div>
                <button onclick="sendCampaign()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-5 rounded-[2rem] font-black uppercase tracking-widest transition-all shadow-xl shadow-emerald-600/20">Ejecutar Envío Masivo</button>
            </div>
        </div>
    </div>

    <script src="/static/js/enterprise_shell.js"></script>
    <script>
        EnterpriseShell.init('Marketing Hub');

        async function fetchTemplates() {
            try {
                const res = await fetch('/api/marketing/templates');
                const data = await res.json();
                renderTemplates(data);
            } catch(e) { console.error(e); }
        }

        function renderTemplates(data) {
            const grid = document.getElementById('templates-grid');
            if (data.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center opacity-30 font-black uppercase tracking-widest text-xs">No hay plantillas configuradas</div>';
                return;
            }
            grid.innerHTML = data.map(t => `
                <div class="glass-panel wa-card p-8 rounded-[2.5rem] bg-white flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <span class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-[9px] font-black uppercase tracking-widest">${t.categoria}</span>
                            <div class="text-emerald-500 text-xl">📱</div>
                        </div>
                        <h4 class="text-slate-900 font-black text-lg mb-4 uppercase tracking-tighter">${t.nombre}</h4>
                        <p class="text-xs text-slate-400 leading-relaxed italic line-clamp-3">"${t.contenido}"</p>
                    </div>
                    <div class="mt-8 pt-6 border-t border-slate-50 flex gap-3">
                        <button class="flex-1 bg-slate-50 hover:bg-slate-100 text-slate-500 text-[9px] font-black uppercase py-2 rounded-xl transition-all">Editar</button>
                        <button onclick="openSendModal('${t.id}')" class="px-4 bg-emerald-50 text-emerald-600 text-[9px] font-black uppercase py-2 rounded-xl hover:bg-emerald-100 transition-all">Enviar Campaña</button>
                    </div>
                </div>
            `).join('');
        }

        async function saveTemplate() {
            const template = {
                nombre: document.getElementById('t-nombre').value,
                categoria: document.getElementById('t-categoria').value,
                contenido: document.getElementById('t-contenido').value
            };
            const res = await fetch('/api/marketing/templates', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(template)
            });
            if (res.ok) { document.getElementById('modalTemplate').classList.add('hidden'); fetchTemplates(); }
        }

        let selectedTemplateId = null;
        let allClients = [];

        async function fetchClientes() {
            try {
                const res = await fetch('/api/customers');
                if (res.ok) allClients = await res.json();
            } catch(e) { console.error(e); }
        }

        function openSendModal(templateId) {
            selectedTemplateId = templateId;
            const list = document.getElementById('clientes-list');
            list.innerHTML = allClients.map(c => `
                <label class="flex items-center gap-3 p-3 hover:bg-white rounded-xl cursor-pointer transition-colors">
                    <input type="checkbox" value="${c.id}" class="client-cb rounded-lg border-slate-200 text-emerald-500 focus:ring-emerald-500">
                    <span class="text-sm text-slate-600 font-bold">${c.nombre} <span class="text-slate-400 font-normal ml-2">${c.telefono}</span></span>
                </label>
            `).join('');
            document.getElementById('modalSend').classList.remove('hidden');
        }

        async function sendCampaign() {
            if (!selectedTemplateId) return;
            const checkboxes = document.querySelectorAll('.client-cb:checked');
            const clientIds = Array.from(checkboxes).map(cb => cb.value);
            if (clientIds.length === 0) return alert("Selecciona destinatarios");

            try {
                const res = await fetch(\`/api/marketing/send-bulk?template_id=\${selectedTemplateId}\`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(clientIds)
                });
                if (res.ok) { alert("Campaña en cola de envío."); document.getElementById('modalSend').classList.add('hidden'); }
            } catch(e) { console.error(e); }
        }

        fetchTemplates();
        fetchClientes();
    </script>
</body>
</html>
