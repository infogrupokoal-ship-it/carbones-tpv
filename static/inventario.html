<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Inventory | Carbones y Pollos</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/enterprise_shell.css">
    <style>
        :root {
            --brand-primary: #10b981;
            --bg-base: #f8fafc;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-base); 
            margin: 0;
            color: #1e293b;
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.01) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.01) 1px, transparent 1px);
            z-index: -1;
            pointer-events: none;
        }
        .glass-panel {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }
        .table-header {
            background: #f1f5f9;
            text-transform: uppercase;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.1em;
            color: #64748b;
        }
        .tr-hover:hover {
            background: #f8fafc;
        }
    </style>
    <meta name="google" content="notranslate">
</head>
<body class="min-h-screen" data-active-module="Stock">
    <div class="bg-grid-industrial"></div>

    <div class="flex h-screen overflow-hidden">
        <div id="enterprise-sidebar"></div>

        <main class="flex-1 overflow-y-auto p-8 lg:p-20 custom-scrollbar">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-10 mb-20">
            <div>
                <p class="text-[10px] font-black text-emerald-600 uppercase tracking-[0.5em] mb-4">Logistics & Supply Unit</p>
                <h1 class="text-6xl lg:text-7xl font-black text-slate-900 tracking-tighter uppercase">
                    Gestión <span class="text-emerald-600">Stock</span>
                </h1>
            </div>
            <div class="flex gap-4">
                <button onclick="syncStock()" class="bg-white border border-slate-100 p-5 rounded-2xl shadow-sm text-slate-400 hover:text-emerald-600 transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
                <button onclick="openAddModal()" class="bg-emerald-600 text-white font-black text-[10px] uppercase tracking-widest px-10 py-5 rounded-2xl shadow-xl shadow-emerald-100 hover:scale-105 active:scale-95 transition-all">
                    Añadir Material
                </button>
            </div>
        </header>

        <div id="module-telemetry" class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-16"></div>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-16">
            <div class="glass-panel p-10 rounded-[3rem]">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Total SKUs</p>
                <h3 id="stat-total" class="text-4xl font-black text-slate-900 tracking-tighter">--</h3>
            </div>
            <div class="glass-panel p-10 rounded-[3rem]">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Alertas Críticas</p>
                <h3 id="stat-alerts" class="text-4xl font-black text-red-500 tracking-tighter">--</h3>
            </div>
            <div class="glass-panel p-10 rounded-[3rem]">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Valor Inventario</p>
                <h3 id="stat-value" class="text-4xl font-black text-slate-900 tracking-tighter">--€</h3>
            </div>
            <div class="glass-panel p-10 rounded-[3rem]">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Mermas Hoy</p>
                <h3 id="stat-wastage" class="text-4xl font-black text-orange-500 tracking-tighter">--</h3>
            </div>
        </div>

        <!-- Inventory Table -->
        <div class="glass-panel rounded-[3rem] overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="table-header">
                            <th class="px-10 py-6">Material / Recurso</th>
                            <th class="px-10 py-6">Categoría</th>
                            <th class="px-10 py-6 text-center">Stock Actual</th>
                            <th class="px-10 py-6 text-center">Min. Reorden</th>
                            <th class="px-10 py-6 text-right">Costo Unit.</th>
                            <th class="px-10 py-6 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body" class="divide-y divide-slate-50">
                        <!-- Items -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/static/js/enterprise_shell.js"></script>
    <script>
        const API_URL = "/api";

        async function syncStock() {
            try {
                const res = await fetch(`${API_URL}/inventory/list`);
                const data = await res.json();
                renderInventory(data);
                updateStats(data);
            } catch(e) { console.error("Sync Failure:", e); }
        }

        function updateStats(data) {
            document.getElementById('stat-total').innerText = data.length.toString().padStart(2, '0');
            const alerts = data.filter(i => i.stock_actual <= i.stock_minimo).length;
            document.getElementById('stat-alerts').innerText = alerts.toString().padStart(2, '0');
            const value = data.reduce((acc, i) => acc + (i.stock_actual * i.precio_costo), 0);
            document.getElementById('stat-value').innerText = value.toFixed(0) + '€';
            document.getElementById('stat-wastage').innerText = '00';
        }

        function renderInventory(data) {
            const body = document.getElementById('inventory-body');
            body.innerHTML = data.map(i => `
                <tr class="tr-hover transition-all">
                    <td class="px-10 py-8">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-lg">${i.icon || '📦'}</div>
                            <div>
                                <p class="text-sm font-black text-slate-900 uppercase tracking-tighter">${i.nombre}</p>
                                <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">${i.proveedor || 'Sin Proveedor'}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-10 py-8">
                        <span class="text-[9px] font-black uppercase tracking-widest text-slate-500 bg-slate-50 px-3 py-1 rounded-full">${i.categoria}</span>
                    </td>
                    <td class="px-10 py-8 text-center">
                        <p class="text-lg font-black ${i.stock_actual <= i.stock_minimo ? 'text-red-500' : 'text-slate-900'} tracking-tighter">${i.stock_actual} <span class="text-[10px] text-slate-400 uppercase">${i.unidad || 'ud'}</span></p>
                    </td>
                    <td class="px-10 py-8 text-center text-[10px] font-black text-slate-400 tracking-widest">${i.stock_minimo} ${i.unidad || 'ud'}</td>
                    <td class="px-10 py-8 text-right font-black text-slate-900 text-sm">${i.precio_costo.toFixed(2)}€</td>
                    <td class="px-10 py-8 text-right">
                        <div class="flex justify-end gap-2">
                            <button class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 transition-all">✏️</button>
                            <button class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 transition-all">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        window.onload = () => {
            EnterpriseShell.init('Gestión Stock');
            syncStock();
            setInterval(syncStock, 30000);
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/enterprise_ui.js"></script>

    <script>
        window.addEventListener('load', () => {
            if (typeof EnterpriseUI !== 'undefined') {
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Estado del Nodo',
                    value: 'ACTIVO',
                    unit: 'SECURE',
                    trend: 'up',
                    trendValue: '100%',
                    icon: 'fa-server'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Carga de Trabajo',
                    value: Math.floor(Math.random() * 40 + 20),
                    unit: '%',
                    trend: 'up',
                    trendValue: 'LOW',
                    icon: 'fa-microchip'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Latencia Sync',
                    value: Math.floor(Math.random() * 50 + 10),
                    unit: 'ms',
                    trend: 'down',
                    trendValue: 'OPTIMAL',
                    icon: 'fa-bolt'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Seguridad',
                    value: 'V4.0',
                    unit: 'SSL',
                    trend: 'up',
                    trendValue: 'MAX',
                    icon: 'fa-shield-halved'
                });
            }
        });
    </script>
            
</body>
</html>
