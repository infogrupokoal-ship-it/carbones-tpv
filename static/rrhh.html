<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal HR - Carbones y Pollos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Design System Enterprise -->
    <link rel="stylesheet" href="/static/css/enterprise_shell.css">
    <style>
        body { user-select: none; -webkit-user-select: none; font-family: 'Outfit', sans-serif; background: #020617; }
        @keyframes pulse-bg {
            0% { opacity: 0.6; }
            50% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }
        .skeleton-loader {
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            animation: pulse-bg 1.5s infinite;
        }
    </style>
</head>
<body class="min-h-screen text-slate-300 overflow-x-hidden">
    <!-- Enterprise Sidebar will be injected here -->

    <div class="flex h-screen overflow-hidden">
        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-4 lg:p-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]">

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 lg:p-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter uppercase">RRHH <span class="text-yellow-500">& Personal</span></h1>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-[0.3em] mt-2">Staff Portal • TPV Ultra</p>
            </div>
        </header>

    <div class="container mx-auto px-4 pb-24 flex-1">
        <div class="flex flex-col lg:flex-row gap-6 md:gap-8">
            
            <!-- Panel Izquierdo: Fichaje -->
            <div class="w-full lg:w-5/12 max-w-md mx-auto">
                <div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl p-6 md:p-8 shadow-2xl text-center">
                    <h2 class="text-2xl md:text-3xl font-black mb-6 tracking-tight text-white">Portal de Fichaje</h2>
                    
                    <div id="pin-display" class="text-4xl tracking-[0.5em] text-center bg-black/50 text-white p-4 rounded-xl min-h-[72px] mb-8 font-mono border border-white/10 shadow-inner flex items-center justify-center"></div>
                    
                    <div class="grid grid-cols-3 gap-3 md:gap-4 mb-8 place-items-center max-w-[280px] mx-auto">
                        <button class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-white/10 hover:bg-white/20 text-2xl font-bold transition-all active:scale-90 border border-white/5" onclick="addPin('1')">1</button>
                        <button class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-white/10 hover:bg-white/20 text-2xl font-bold transition-all active:scale-90 border border-white/5" onclick="addPin('2')">2</button>
                        <button class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-white/10 hover:bg-white/20 text-2xl font-bold transition-all active:scale-90 border border-white/5" onclick="addPin('3')">3</button>
                        <button class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-white/10 hover:bg-white/20 text-2xl font-bold transition-all active:scale-90 border border-white/5" onclick="addPin('4')">4</button>
                        <button class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-white/10 hover:bg-white/20 text-2xl font-bold transition-all active:scale-90 border border-white/5" onclick="addPin('5')">5</button>
                        <button class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-white/10 hover:bg-white/20 text-2xl font-bold transition-all active:scale-90 border border-white/5" onclick="addPin('6')">6</button>
                        <button class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-white/10 hover:bg-white/20 text-2xl font-bold transition-all active:scale-90 border border-white/5" onclick="addPin('7')">7</button>
                        <button class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-white/10 hover:bg-white/20 text-2xl font-bold transition-all active:scale-90 border border-white/5" onclick="addPin('8')">8</button>
                        <button class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-white/10 hover:bg-white/20 text-2xl font-bold transition-all active:scale-90 border border-white/5" onclick="addPin('9')">9</button>
                        <button class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-red-500/20 text-red-400 hover:bg-red-500/40 text-2xl font-bold transition-all active:scale-90 border border-red-500/30" onclick="clearPin()">C</button>
                        <button class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-white/10 hover:bg-white/20 text-2xl font-bold transition-all active:scale-90 border border-white/5" onclick="addPin('0')">0</button>
                        <button class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-yellow-400/20 text-yellow-400 hover:bg-yellow-400/40 text-2xl font-bold transition-all active:scale-90 border border-yellow-400/30" onclick="delPin()">⌫</button>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button class="bg-emerald-500 hover:bg-emerald-600 text-white p-4 font-black text-lg md:text-xl rounded-xl transition-all active:scale-95 shadow-lg" onclick="fichar('ENTRADA')">ENTRADA</button>
                        <button class="bg-red-500 hover:bg-red-600 text-white p-4 font-black text-lg md:text-xl rounded-xl transition-all active:scale-95 shadow-lg" onclick="fichar('SALIDA')">SALIDA</button>
                        <button class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 p-4 font-black text-lg md:text-xl rounded-xl transition-all active:scale-95 shadow-lg" onclick="fichar('INICIO_PAUSA')">PAUSA</button>
                        <button class="bg-blue-500 hover:bg-blue-600 text-white p-4 font-black text-lg md:text-xl rounded-xl transition-all active:scale-95 shadow-lg" onclick="fichar('FIN_PAUSA')">FIN PAUSA</button>
                    </div>
                </div>
            </div>
            
            <!-- Panel Derecho: Historial -->
            <div class="w-full lg:w-7/12">
                <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-3xl p-6 md:p-8 h-full flex flex-col shadow-xl">
                    <h4 class="text-xl md:text-2xl font-bold mb-6 text-white border-b border-white/10 pb-4">Últimos Fichajes</h4>
                    
                    <div class="overflow-x-auto flex-1">
                        <table class="w-full text-left whitespace-nowrap">
                            <thead>
                                <tr class="text-slate-400 text-sm md:text-base border-b border-white/10">
                                    <th class="pb-3 font-semibold px-2">Usuario</th>
                                    <th class="pb-3 font-semibold px-2">Tipo</th>
                                    <th class="pb-3 font-semibold px-2">Fecha y Hora</th>
                                </tr>
                            </thead>
                            <tbody id="fichajes-list" class="divide-y divide-white/5">
                                <!-- Skeleton Loaders -->
                                <tr>
                                    <td class="py-4 px-2"><div class="skeleton-loader w-24"></div></td>
                                    <td class="py-4 px-2"><div class="skeleton-loader w-16"></div></td>
                                    <td class="py-4 px-2"><div class="skeleton-loader w-32"></div></td>
                                </tr>
                                <tr>
                                    <td class="py-4 px-2"><div class="skeleton-loader w-24"></div></td>
                                    <td class="py-4 px-2"><div class="skeleton-loader w-16"></div></td>
                                    <td class="py-4 px-2"><div class="skeleton-loader w-32"></div></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Speed Dial Flotante -->
    <button onclick="window.location.href='dashboard_produccion.html'" class="fixed bottom-6 right-6 md:bottom-8 md:right-8 bg-yellow-400 hover:bg-yellow-300 text-slate-900 rounded-full w-16 h-16 text-3xl shadow-2xl flex items-center justify-center transition-all active:scale-90 border-2 border-yellow-200 z-50" title="Volver al Dashboard">
        ⬅️
    </button>

    <script src="/static/js/enterprise_shell.js"></script>
    <script>
        EnterpriseShell.init('RRHH & Personal');

        let currentPin = "";
        const display = document.getElementById('pin-display');

        function addPin(num) {
            if(currentPin.length < 4) {
                currentPin += num;
                display.innerText = "*".repeat(currentPin.length);
            }
        }

        function clearPin() {
            currentPin = "";
            display.innerText = "";
        }

        function delPin() {
            currentPin = currentPin.slice(0, -1);
            display.innerText = "*".repeat(currentPin.length);
        }

        async function fichar(tipo) {
            if(currentPin.length < 3) {
                EnterpriseShell.showToast("Atención", "Introduce un PIN válido", "error");
                return;
            }
            try {
                const res = await fetch('/api/rrhh/fichar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ pin: currentPin, tipo: tipo })
                });
                if(res.ok) {
                    const data = await res.json();
                    EnterpriseShell.showToast('Fichaje Completado', data.msj, 'success');
                    clearPin();
                    loadFichajes();
                } else {
                    EnterpriseShell.showToast('Error', "PIN incorrecto o error en servidor", 'error');
                    clearPin();
                }
            } catch(e) {
                EnterpriseShell.showToast('Fallo de Red', "No se pudo contactar con el servidor", 'error');
                console.error(e);
            }
        }

        async function loadFichajes() {
            try {
                const res = await fetch('/api/rrhh/fichajes');
                const data = await res.json();
                const tbody = document.getElementById('fichajes-list');
                tbody.innerHTML = "";
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-center py-12 text-slate-500">
                        <div class="text-5xl mb-4 opacity-50">📇</div>
                        <h4 class="text-xl font-bold mb-1 text-slate-400">Sin Registros</h4>
                        <p>No hay fichajes recientes.</p>
                    </td></tr>`;
                    return;
                }
                
                data.forEach(f => {
                    let badgeClass = "bg-slate-600 text-white";
                    if(f.tipo === "ENTRADA") badgeClass = "bg-emerald-500/20 text-emerald-400 border border-emerald-500/30";
                    if(f.tipo === "SALIDA") badgeClass = "bg-red-500/20 text-red-400 border border-red-500/30";
                    if(f.tipo === "INICIO_PAUSA") badgeClass = "bg-yellow-400/20 text-yellow-400 border border-yellow-400/30";
                    if(f.tipo === "FIN_PAUSA") badgeClass = "bg-blue-500/20 text-blue-400 border border-blue-500/30";
                    
                    tbody.innerHTML += `<tr class="hover:bg-white/5 transition-colors">
                        <td class="py-4 px-2 font-medium text-white">${f.username}</td>
                        <td class="py-4 px-2"><span class="px-3 py-1 rounded-full text-xs font-bold ${badgeClass}">${f.tipo}</span></td>
                        <td class="py-4 px-2 text-slate-400">${f.fecha}</td>
                    </tr>`;
                });
            } catch (e) {
                console.error("Error al cargar fichajes", e);
                document.getElementById('fichajes-list').innerHTML = `<tr><td colspan="3" class="text-center py-12 text-red-400">
                    <div class="text-5xl mb-4 opacity-75">⚠️</div>
                    <h4 class="text-xl font-bold mb-1">Error de Conexión</h4>
                    <p>No se pudo contactar con el servidor.</p>
                </td></tr>`;
            }
        }

        loadFichajes();
    </script>
</body>
</html></body>
</html>
