<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal HR - Carbones y Pollos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1d20; color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .pin-display {
            font-size: 2rem; letter-spacing: 10px; text-align: center;
            background: #000; padding: 10px; border-radius: 10px; min-height: 60px;
            margin-bottom: 20px;
        }
        .numpad button { font-size: 1.5rem; width: 70px; height: 70px; margin: 5px; border-radius: 50%; }
        .btn-action { width: 100%; padding: 15px; font-weight: bold; font-size: 1.2rem; margin-top: 10px; border-radius: 10px; }
        .table-dark { background-color: transparent; }
        @keyframes pulse-bg {
            0% { opacity: 0.6; }
            50% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }
        .skeleton-loader {
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            animation: pulse-bg 1.5s infinite;
        }
    </style>
</head>
<body>
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mt-3 px-4">
            <li class="breadcrumb-item"><a href="dashboard_produccion.html" class="text-light text-decoration-none">🏠 Dashboard</a></li>
            <li class="breadcrumb-item active text-warning" aria-current="page">👥 Recursos Humanos</li>
        </ol>
    </nav>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-5 mx-auto">
                <div class="glass-panel text-center">
                    <h2 class="mb-4">Portal de Fichaje (HR)</h2>
                    <div class="pin-display" id="pin-display"></div>
                    
                    <div class="numpad d-flex flex-wrap justify-content-center">
                        <button class="btn btn-outline-light" onclick="addPin('1')">1</button>
                        <button class="btn btn-outline-light" onclick="addPin('2')">2</button>
                        <button class="btn btn-outline-light" onclick="addPin('3')">3</button>
                        <button class="btn btn-outline-light" onclick="addPin('4')">4</button>
                        <button class="btn btn-outline-light" onclick="addPin('5')">5</button>
                        <button class="btn btn-outline-light" onclick="addPin('6')">6</button>
                        <button class="btn btn-outline-light" onclick="addPin('7')">7</button>
                        <button class="btn btn-outline-light" onclick="addPin('8')">8</button>
                        <button class="btn btn-outline-light" onclick="addPin('9')">9</button>
                        <button class="btn btn-danger" onclick="clearPin()">C</button>
                        <button class="btn btn-outline-light" onclick="addPin('0')">0</button>
                        <button class="btn btn-warning" onclick="delPin()">&larr;</button>
                    </div>

                    <div class="mt-4 row">
                        <div class="col-6"><button class="btn btn-success btn-action" onclick="fichar('ENTRADA')">ENTRADA</button></div>
                        <div class="col-6"><button class="btn btn-danger btn-action" onclick="fichar('SALIDA')">SALIDA</button></div>
                        <div class="col-6"><button class="btn btn-warning btn-action" onclick="fichar('INICIO_PAUSA')">PAUSA</button></div>
                        <div class="col-6"><button class="btn btn-info btn-action" onclick="fichar('FIN_PAUSA')">FIN PAUSA</button></div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-7">
                <div class="glass-panel mt-4 mt-md-0">
                    <h4>Últimos Fichajes</h4>
                    <table class="table table-dark table-hover mt-3">
                        <thead>
                            <tr>
                                <th>Usuario</th>
                                <th>Tipo</th>
                                <th>Fecha y Hora</th>
                            </tr>
                        </thead>
                        <tbody id="fichajes-list">
                            <tr>
                                <td><div class="skeleton-loader" style="width: 80%;"></div></td>
                                <td><div class="skeleton-loader" style="width: 50%;"></div></td>
                                <td><div class="skeleton-loader" style="width: 90%;"></div></td>
                            </tr>
                            <tr>
                                <td><div class="skeleton-loader" style="width: 80%;"></div></td>
                                <td><div class="skeleton-loader" style="width: 50%;"></div></td>
                                <td><div class="skeleton-loader" style="width: 90%;"></div></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Speed Dial Flotante -->
    <div class="position-fixed bottom-0 end-0 p-4" style="z-index: 1050;">
        <button class="btn btn-warning rounded-circle shadow-lg d-flex align-items-center justify-content-center" style="width: 60px; height: 60px; font-size: 24px;" onclick="window.location.href='dashboard_produccion.html'" title="Volver al Dashboard">
            ⬅️
        </button>
    </div>

    <script>
        let currentPin = "";
        const display = document.getElementById('pin-display');

        function addPin(num) {
            if(currentPin.length < 4) {
                currentPin += num;
                display.innerText = "*".repeat(currentPin.length);
            }
        }

        function clearPin() {
            currentPin = "";
            display.innerText = "";
        }

        function delPin() {
            currentPin = currentPin.slice(0, -1);
            display.innerText = "*".repeat(currentPin.length);
        }

        async function fichar(tipo) {
            if(currentPin.length < 3) {
                alert("Introduce un PIN válido");
                return;
            }
            try {
                const res = await fetch('/api/rrhh/fichar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ pin: currentPin, tipo: tipo })
                });
                if(res.ok) {
                    const data = await res.json();
                    alert(data.msj);
                    clearPin();
                    loadFichajes();
                } else {
                    alert("PIN incorrecto o error en servidor");
                    clearPin();
                }
            } catch(e) {
                console.error(e);
            }
        }

        async function loadFichajes() {
            try {
                const res = await fetch('/api/rrhh/fichajes');
                const data = await res.json();
                const tbody = document.getElementById('fichajes-list');
                tbody.innerHTML = "";
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-center py-5 text-muted">
                        <div style="font-size: 3rem; margin-bottom: 10px;">📇</div>
                        <h4>Sin Registros</h4>
                        <p>No hay fichajes recientes.</p>
                    </td></tr>`;
                    return;
                }
                
                data.forEach(f => {
                    let badge = "bg-secondary";
                    if(f.tipo === "ENTRADA") badge = "bg-success";
                    if(f.tipo === "SALIDA") badge = "bg-danger";
                    if(f.tipo === "INICIO_PAUSA") badge = "bg-warning text-dark";
                    if(f.tipo === "FIN_PAUSA") badge = "bg-info text-dark";
                    
                    tbody.innerHTML += `<tr>
                        <td>${f.username}</td>
                        <td><span class="badge ${badge}">${f.tipo}</span></td>
                        <td>${f.fecha}</td>
                    </tr>`;
                });
            } catch (e) {
                console.error("Error al cargar fichajes", e);
                document.getElementById('fichajes-list').innerHTML = `<tr><td colspan="3" class="text-center py-5 text-danger">
                    <div style="font-size: 3rem; margin-bottom: 10px;">⚠️</div>
                    <h4>Error de Conexión</h4>
                    <p>No se pudo contactar con el servidor.</p>
                </td></tr>`;
            }
        }

        loadFichajes();
    </script>
</body>
</html>
