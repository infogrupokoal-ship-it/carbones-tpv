<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise HR | Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/enterprise_shell.css">
    <meta name="google" content="notranslate">
</head>
<body data-active-module="RRHH" class="min-h-screen">
    <div class="bg-grid-industrial"></div>

    <div class="flex h-screen overflow-hidden">
        <div id="enterprise-sidebar"></div>

        <main class="flex-1 p-8 lg:p-20 overflow-y-auto">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-10 mb-20">
                <div>
                    <p class="text-[10px] font-black text-indigo-600 uppercase tracking-[0.5em] mb-4">Human Resources Unit</p>
                    <h1 class="text-6xl lg:text-7xl font-black text-slate-900 tracking-tighter uppercase">
                        Gestión <span class="text-indigo-600">Talento</span>
                    </h1>
                </div>
                <div id="clock-display" class="glass-panel px-10 py-6 rounded-3xl font-black text-4xl text-slate-900 tracking-tighter">
                    00:00:00
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
                <!-- Clock-in Keypad -->
                <div class="glass-panel p-16 rounded-[4rem] flex flex-col items-center">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mb-12">Autenticación de Turno</h4>
                    
                    <div id="pin-display" class="flex gap-4 mb-12">
                        <div class="w-4 h-4 rounded-full border-2 border-slate-200"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-200"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-200"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-200"></div>
                    </div>

                    <div class="grid grid-cols-3 gap-8">
                        <button class="w-20 h-20 rounded-full bg-white border border-slate-100 font-black text-2xl hover:bg-slate-50 transition-all active:scale-90">1</button>
                        <button class="w-20 h-20 rounded-full bg-white border border-slate-100 font-black text-2xl hover:bg-slate-50 transition-all active:scale-90">2</button>
                        <button class="w-20 h-20 rounded-full bg-white border border-slate-100 font-black text-2xl hover:bg-slate-50 transition-all active:scale-90">3</button>
                        <button class="w-20 h-20 rounded-full bg-white border border-slate-100 font-black text-2xl hover:bg-slate-50 transition-all active:scale-90">4</button>
                        <button class="w-20 h-20 rounded-full bg-white border border-slate-100 font-black text-2xl hover:bg-slate-50 transition-all active:scale-90">5</button>
                        <button class="w-20 h-20 rounded-full bg-white border border-slate-100 font-black text-2xl hover:bg-slate-50 transition-all active:scale-90">6</button>
                        <button class="w-20 h-20 rounded-full bg-white border border-slate-100 font-black text-2xl hover:bg-slate-50 transition-all active:scale-90">7</button>
                        <button class="w-20 h-20 rounded-full bg-white border border-slate-100 font-black text-2xl hover:bg-slate-50 transition-all active:scale-90">8</button>
                        <button class="w-20 h-20 rounded-full bg-white border border-slate-100 font-black text-2xl hover:bg-slate-50 transition-all active:scale-90">9</button>
                        <button class="w-20 h-20 rounded-full bg-slate-50 border border-slate-100 font-black text-xl hover:bg-slate-100 transition-all active:scale-90 flex items-center justify-center">C</button>
                        <button class="w-20 h-20 rounded-full bg-white border border-slate-100 font-black text-2xl hover:bg-slate-50 transition-all active:scale-90">0</button>
                        <button class="w-20 h-20 rounded-full bg-indigo-600 text-white font-black text-xl hover:bg-indigo-700 transition-all active:scale-90 flex items-center justify-center">OK</button>
                    </div>

                    <div class="mt-12 flex gap-4 w-full">
                        <button class="flex-1 py-6 bg-emerald-500 text-white font-black text-[10px] uppercase tracking-widest rounded-3xl shadow-xl shadow-emerald-100 hover:scale-105 transition-all">Entrada</button>
                        <button class="flex-1 py-6 bg-rose-500 text-white font-black text-[10px] uppercase tracking-widest rounded-3xl shadow-xl shadow-rose-100 hover:scale-105 transition-all">Salida</button>
                    </div>
                </div>

                <!-- Active Shifts -->
                <div class="glass-panel p-10 rounded-[3rem]">
                    <h4 class="text-xs font-black text-slate-900 uppercase tracking-[0.3em] mb-10 pb-6 border-b border-slate-50">Personal en Turno</h4>
                    <div class="space-y-6">
                        <div class="flex items-center justify-between p-6 bg-slate-50 rounded-2xl border border-slate-100">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-full bg-indigo-600 flex items-center justify-center text-white font-black">AM</div>
                                <div>
                                    <p class="text-sm font-black text-slate-900 uppercase">Alex Manager</p>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Desde las 08:30</p>
                                </div>
                            </div>
                            <span class="badge badge-success">Activo</span>
                        </div>
                        <div class="flex items-center justify-between p-6 bg-white rounded-2xl border border-slate-100 opacity-60">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-black">JP</div>
                                <div>
                                    <p class="text-sm font-black text-slate-900 uppercase">Juan Parrilla</p>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Fuera de turno</p>
                                </div>
                            </div>
                            <span class="badge">Inactivo</span>
                        </div>
                    </div>

                    <div class="mt-12 p-8 bg-indigo-50 rounded-[2rem]">
                        <p class="text-[9px] font-black text-indigo-600 uppercase tracking-widest mb-2">KPI Disponibilidad</p>
                        <h3 class="text-3xl font-black text-slate-900 tracking-tighter">85% Operativo</h3>
                        <div class="mt-4 h-2 w-full bg-indigo-200 rounded-full overflow-hidden">
                            <div class="h-full w-[85%] bg-indigo-600 rounded-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/enterprise_shell.js"></script>
    <script>
        window.onload = () => {
            EnterpriseShell.init('Recursos Humanos');
            setInterval(updateClock, 1000);
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('clock-display').innerText = now.toLocaleTimeString();
        }
    </script>
</body>
</html>
