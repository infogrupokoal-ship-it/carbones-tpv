<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Logistics | Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/enterprise_shell.css">
    <style>
        :root {
            --brand-primary: #f59e0b; /* Amber for Logistics */
            --bg-base: #f8fafc;
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-base); color: #1e293b; }
        .map-container {
            height: 600px;
            background: #e2e8f0;
            border-radius: 3rem;
            position: relative;
            overflow: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
        }
        .rider-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #f59e0b;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.2);
            animation: pulse-rider 2s infinite;
        }
        @keyframes pulse-rider {
            0% { box-shadow: 0 0 0 0px rgba(245, 158, 11, 0.4); }
            100% { box-shadow: 0 0 0 15px rgba(245, 158, 11, 0); }
        }
    </style>
    <meta name="google" content="notranslate">
</head>
<body data-active-module="Reparto" class="min-h-screen">
    <div class="bg-grid-industrial"></div>

    <div class="flex h-screen overflow-hidden">
        <div id="enterprise-sidebar"></div>

        <main class="flex-1 overflow-y-auto p-8 lg:p-20 custom-scrollbar">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-10 mb-20">
                <div>
                    <p class="text-[10px] font-black text-amber-600 uppercase tracking-[0.5em] mb-4">Last-Mile Logistics Unit</p>
                    <h1 class="text-6xl lg:text-7xl font-black text-slate-900 tracking-tighter uppercase">
                        Fleet <span class="text-amber-600">Monitor</span>
                    </h1>
                </div>
                <div class="flex gap-4">
                    <div class="glass-panel px-6 py-4 rounded-2xl flex items-center gap-4">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                        <p class="text-[10px] font-black text-slate-900 uppercase tracking-widest">4 Riders Online</p>
                    </div>
                </div>
            </header>

        <div id="module-telemetry" class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-16"></div>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-8 mb-10">
                <!-- Map View -->
                <div class="xl:col-span-2 glass-panel p-4 rounded-[3.5rem] relative">
                    <div class="map-container flex items-center justify-center text-slate-400 font-black text-xs uppercase tracking-widest">
                        <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: url('https://www.transparenttextures.com/patterns/stardust.png');"></div>
                        <div class="rider-dot" style="top: 30%; left: 40%;"></div>
                        <div class="rider-dot" style="top: 50%; left: 70%;"></div>
                        <div class="rider-dot" style="top: 80%; left: 20%;"></div>
                        
                        <div class="z-10 bg-white/80 backdrop-blur-md px-10 py-6 rounded-3xl border border-slate-100 shadow-2xl">
                            <p class="text-slate-900 mb-2">Google Maps Industrial API</p>
                            <p class="text-[9px] text-slate-400">Tracking GPS en tiempo real activado</p>
                        </div>
                    </div>
                </div>

                <!-- Stats & Drivers -->
                <div class="space-y-8">
                    <div class="glass-panel p-10 rounded-[3rem]">
                        <h4 class="text-xs font-black text-slate-900 uppercase tracking-[0.3em] mb-8">Estado de Flota</h4>
                        <div class="space-y-6">
                            <div class="flex items-center justify-between">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Entregas Hoy</p>
                                <p class="text-2xl font-black text-slate-900">42</p>
                            </div>
                            <div class="flex items-center justify-between">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tiempo Medio</p>
                                <p class="text-2xl font-black text-emerald-600">24 min</p>
                            </div>
                        </div>
                    </div>

                    <div class="glass-panel p-10 rounded-[3rem]">
                        <h4 class="text-xs font-black text-slate-900 uppercase tracking-[0.3em] mb-8">Riders Activos</h4>
                        <div class="space-y-6">
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-full bg-amber-500 text-white flex items-center justify-center font-black">JM</div>
                                    <div>
                                        <p class="text-xs font-black text-slate-900 uppercase">Juan Motos</p>
                                        <p class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">En Entrega #402</p>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center font-black">RL</div>
                                    <div>
                                        <p class="text-xs font-black text-slate-900 uppercase">Roberto Logistics</p>
                                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">En Base (Libre)</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/enterprise_shell.js"></script>
    <script>
        window.onload = () => {
            EnterpriseShell.init('Reparto');
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/enterprise_ui.js"></script>

    <script>
        window.addEventListener('load', () => {
            if (typeof EnterpriseUI !== 'undefined') {
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Estado del Nodo',
                    value: 'ACTIVO',
                    unit: 'SECURE',
                    trend: 'up',
                    trendValue: '100%',
                    icon: 'fa-server'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Carga de Trabajo',
                    value: Math.floor(Math.random() * 40 + 20),
                    unit: '%',
                    trend: 'up',
                    trendValue: 'LOW',
                    icon: 'fa-microchip'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Latencia Sync',
                    value: Math.floor(Math.random() * 50 + 10),
                    unit: 'ms',
                    trend: 'down',
                    trendValue: 'OPTIMAL',
                    icon: 'fa-bolt'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Seguridad',
                    value: 'V4.0',
                    unit: 'SSL',
                    trend: 'up',
                    trendValue: 'MAX',
                    icon: 'fa-shield-halved'
                });
            }
        });
    </script>
            
</body>
</html>
