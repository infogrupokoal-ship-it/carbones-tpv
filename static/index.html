<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carbones y Pollos - Pedidos Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="theme-color" content="#1f2937">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-900 h-[100dvh] flex flex-col items-center justify-center font-sans text-white relative overflow-hidden">

    <!-- Fondo Decorativo -->
    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 pointer-events-none"></div>
    <div class="absolute top-[-10%] left-[-10%] w-[120%] h-[120%] bg-gradient-to-br from-red-900/40 via-gray-900 to-yellow-900/20 z-0"></div>

    <!-- Contenedor Principal -->
    <div class="z-10 bg-gray-800/80 backdrop-blur-md p-8 rounded-3xl shadow-2xl w-[90%] max-w-md border border-gray-700/50 text-center flex flex-col items-center">
        
        <!-- Logo animado -->
        <div class="relative w-32 h-32 mb-6">
            <div class="absolute inset-0 bg-yellow-500 rounded-full blur-xl opacity-20 animate-pulse"></div>
            <div class="text-7xl absolute inset-0 flex items-center justify-center animate-bounce shadow-black drop-shadow-2xl">🍗</div>
        </div>

        <h1 class="text-4xl font-black mb-1 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 tracking-tight">Carbones y Pollos</h1>
        <p class="text-gray-400 font-medium mb-10 text-sm">El auténtico sabor a leña de encina</p>

        <div class="flex flex-col gap-4 w-full">
            <!-- Botón B2C: Pedir Ahora -->
            <button onclick="startB2C('ahora')" class="group relative overflow-hidden bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-400 hover:to-orange-400 p-4 rounded-2xl font-black text-xl text-gray-900 transition-all active:scale-95 shadow-[0_0_20px_rgba(234,179,8,0.3)] flex items-center justify-center gap-3">
                <span class="text-3xl group-hover:scale-110 transition-transform">🛵</span>
                <span>Pedir Ahora</span>
            </button>

            <!-- Botón B2C: Encargar para otro día -->
            <button onclick="startB2C('encargo')" class="group bg-gray-700 hover:bg-gray-600 border border-gray-600 p-4 rounded-2xl font-black text-lg text-white transition-all active:scale-95 flex items-center justify-center gap-3">
                <span class="text-2xl group-hover:scale-110 transition-transform">📅</span>
                <span>Encargar para otro día</span>
            </button>
        </div>
        
        <!-- Footer Info -->
        <div class="mt-8 text-xs text-gray-500 flex items-center gap-2">
            <span>📍 C/ Falsa 123, Madrid</span>
            <span>•</span>
            <span>⭐ 4.9/5 en Reseñas</span>
        </div>
    </div>

    <!-- Acceso Oculto Staff -->
    <a href="setup.html" class="absolute bottom-4 right-4 text-gray-800 hover:text-gray-600 transition-colors w-8 h-8 flex items-center justify-center rounded-full">
        ⚙️
    </a>

    <script>
        function startB2C(tipo) {
            // Aseguramos que el dispositivo se reconozca como B2C (Cliente Online)
            localStorage.setItem('tpv_device_mode', 'b2c');
            localStorage.setItem('tpv_b2c_tipo', tipo); // 'ahora' o 'encargo'
            
            // Efecto visual y redirección
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.3s ease';
            setTimeout(() => {
                window.location.href = 'kiosko.html';
            }, 300);
        }
        
        // Limpiar roles de staff si un cliente entra aquí accidentalmente
        window.onload = function() {
            if (localStorage.getItem('tpv_device_mode') !== 'b2c') {
                localStorage.removeItem('tpv_device_mode');
                localStorage.removeItem('admin_token');
            }
        }
    </script>
</body>
</html>
