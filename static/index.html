<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inicio - Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 h-[100dvh] flex items-center justify-center font-sans text-white">

    <div class="bg-gray-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border-2 border-gray-700 text-center">
        <div class="text-7xl mb-6">🍗</div>
        <h1 class="text-4xl font-black mb-2 text-yellow-400 tracking-tight">Carbones y Pollos</h1>
        <p class="text-gray-400 font-bold mb-8">Selecciona el modo de inicio</p>

        <div class="flex flex-col gap-4">
            <!-- Modo Quiosko -->
            <button onclick="startKiosk()" class="bg-blue-600 hover:bg-blue-500 p-5 rounded-2xl font-black text-2xl transition active:scale-95 shadow-lg flex flex-col items-center">
                <span>🛒 MODO QUIOSKO</span>
                <span class="text-sm font-normal text-blue-200 mt-1">Para clientes (Auto-Pedido)</span>
            </button>

            <div class="border-t border-gray-600 my-4"></div>

            <!-- Modo Responsable -->
            <div id="responsable-form" class="bg-gray-700 p-4 rounded-2xl text-left border border-gray-600">
                <h2 class="text-xl font-bold mb-4 text-center text-emerald-400">👨‍🍳 MODO RESPONSABLE</h2>
                
                <label class="block text-sm font-bold text-gray-300 mb-1">Tu Nombre</label>
                <input id="nombreInput" type="text" placeholder="Ej: Carlos" class="w-full bg-gray-900 border border-gray-600 rounded-xl p-3 mb-4 text-white font-bold outline-none focus:border-yellow-400">
                
                <label class="block text-sm font-bold text-gray-300 mb-1">Código de Acceso</label>
                <input id="codigoInput" type="password" placeholder="****" class="w-full bg-gray-900 border border-gray-600 rounded-xl p-3 mb-4 text-white font-bold outline-none focus:border-yellow-400 text-center text-2xl tracking-[0.5em]" inputmode="numeric">
                
                <button onclick="startResponsable()" class="w-full bg-emerald-600 hover:bg-emerald-500 p-4 rounded-xl font-black text-xl transition active:scale-95 shadow-md">
                    ENTRAR A CAJA
                </button>
            </div>
        </div>
    </div>

    <script>
        function startKiosk() {
            localStorage.setItem('tpv_role', 'quiosko');
            localStorage.setItem('tpv_name', 'Cliente');
            window.location.href = 'kiosko.html';
        }

        function startResponsable() {
            const nombre = document.getElementById('nombreInput').value.trim();
            const codigo = document.getElementById('codigoInput').value.trim();

            if (!nombre || !codigo) {
                alert("Por favor, ingresa tu nombre y el código de acceso.");
                return;
            }

            if (codigo === "1234" || codigo === "8888") {
                localStorage.setItem('tpv_role', 'responsable');
                localStorage.setItem('tpv_name', nombre);
                window.location.href = 'dashboard_produccion.html'; // Redirigir directamente al panel de control total
            } else {
                alert("Código incorrecto.");
            }
        }
        
        // Limpiar roles previos al cargar la pantalla de inicio
        window.onload = function() {
            localStorage.removeItem('tpv_role');
            localStorage.removeItem('tpv_name');
        }
    </script>
</body>
</html>
