<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiosko Ultra-Pro | Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/design_system.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #ff5f00;
            --brand-dark: #0f172a;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #f8fafc; 
            color: var(--brand-dark);
            overflow: hidden;
            height: 100vh;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .product-card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.04);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #f1f5f9;
        }
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
            border-color: var(--brand-primary);
        }
        .category-pill {
            padding: 1rem 2.5rem;
            border-radius: 2rem;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.3s;
            background: white;
            border: 2px solid transparent;
            color: #64748b;
        }
        .category-pill.active {
            background: var(--brand-dark);
            color: white;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.2);
        }
        .cart-bar {
            background: var(--brand-dark);
            border-radius: 3rem 3rem 0 0;
            box-shadow: 0 -20px 60px rgba(0,0,0,0.2);
        }
        .text-gradient-orange {
            background: linear-gradient(135deg, #ff8a00 0%, #ff5f00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .order-loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--brand-primary);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col">

    <!-- Hero Header -->
    <header class="glass-header p-8 flex justify-between items-center z-50">
        <div class="flex items-center gap-6">
            <div class="h-16 w-16 bg-orange-600 rounded-3xl flex items-center justify-center text-3xl shadow-2xl shadow-orange-500/40">🔥</div>
            <div>
                <h1 class="text-4xl font-black tracking-tighter leading-none uppercase italic">
                    CARBONES <span class="text-gradient-orange">Y POLLOS</span>
                </h1>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mt-2">Kiosko de Auto-Pedido v3.0</p>
            </div>
        </div>
        <div class="flex gap-4">
            <div class="bg-slate-100 px-6 py-3 rounded-2xl text-xs font-bold text-slate-500 border border-slate-200">
                MESA <span class="text-slate-900 font-black">#ONLINE</span>
            </div>
            <button onclick="location.reload()" class="bg-white px-6 py-3 rounded-2xl text-xs font-bold text-slate-900 border border-slate-200 shadow-sm">REINICIAR</button>
        </div>
    </header>

    <!-- Category Scroller -->
    <nav class="px-8 py-6 flex gap-4 overflow-x-auto no-scrollbar bg-slate-50/50" id="category-nav">
        <!-- Injected via JS -->
    </nav>

    <!-- Main Menu Area -->
    <main class="flex-1 overflow-y-auto p-8 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8 bg-[#fdfdfd]" id="product-grid">
        <!-- Skeletons -->
        <div class="col-span-full py-40 text-center space-y-4">
            <span class="order-loader"></span>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">Cocinando el menú digital...</p>
        </div>
    </main>

    <!-- Cart Floating Bar -->
    <div class="cart-bar p-10 z-50 transition-all duration-500 transform translate-y-0" id="cart-container">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-8">
                <div class="relative">
                    <div class="h-20 w-20 bg-white/10 rounded-3xl flex items-center justify-center text-4xl">🛒</div>
                    <span id="cart-badge" class="absolute -top-3 -right-3 h-8 w-8 bg-orange-600 rounded-full flex items-center justify-center text-sm font-black text-white shadow-lg border-4 border-[#0f172a]">0</span>
                </div>
                <div>
                    <h3 class="text-2xl font-black text-white" id="cart-title">CESTA VACÍA</h3>
                    <p class="text-slate-400 text-sm font-medium">Selecciona tus favoritos para empezar</p>
                </div>
            </div>

            <div class="flex items-center gap-12 w-full md:w-auto">
                <div class="text-right">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Total del Pedido</p>
                    <h2 class="text-5xl font-black text-white leading-none" id="cart-total">0.00€</h2>
                </div>
                <button onclick="checkout()" id="checkout-btn" class="bg-orange-600 hover:bg-orange-500 text-white px-12 py-6 rounded-3xl text-2xl font-black shadow-2xl shadow-orange-600/30 transition-all active:scale-95 disabled:opacity-50 disabled:grayscale">
                    PEDIR AHORA
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de Pedido Exitoso -->
    <div id="success-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-xl z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[3rem] p-12 max-w-lg w-full text-center shadow-2xl scale-in">
            <div class="h-24 w-24 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center text-5xl mx-auto mb-8">✅</div>
            <h2 class="text-4xl font-black text-slate-900 mb-4">¡PEDIDO RECIBIDO!</h2>
            <p class="text-slate-500 mb-8 font-medium">Tu pedido <span id="order-number" class="text-orange-600 font-black">#---</span> ha sido enviado a cocina. Por favor, acércate a caja para confirmar el pago.</p>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white py-6 rounded-3xl text-xl font-black shadow-xl">ENTENDIDO</button>
        </div>
    </div>

    <script>
        let products = [];
        let cart = [];
        let currentCategory = 'TODOS';

        async function init() {
            try {
                const res = await fetch('/api/inventory/productos');
                products = await res.json();
                renderCategories();
                renderProducts();
            } catch (e) {
                console.error("Error cargando kiosko:", e);
            }
        }

        function renderCategories() {
            const categories = ['TODOS', ...new Set(products.map(p => p.categoria.toUpperCase()))];
            const nav = document.getElementById('category-nav');
            nav.innerHTML = categories.map(cat => `
                <button onclick="filterCategory('${cat}')" class="category-pill ${currentCategory === cat ? 'active' : ''}">
                    ${cat}
                </button>
            `).join('');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const filtered = currentCategory === 'TODOS' 
                ? products 
                : products.filter(p => p.categoria.toUpperCase() === currentCategory);

            grid.innerHTML = filtered.map(p => `
                <div class="product-card p-8 flex flex-col group cursor-pointer" onclick="addToCart('${p.id}', '${p.nombre}', ${p.precio})">
                    <div class="h-48 bg-slate-50 rounded-[2rem] mb-6 overflow-hidden relative">
                        <img src="${p.imagen_url || 'https://images.unsplash.com/photo-1598103442097-8b74394b95c6?auto=format&fit=crop&w=400'}" 
                             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-4 py-2 rounded-2xl font-black text-slate-900 shadow-sm border border-black/5">
                            ${p.precio.toFixed(2)}€
                        </div>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-xl font-black text-slate-800 leading-none mb-3 uppercase italic">${p.nombre}</h3>
                        <p class="text-xs text-slate-400 font-medium leading-relaxed">${p.descripcion || 'Una explosión de sabor artesanal preparado al momento.'}</p>
                    </div>
                    <div class="mt-8 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <span class="h-2 w-2 bg-emerald-500 rounded-full"></span>
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Disponible</span>
                        </div>
                        <div class="bg-orange-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center font-black shadow-lg shadow-orange-500/20 group-hover:rotate-90 transition-transform">
                            +
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id, name, price) {
            cart.push({ id, name, price });
            updateCart();
        }

        function updateCart() {
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = `${total.toFixed(2)}€`;
            document.getElementById('cart-badge').innerText = cart.length;
            document.getElementById('cart-title').innerText = cart.length > 0 ? `${cart.length} PRODUCTOS` : 'CESTA VACÍA';
            
            const btn = document.getElementById('checkout-btn');
            btn.disabled = cart.length === 0;
        }

        async function checkout() {
            if (cart.length === 0) return;

            const btn = document.getElementById('checkout-btn');
            const originalText = btn.innerText;
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            try {
                const payload = {
                    origen: "KIOSKO",
                    items: cart.map(item => ({ producto_id: item.id, cantidad: 1 })),
                    notas_cliente: "Pedido desde Kiosko Ultra-Pro"
                };

                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('order-number').innerText = `#${data.id.slice(0, 6).toUpperCase()}`;
                    document.getElementById('success-modal').classList.remove('hidden');
                    cart = [];
                    updateCart();
                } else {
                    alert("Error en el sistema. Por favor contacta con el personal.");
                }
            } catch (e) {
                alert("Error de red. Intenta de nuevo.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function closeModal() {
            document.getElementById('success-modal').classList.add('hidden');
        }

        init();
    </script>
</body>
</html>
