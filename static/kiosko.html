<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Kiosk - Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0c0a09; }
        .amber-glass { background: rgba(245, 158, 11, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(245, 158, 11, 0.1); }
        .product-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: #1c1917; border: 1px solid #292524; }
        .product-card:hover { transform: translateY(-8px); border-color: #f59e0b; box-shadow: 0 20px 40px -20px rgba(245, 158, 11, 0.3); }
        .btn-premium { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); box-shadow: 0 10px 20px -10px rgba(245, 158, 11, 0.5); }
        .category-pill { transition: all 0.3s; border: 1px solid #292524; color: #78716c; }
        .category-pill.active { background: #f59e0b; color: #0c0a09; border-color: #f59e0b; font-weight: 800; }
        .cart-panel { background: rgba(12, 10, 9, 0.95); backdrop-filter: blur(20px); }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.6s ease-out forwards; }
        
        /* ESTILOS DE IMPRESIÓN (RECIBO ESC/POS Y CAJÓN) */
        @media print {
            body * { visibility: hidden; }
            #ticket-impresion, #ticket-impresion * { visibility: visible; }
            #ticket-impresion {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                font-family: 'Courier New', Courier, monospace;
                font-size: 14px;
                color: #000;
                padding: 10px;
                margin: 0;
            }
            .print-only { display: block !important; }
            .no-print { display: none !important; }
        }
        .print-only { display: none; }

        /* Toast Notifications Premium */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }
        .toast {
            background: rgba(12, 10, 9, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(245, 158, 11, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 20px rgba(245, 158, 11, 0.1);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }
    </style>
</head>
<body class="text-stone-300 min-h-screen">

    <!-- Header UI -->
    <header class="fixed top-0 left-0 right-0 z-50 p-6 flex justify-between items-center bg-gradient-to-b from-[#0c0a09] to-transparent">
        <div class="flex items-center gap-4">
            <div class="h-12 w-12 bg-amber-500 rounded-2xl flex items-center justify-center text-2xl shadow-2xl">🔥</div>
            <div>
                <h1 class="text-2xl font-black text-white tracking-tighter uppercase leading-none">Carbones <span class="text-amber-500">y Pollos</span></h1>
                <p class="text-[9px] font-black text-amber-500/50 uppercase tracking-[0.4em] mt-1">Industrial Gourmet Experience</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button id="auth-btn" onclick="openLoginModal()" class="amber-glass px-4 py-3 rounded-2xl flex items-center gap-2 hover:bg-amber-500/10 transition-all duration-300">
                <span class="text-xs font-black uppercase tracking-widest text-amber-500" id="auth-btn-text">Acceso Cliente</span>
            </button>
            <button id="cart-btn-main" onclick="toggleCart()" class="amber-glass px-6 py-3 rounded-2xl flex items-center gap-3 hover:bg-amber-500/10 transition-all duration-300">
                <span class="text-xs font-black uppercase tracking-widest text-amber-500">Tu Pedido</span>
                <span id="cart-count" class="bg-amber-500 text-black text-[10px] font-black px-2 py-0.5 rounded-full">0</span>
            </button>
        </div>
    </header>

    <main class="pt-36 px-6 pb-40 max-w-7xl mx-auto">
        
        <!-- Categories Horizontal -->
        <div id="categories-container" class="flex gap-3 overflow-x-auto custom-scrollbar pb-6 mb-8 sticky top-[90px] z-40 bg-[#0c0a09]/90 backdrop-blur-xl py-4 shadow-[0_10px_30px_-10px_rgba(0,0,0,0.8)] border-b border-white/5">
            <!-- Injected by JS -->
        </div>

        <!-- Products Grid -->
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Loading State -->
            <div class="lg:col-span-3 py-40 text-center">
                <div class="inline-block animate-spin h-8 w-8 border-4 border-amber-500 border-t-transparent rounded-full mb-4"></div>
                <p class="text-xs font-black uppercase tracking-widest text-stone-500">Preparando el fuego...</p>
            </div>
        </div>
    </main>

    <!-- Cart Overlay -->
    <div id="cart-overlay" class="fixed inset-0 bg-black/80 z-[60] backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-500">
        <div id="cart-content" class="absolute right-0 top-0 bottom-0 w-full max-w-md cart-panel shadow-2xl p-8 translate-x-full transition-all duration-500 flex flex-col">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black text-white tracking-tighter uppercase">Carrito <span class="text-amber-500">Gourmet</span></h2>
                <button onclick="toggleCart()" class="text-stone-500 hover:text-white transition-all">✕</button>
            </div>

            <div id="cart-items" class="flex-1 overflow-y-auto space-y-6 custom-scrollbar">
                <!-- Injected by JS -->
            </div>

            <div class="pt-8 border-t border-stone-800 mt-8">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-xs font-black uppercase text-stone-500 tracking-widest">Total Estimado</span>
                    <span id="cart-total" class="text-3xl font-black text-white">0.00€</span>
                </div>
                <button onclick="checkout()" class="w-full btn-premium py-5 rounded-2xl text-black font-black text-sm uppercase tracking-[0.2em] transition-all active:scale-95">Finalizar Compra 🔥</button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-black/90 z-[70] backdrop-blur-md opacity-0 pointer-events-none transition-all duration-300 flex items-center justify-center p-6">
        <div class="bg-[#1c1917] border border-stone-800 p-8 rounded-3xl max-w-sm w-full shadow-2xl relative">
            <button onclick="closeLoginModal()" class="absolute top-4 right-4 text-stone-500 hover:text-white">✕</button>
            <h2 class="text-2xl font-black text-white uppercase tracking-tighter mb-2">Acceso <span class="text-amber-500">Rápido</span></h2>
            <p class="text-xs text-stone-400 mb-6 leading-relaxed">Inicia sesión con tu teléfono para acumular puntos y recuperar tu historial.</p>
            
            <div id="step-phone">
                <input type="tel" id="login-phone" placeholder="Tu número de móvil (ej. 600123456)" class="w-full bg-[#0c0a09] border border-stone-800 rounded-xl px-4 py-3 text-white text-sm focus:border-amber-500 focus:outline-none mb-4">
                <button onclick="requestOTP()" id="btn-request-otp" class="w-full btn-premium py-3 rounded-xl text-black font-black text-xs uppercase tracking-widest">Enviar Código WhatsApp</button>
            </div>

            <div id="step-otp" class="hidden">
                <p class="text-[10px] text-amber-500 uppercase tracking-widest font-bold mb-4">Te hemos enviado un código por WhatsApp</p>
                <input type="text" id="login-otp" placeholder="Código de 6 dígitos" class="w-full bg-[#0c0a09] border border-stone-800 rounded-xl px-4 py-3 text-white text-center text-xl tracking-[0.5em] focus:border-amber-500 focus:outline-none mb-4">
                <button onclick="verifyOTP()" id="btn-verify-otp" class="w-full btn-premium py-3 rounded-xl text-black font-black text-xs uppercase tracking-widest">Verificar y Entrar</button>
            </div>
        </div>
    </div>
    <!-- Toast Notifications Container -->
    <div id="toast-container"></div>

    <script>
        let cart = [];
        let products = [];
        let activeCategory = 'all';
        let currentTurno = "MORNING";
        let sessionClient = null;

        async function init() {
            // Check session
            const token = localStorage.getItem('tpv_b2c_token');
            const clienteStr = localStorage.getItem('tpv_b2c_cliente');
            if(token && clienteStr) {
                sessionClient = JSON.parse(clienteStr);
                updateAuthUI();
            }

            // Detect Shift Time (after 18:00 is NIGHT)
            const hour = new Date().getHours();
            currentTurno = hour >= 18 ? "NIGHT" : "MORNING";

            try {
                const [catRes, prodRes] = await Promise.all([
                    fetch('/api/inventory/categorias'),
                    fetch('/api/inventory/productos')
                ]);
                const cats = await catRes.json();
                const allProds = await prodRes.json();
                
                // Filter globally by active shift
                products = allProds.filter(p => p.turno_disponible === 'ALL' || p.turno_disponible === currentTurno);

                renderCategories(cats);
                renderProducts();
            } catch (e) { console.error("Error init:", e); }
        }

        function renderCategories(cats) {
            const container = document.getElementById('categories-container');
            const allHtml = `<button onclick="filterCat('all')" class="category-pill active whitespace-nowrap px-8 py-3 rounded-xl text-[10px] uppercase tracking-widest" id="cat-all">Todos los platos</button>`;
            container.innerHTML = allHtml + cats.map(c => `
                <button onclick="filterCat('${c.id}')" class="category-pill whitespace-nowrap px-8 py-3 rounded-xl text-[10px] uppercase tracking-widest" id="cat-${c.id}">${c.nombre}</button>
            `).join('');
        }

        function filterCat(id) {
            activeCategory = id;
            document.querySelectorAll('.category-pill').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`cat-${id}`).classList.add('active');
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const filtered = activeCategory === 'all' ? products : products.filter(p => p.categoria_id === activeCategory);
            
            grid.innerHTML = filtered.map((p, i) => {
                // Lógica comercial: Etiquetas de impulso
                let badgeHtml = '';
                if (p.nombre.toLowerCase().includes('pollo asado') || i === 0) {
                    badgeHtml = '<span class="absolute top-4 left-4 bg-red-600 text-white text-[9px] font-black px-3 py-1.5 rounded-full uppercase tracking-widest shadow-lg z-10">🔥 Top Ventas</span>';
                } else if (p.nombre.toLowerCase().includes('pizza') && i % 3 === 0) {
                    badgeHtml = '<span class="absolute top-4 left-4 bg-emerald-600 text-white text-[9px] font-black px-3 py-1.5 rounded-full uppercase tracking-widest shadow-lg z-10">⭐ Especialidad</span>';
                }

                // Lógica comercial: Venta cruzada dinámica con Iconos Premium SVG
                // Solo sugerimos bebidas/patatas si no es ya una bebida
                const isDrink = p.categoria_nombre && p.categoria_nombre.toLowerCase().includes('bebida');
                let crossSellHtml = '';
                if (!isDrink) {
                    crossSellHtml = `
                        <div class="mt-5 pt-4 border-t border-white/5 flex flex-col gap-3">
                            <span class="text-[9px] text-zinc-500 uppercase tracking-widest font-bold">Completar menú:</span>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="addGenericCrossSell('Patatas Fritas', 3.50); event.stopPropagation();" class="flex items-center justify-center gap-2 bg-white/5 hover:bg-amber-500/10 border border-white/5 hover:border-amber-500/30 text-zinc-400 hover:text-amber-500 py-2 rounded-xl text-[10px] font-black uppercase transition-all duration-300">
                                    <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                                    Patatas
                                </button>
                                <button onclick="addGenericCrossSell('Refresco', 2.00); event.stopPropagation();" class="flex items-center justify-center gap-2 bg-white/5 hover:bg-amber-500/10 border border-white/5 hover:border-amber-500/30 text-zinc-400 hover:text-amber-500 py-2 rounded-xl text-[10px] font-black uppercase transition-all duration-300">
                                    <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z"></path></svg>
                                    Refresco
                                </button>
                            </div>
                        </div>
                    `;
                }

                return `
                <div class="product-card rounded-3xl p-4 animate-fade flex flex-col justify-between" style="animation-delay: ${i * 0.05}s">
                    <div>
                        <div class="relative h-64 rounded-2xl overflow-hidden mb-6 group cursor-pointer" onclick="addToCart('${p.id}')">
                            ${badgeHtml}
                            <img src="${p.imagen_url || 'https://images.unsplash.com/photo-1544148103-0773bf10d330?auto=format&fit=crop&q=80&w=800'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt="${p.nombre}">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#1c1917] via-[#1c1917]/20 to-transparent opacity-80 group-hover:opacity-60 transition-opacity"></div>
                            <div class="absolute bottom-4 left-4 right-4 flex justify-between items-end">
                                <h3 class="text-2xl font-black text-white leading-tight drop-shadow-md w-3/4">${p.nombre}</h3>
                                <span class="bg-amber-500 text-black text-[12px] font-black px-3 py-1.5 rounded-full uppercase tracking-widest shadow-lg">${p.precio.toFixed(2)}€</span>
                            </div>
                        </div>
                        <p class="text-xs text-stone-400 mb-2 line-clamp-2 leading-relaxed px-2">${p.descripcion || 'Especialidad de la casa preparada al momento.'}</p>
                    </div>
                    <div>
                        <button onclick="addToCart('${p.id}')" class="w-full mt-4 py-4 border border-amber-500/30 text-amber-500 bg-amber-500/5 hover:bg-amber-500 hover:text-black transition-all rounded-xl text-[11px] font-black uppercase tracking-widest active:scale-95">Pedir Ahora</button>
                        ${crossSellHtml}
                    </div>
                </div>
                `;
            }).join('');
        }

        // Función para mostrar notificaciones Toast
        function showToast(productName, price) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <div>
                    <p class="text-white font-bold text-xs">Añadido al pedido</p>
                    <p class="text-zinc-400 text-[10px]">${productName} - <span class="text-amber-500">${price.toFixed(2)}€</span></p>
                </div>
            `;
            container.appendChild(toast);
            
            // Forzar reflow para animación
            void toast.offsetWidth;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // Helper para añadir productos genéricos de venta cruzada rápido
        function addGenericCrossSell(nombre, precio) {
            // Buscar el producto real en el catálogo para que el backend lo reconozca
            const searchName = nombre.toLowerCase().split(' ')[0]; // Ej: "Patatas"
            let realProd = products.find(p => p.nombre.toLowerCase().includes(searchName));
            
            if (realProd) {
                cart.push(realProd);
                showToast(realProd.nombre, realProd.precio);
            } else {
                console.warn(`[!] Producto "${nombre}" no encontrado en la DB. Usando fallback.`);
                // Fallback temporal si la base de datos no tiene patatas
                cart.push({ id: '00000000-0000-0000-0000-000000000000', nombre: nombre, precio: precio, imagen_url: '' });
                showToast(nombre, precio);
            }
            
            updateCartUI();
            const cartBtn = document.getElementById('cart-btn-main');
            if (cartBtn) {
                cartBtn.classList.add('scale-110', 'bg-amber-500/20');
                setTimeout(() => cartBtn.classList.remove('scale-110', 'bg-amber-500/20'), 300);
            }
        }

        function addToCart(id) {
            const prod = products.find(p => p.id === id);
            cart.push(prod);
            updateCartUI();
            
            showToast(prod.nombre, prod.precio);

            // UX: Animar el botón del carrito en lugar de abrirlo
            const cartBtn = document.getElementById('cart-btn-main');
            if (cartBtn) {
                cartBtn.classList.add('scale-110', 'bg-amber-500/20');
                setTimeout(() => cartBtn.classList.remove('scale-110', 'bg-amber-500/20'), 300);
            }
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsCont = document.getElementById('cart-items');
            itemsCont.innerHTML = cart.map((item, i) => `
                <div class="flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <img src="${item.imagen_url}" class="w-12 h-12 rounded-xl object-cover border border-stone-800">
                        <div>
                            <p class="text-xs font-black text-white uppercase">${item.nombre}</p>
                            <p class="text-[10px] font-bold text-amber-500">${item.precio}€</p>
                        </div>
                    </div>
                    <button onclick="cart.splice(${i}, 1); updateCartUI()" class="text-stone-700 hover:text-red-500 text-xs">✕</button>
                </div>
            `).join('');

            const total = cart.reduce((acc, curr) => acc + curr.precio, 0);
            document.getElementById('cart-total').innerText = total.toFixed(2) + '€';
            
            // UX: Controlar estado del botón de pago
            const btnPagar = document.querySelector('button[onclick="checkout()"]');
            if(btnPagar) {
                if(cart.length === 0) {
                    btnPagar.classList.add('opacity-50', 'pointer-events-none');
                    btnPagar.innerText = 'CARRITO VACÍO';
                } else {
                    btnPagar.classList.remove('opacity-50', 'pointer-events-none');
                    btnPagar.innerHTML = 'Finalizar Compra 🔥';
                }
            }
        }

        function toggleCart() {
            const overlay = document.getElementById('cart-overlay');
            const content = document.getElementById('cart-content');
            overlay.classList.toggle('opacity-0');
            overlay.classList.toggle('pointer-events-none');
            content.classList.toggle('translate-x-full');
        }

        async function checkout() {
            if (cart.length === 0) return alert("El carrito está vacío");
            
            const pedido = {
                items: cart.map(item => ({ producto_id: item.id, cantidad: 1 })),
                total: cart.reduce((acc, curr) => acc + curr.precio, 0),
                metodo_pago: 'TARJETA',
                origen: 'QUIOSCO',
                estado_inicial: 'EN_PREPARACION',
                cubiertos_qty: 0,
                canjear_puntos: false,
                cliente_id: sessionClient ? sessionClient.sub : null
            };

            try {
                const res = await fetch('/api/orders/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pedido)
                });
                if (res.ok) {
                    const data = await res.json();
                    
                    // 1. GENERAR FORMATO DE TICKET PARA IMPRESORA DURAPOS
                    const ticketDiv = document.getElementById('ticket-impresion');
                    let itemsHtml = cart.map(item => `<div>1x ${item.nombre.substring(0,20)} ... ${item.precio.toFixed(2)}€</div>`).join('');
                    
                    ticketDiv.innerHTML = `
                        <div style="text-align: center; margin-bottom: 10px;">
                            <h2 style="font-size: 24px; font-weight: bold; margin: 0;">CARBONES Y POLLOS</h2>
                            <p style="margin: 0;">Ticket de Venta (Kiosko)</p>
                            <p style="margin: 0;">Fecha: ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString()}</p>
                            <hr style="border-top: 1px dashed black; margin: 10px 0;">
                        </div>
                        <div style="margin-bottom: 10px;">
                            ${itemsHtml}
                        </div>
                        <hr style="border-top: 1px dashed black; margin: 10px 0;">
                        <div style="text-align: right; font-size: 18px; font-weight: bold;">
                            TOTAL: ${pedido.total.toFixed(2)}€
                        </div>
                        <div style="text-align: center; margin-top: 20px;">
                            <h1 style="font-size: 32px; font-weight: bold; margin: 0;">TURNO: ${data.numero_ticket}</h1>
                            <p>¡Gracias por tu compra!</p>
                        </div>
                    `;
                    // 2. DISPARAR IMPRESIÓN (Interceptado por DURAPOS)
                    window.print();

                    alert(`🔥 Pedido enviado a cocina. Tu turno: ${data.numero_ticket}. ¡Disfruta!`);
                    cart = [];
                    updateCartUI();
                    toggleCart();
                }
            } catch (e) { alert("Error al procesar el pedido."); }
        }

        // --- LÓGICA DE AUTENTICACIÓN OTP ---
        function openLoginModal() {
            if(sessionClient) {
                if(confirm("¿Deseas cerrar sesión?")) {
                    localStorage.removeItem('tpv_b2c_token');
                    localStorage.removeItem('tpv_b2c_cliente');
                    sessionClient = null;
                    updateAuthUI();
                }
                return;
            }
            document.getElementById('login-modal').classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeLoginModal() {
            document.getElementById('login-modal').classList.add('opacity-0', 'pointer-events-none');
        }

        async function requestOTP() {
            const phone = document.getElementById('login-phone').value;
            if(phone.length < 9) return alert("Número inválido");
            
            document.getElementById('btn-request-otp').innerText = 'Enviando...';
            try {
                const res = await fetch('/api/customers/request-otp', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telefono: phone })
                });
                if(res.ok) {
                    document.getElementById('step-phone').classList.add('hidden');
                    document.getElementById('step-otp').classList.remove('hidden');
                } else {
                    alert("Error al enviar código");
                }
            } catch(e) { alert("Error de conexión"); }
            document.getElementById('btn-request-otp').innerText = 'Enviar Código WhatsApp';
        }

        async function verifyOTP() {
            const phone = document.getElementById('login-phone').value;
            const code = document.getElementById('login-otp').value;
            
            document.getElementById('btn-verify-otp').innerText = 'Verificando...';
            try {
                const res = await fetch('/api/customers/verify-otp', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telefono: phone, codigo: code })
                });
                if(res.ok) {
                    const data = await res.json();
                    localStorage.setItem('tpv_b2c_token', data.token);
                    localStorage.setItem('tpv_b2c_cliente', JSON.stringify(data.cliente));
                    sessionClient = data.cliente;
                    updateAuthUI();
                    closeLoginModal();
                } else {
                    alert("Código incorrecto o caducado");
                }
            } catch(e) { alert("Error de conexión"); }
            document.getElementById('btn-verify-otp').innerText = 'Verificar y Entrar';
        }

        function updateAuthUI() {
            const btnText = document.getElementById('auth-btn-text');
            if(sessionClient) {
                btnText.innerHTML = `HOLA, ${sessionClient.nombre.substring(0,6)} <span class="ml-2 bg-amber-500/20 text-amber-500 px-2 py-0.5 rounded text-[9px]">${sessionClient.puntos} pts</span>`;
            } else {
                btnText.innerText = "Acceso Cliente";
                document.getElementById('step-phone').classList.remove('hidden');
                document.getElementById('step-otp').classList.add('hidden');
                document.getElementById('login-phone').value = '';
                document.getElementById('login-otp').value = '';
            }
        }

        init();
    </script>
</body>
</html>
