<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiosko Digital | Carbones y Pollos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Design System -->
    <link rel="stylesheet" href="/static/css/design_system.css">
    <style>
        body { background: #fdfdfd; color: #1e293b; overflow: hidden; }
        .product-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:active { transform: scale(0.95); background: #f8fafc; }
        .category-tab {
            padding: 1rem 2rem;
            border-radius: 1.5rem;
            font-weight: 800;
            white-space: nowrap;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .category-tab.active {
            background: #0f172a;
            color: white;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2);
        }
        .cart-panel {
            background: white;
            border-top: 1px solid #f1f5f9;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.05);
            border-radius: 3rem 3rem 0 0;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="p-8 flex justify-between items-center bg-white">
        <div class="animate-in">
            <h1 class="text-4xl font-black tracking-tighter leading-none">
                CARBONES <span class="text-gradient">Y POLLOS</span>
            </h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-2">BIENVENIDO AL SABOR AUTÉNTICO</p>
        </div>
        <div class="bg-slate-100 p-4 rounded-3xl text-xs font-black tracking-widest text-slate-500 border border-slate-200">
            TURNO #82
        </div>
    </header>

    <!-- Categories -->
    <nav class="px-8 pb-4 flex gap-4 overflow-x-auto no-scrollbar animate-in" style="animation-delay: 0.1s;">
        <button class="category-tab active">TODO</button>
        <button class="category-tab bg-slate-100 text-slate-500">🔥 POLLOS</button>
        <button class="category-tab bg-slate-100 text-slate-500">🍕 PIZZAS</button>
        <button class="category-tab bg-slate-100 text-slate-500">🥤 BEBIDAS</button>
        <button class="category-tab bg-slate-100 text-slate-500">🍰 POSTRES</button>
    </nav>

    <!-- Product Grid -->
    <main class="flex-1 overflow-y-auto p-8 grid grid-cols-2 md:grid-cols-4 gap-8 bg-[#fafafa] animate-in" style="animation-delay: 0.2s;" id="product-grid">
        <!-- Loader -->
        <div class="col-span-full py-40 text-center">
            <p class="text-slate-400 font-bold animate-pulse">Preparando el menú para ti...</p>
        </div>
    </main>

    <!-- Cart Summary -->
    <div class="cart-panel p-10 animate-in" style="animation-delay: 0.3s;">
        <div class="flex justify-between items-center mb-8">
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Tu Selección</p>
                <h2 class="text-3xl font-black text-slate-900" id="cart-count">0 PRODUCTOS</h2>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total a Pagar</p>
                <h2 class="text-5xl font-black text-gradient leading-none" id="cart-total">0.00€</h2>
            </div>
        </div>
        
        <button onclick="enviarPedido()" class="btn-primary w-full !py-6 !text-2xl shadow-orange-500/30">
            FINALIZAR PEDIDO
        </button>
    </div>

    <script>
        const API_URL = "/api";
        let cart = [];
        let total = 0;
        let products = [];

        async function loadProducts() {
            try {
                const res = await fetch(`${API_URL}/inventory/productos`);
                products = await res.json();
                renderProducts(products);
            } catch (e) {
                console.error("Kiosko Load Error", e);
            }
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="product-card p-6 flex flex-col cursor-pointer" onclick="addToCart('${p.id}', '${p.nombre}', ${p.precio})">
                    <div class="h-40 bg-slate-100 rounded-[1.5rem] mb-6 overflow-hidden">
                        <img src="${p.imagen_url || 'https://images.unsplash.com/photo-1598103442097-8b74394b95c6?auto=format&fit=crop&w=400'}" class="w-full h-full object-cover">
                    </div>
                    <h3 class="text-lg font-black text-slate-800 leading-tight mb-2">${p.nombre.toUpperCase()}</h3>
                    <p class="text-xs text-slate-400 font-medium mb-6 flex-1">${p.descripcion || 'Especialidad de la casa'}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-2xl font-black text-slate-900">${p.precio.toFixed(2)}€</span>
                        <div class="bg-slate-900 text-white w-10 h-10 rounded-2xl flex items-center justify-center font-black shadow-lg shadow-slate-200">+</div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id, name, price) {
            cart.push({ id, name, price });
            total += price;
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = `${cart.length} ${cart.length === 1 ? 'PRODUCTO' : 'PRODUCTOS'}`;
            document.getElementById('cart-total').innerText = `${total.toFixed(2)}€`;
        }

        async function enviarPedido() {
            if(cart.length === 0) {
                alert("Selecciona algo rico antes de continuar 😉");
                return;
            }

            if(!confirm("¿Deseas confirmar tu pedido?")) return;

            try {
                const payload = {
                    origen: "KIOSKO",
                    items: cart.map(i => ({ producto_id: i.id, cantidad: 1 })),
                    notas_cliente: "Pedido desde Kiosko Central"
                };

                const res = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    const order = await res.json();
                    alert(`¡Pedido #T-${order.numero_ticket || order.id.slice(0,4)} enviado con éxito! \nPor favor, dirígete a caja para realizar el pago.`);
                    cart = [];
                    total = 0;
                    updateUI();
                } else {
                    alert("Error enviando el pedido. Por favor, avisa al personal.");
                }
            } catch (e) {
                alert("Error de conexión.");
            }
        }

        loadProducts();
    </script>
</body>
</html>
