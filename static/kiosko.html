<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiosko de Auto-Pedido | Carbones y Pollos</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #f59e0b;
            --bg: #111827;
            --surface: #1f2937;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* Video de Fondo o Imagen Atractiva */
        .hero {
            height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(17,24,39,1)), url('https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .hero h1 { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; margin-bottom: 10px; }
        .hero p { font-size: 1.2rem; opacity: 0.8; }

        /* Pantalla Toca para Empezar */
        .start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; cursor: pointer;
            transition: opacity 0.5s;
        }
        .start-overlay i { font-size: 5rem; color: var(--primary); margin-bottom: 20px; animation: bounce 2s infinite; }
        .start-overlay h2 { font-size: 2rem; text-transform: uppercase; }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-20px);} 60% {transform: translateY(-10px);} }

        /* Grid de Selección */
        .kiosk-grid {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            height: 60vh;
            overflow-y: auto;
        }
        .kiosk-item {
            background: var(--surface);
            border-radius: 30px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .kiosk-item:active { transform: scale(0.95); border-color: var(--primary); }
        .kiosk-item i { font-size: 3.5rem; color: var(--primary); }
        .kiosk-item span { font-size: 1.5rem; font-weight: 700; }

        /* Barra Inferior */
        .kiosk-footer {
            position: fixed; bottom: 0; width: 100%;
            background: var(--surface); padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .total-price { font-size: 2rem; font-weight: 900; color: var(--primary); }
        .btn-order {
            padding: 15px 40px; border-radius: 50px; background: var(--primary);
            color: #000; font-weight: 900; font-size: 1.2rem; border: none; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="start-overlay" id="overlay" onclick="this.style.opacity='0'; setTimeout(()=>this.remove(), 500)">
        <i class="fas fa-hand-pointer"></i>
        <h2>Toca para Empezar</h2>
    </div>

    <div class="hero">
        <h1>Carbones y Pollos</h1>
        <p>El sabor artesanal a la leña de encina</p>
    </div>

    <div class="kiosk-grid">
        <div class="kiosk-item">
            <i class="fas fa-drumstick-bite"></i>
            <span>POLLO ENTERO</span>
        </div>
        <div class="kiosk-item">
            <i class="fas fa-bowl-food"></i>
            <span>PATATAS RACIÓN</span>
        </div>
        <div class="kiosk-item">
            <i class="fas fa-bottle-water"></i>
            <span>BEBIDAS</span>
        </div>
        <div class="kiosk-item">
            <i class="fas fa-cookie-bite"></i>
            <span>POSTRES</span>
        </div>
    </div>

    <footer class="kiosk-footer">
        <div class="total-price">12.50€</div>
        <button class="btn-order">PEDIR AHORA</button>
    </footer>

    <script>
        let productos = [];
        let carrito = [];

        async function init() {
            try {
                const res = await fetch('/api/productos');
                productos = await res.json();
                renderGrid();
            } catch (e) {
                console.error("Error cargando productos", e);
            }
        }

        function renderGrid() {
            const grid = document.querySelector('.kiosk-grid');
            grid.innerHTML = productos.map(p => `
                <div class="kiosk-item" onclick="addToCart(${p.id})">
                    <i class="${getIcon(p.nombre)}"></i>
                    <span>${p.nombre}</span>
                    <small>${p.precio.toFixed(2)}€</small>
                </div>
            `).join('');
        }

        function getIcon(name) {
            const n = name.toLowerCase();
            if (n.includes('pollo')) return 'fas fa-drumstick-bite';
            if (n.includes('patata')) return 'fas fa-bowl-food';
            if (n.includes('bebida') || n.includes('agua') || n.includes('cola')) return 'fas fa-bottle-water';
            return 'fas fa-utensils';
        }

        function addToCart(id) {
            const p = productos.find(x => x.id === id);
            carrito.push(p);
            updateFooter();
            
            // Animación feedback
            const item = event.currentTarget;
            item.style.borderColor = 'var(--primary)';
            setTimeout(() => item.style.borderColor = 'transparent', 300);
        }

        function updateFooter() {
            const total = carrito.reduce((acc, p) => acc + p.precio, 0);
            document.querySelector('.total-price').innerText = total.toFixed(2) + '€';
        }

        async function checkout() {
            if (carrito.length === 0) return;
            
            const btn = document.querySelector('.btn-order');
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            const payload = {
                items: carrito.map(p => ({ producto_id: p.id, cantidad: 1 })),
                origen: "KIOSKO_PRO",
                total: carrito.reduce((acc, p) => acc + p.precio, 0)
            };

            try {
                const res = await fetch('/api/pedidos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.status === 'ok') {
                    showSuccess(data.ticket);
                }
            } catch (e) {
                alert("Error al procesar el pedido");
            } finally {
                btn.innerText = "PEDIR AHORA";
                btn.disabled = false;
            }
        }

        function showSuccess(ticket) {
            const overlay = document.createElement('div');
            overlay.className = "start-overlay";
            overlay.innerHTML = `
                <i class="fas fa-check-circle" style="color: #10b981; animation: none;"></i>
                <h2 style="font-size: 3rem;">TICKET: ${ticket}</h2>
                <p style="margin-top: 20px;">Pasa por caja para recoger tu pedido</p>
                <button class="btn-order" style="margin-top: 40px;" onclick="location.reload()">NUEVO PEDIDO</button>
            `;
            document.body.appendChild(overlay);
        }

        document.querySelector('.btn-order').onclick = checkout;

        init();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
