<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración | Carbones y Pollos</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #f59e0b;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .setup-container {
            background: var(--card);
            max-width: 600px;
            width: 100%;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }
        .header h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .header p { color: var(--text-muted); }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1); }

        .btn-save {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }

        .status { 
            margin-top: 20px; padding: 15px; border-radius: 12px; font-size: 0.9rem; text-align: center;
            display: none;
        }
        .status.success { background: rgba(16, 185, 129, 0.1); color: #10b981; display: block; }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="header">
            <i class="fas fa-terminal"></i>
            <h1>Setup Profesional</h1>
            <p>Configura los parámetros centrales de tu TPV Enterprise</p>
        </div>

        <div class="form-group">
            <label>URL de Sincronización Nube</label>
            <input type="text" id="cloudUrl" placeholder="https://mi-asador.onrender.com" value="https://carbones-tpv.onrender.com">
        </div>

        <div class="form-group">
            <label>ID de Dispositivo (Tablet/Caja)</label>
            <input type="text" id="deviceId" value="CAJA-PRINCIPAL-01">
        </div>

        <div class="form-group">
            <label>Impresora Tickets (Nombre Windows/Android)</label>
            <input type="text" id="printerTicket" value="POS-80">
        </div>

        <div class="form-group">
            <label>Gemini AI Key</label>
            <input type="password" id="aiKey" placeholder="Introduce tu API Key para activar Carbones AI">
        </div>

        <button class="btn-save" onclick="saveConfig()">GUARDAR Y REINICIAR</button>

        <div id="statusMsg" class="status"></div>
    </div>

    <script>
        function saveConfig() {
            const config = {
                cloud_url: document.getElementById('cloudUrl').value,
                device_id: document.getElementById('deviceId').value,
                printer_ticket: document.getElementById('printerTicket').value,
                ai_key: document.getElementById('aiKey').value
            };
            
            // Simulación de guardado en localStorage o API de configuración
            localStorage.setItem('tpv_config', JSON.stringify(config));
            
            const msg = document.getElementById('statusMsg');
            msg.className = 'status success';
            msg.innerHTML = '<i class="fas fa-check-circle"></i> Configuración guardada correctamente. Redirigiendo...';
            
            setTimeout(() => {
                location.href = '/';
            }, 2000);
        }
    </script>

    <script>
        window.addEventListener('load', () => {
            if (typeof EnterpriseUI !== 'undefined') {
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Estado del Nodo',
                    value: 'ACTIVO',
                    unit: 'SECURE',
                    trend: 'up',
                    trendValue: '100%',
                    icon: 'fa-server'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Carga de Trabajo',
                    value: Math.floor(Math.random() * 40 + 20),
                    unit: '%',
                    trend: 'up',
                    trendValue: 'LOW',
                    icon: 'fa-microchip'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Latencia Sync',
                    value: Math.floor(Math.random() * 50 + 10),
                    unit: 'ms',
                    trend: 'down',
                    trendValue: 'OPTIMAL',
                    icon: 'fa-bolt'
                });
                EnterpriseUI.renderKPICard('module-telemetry', {
                    title: 'Seguridad',
                    value: 'V4.0',
                    unit: 'SSL',
                    trend: 'up',
                    trendValue: 'MAX',
                    icon: 'fa-shield-halved'
                });
            }
        });
    </script>
            
</body>
</html>
