<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría Técnica - Carbones y Pollos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #ff9f43;
            --error: #ff4757;
            --info: #2ed573;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid var(--glass-border);
            color: var(--accent);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.9em;
        }

        .level-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .level-ERROR { background: var(--error); }
        .level-INFO { background: var(--info); }
        .level-WARNING { background: #eccc68; color: black; }

        .btn-refresh {
            background: var(--accent);
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-refresh:hover { transform: scale(1.05); }

        .details-cell {
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Auditoría Operativa Enterprise</h1>
            <button class="btn-refresh" onclick="loadLogs()">🔄 Actualizar Logs</button>
        </header>

        <div class="glass-card">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Módulo</th>
                        <th>Nivel</th>
                        <th>Mensaje</th>
                        <th>Detalles</th>
                    </tr>
                </thead>
                <tbody id="logs-body">
                    <!-- Logs cargados dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadLogs() {
            try {
                // Endpoint imaginario que implementaremos en el router de telemetría
                const response = await fetch('/api/system/logs');
                const logs = await response.json();
                
                const body = document.getElementById('logs-body');
                body.innerHTML = logs.map(log => `
                    <tr>
                        <td>${new Date(log.fecha).toLocaleString()}</td>
                        <td><strong>${log.modulo}</strong></td>
                        <td><span class="level-badge level-${log.nivel}">${log.nivel}</span></td>
                        <td>${log.mensaje}</td>
                        <td class="details-cell" title="${log.detalles || ''}">${log.detalles || '-'}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Error cargando logs:", err);
            }
        }

        loadLogs();
        setInterval(loadLogs, 30000); // Auto-refresh cada 30s
    </script>
</body>
</html>
