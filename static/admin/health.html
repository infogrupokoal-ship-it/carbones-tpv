<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salud del Sistema - Carbones y Pollos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #2ed573;
            --bg: #0f0c29;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h1 { font-weight: 600; font-size: 1.8rem; margin-bottom: 30px; color: var(--accent); }

        .stat-group { margin-bottom: 25px; }
        .label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; opacity: 0.8; }
        
        .progress-bg {
            background: rgba(255,255,255,0.1);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #2ed573, #7bed9f);
            width: 0%;
            transition: width 1s ease-in-out;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--accent);
            color: #000;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .small-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .small-card span { display: block; font-size: 1.2rem; font-weight: 600; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 Monitor de Infraestructura Enterprise</h1>
        
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span>Estado de Conexión: <span class="status-badge" id="status-text">OPERACIONAL</span></span>
                <span id="timestamp" style="font-size: 0.8rem; opacity: 0.6;"></span>
            </div>

            <div class="stat-group">
                <div class="label"><span>Uso de CPU</span> <span id="cpu-val">0%</span></div>
                <div class="progress-bg"><div id="cpu-bar" class="progress-bar"></div></div>
            </div>

            <div class="stat-group">
                <div class="label"><span>Uso de Memoria RAM</span> <span id="mem-val">0%</span></div>
                <div class="progress-bg"><div id="mem-bar" class="progress-bar"></div></div>
            </div>

            <div class="metrics-grid">
                <div class="small-card">Base de Datos <span id="db-status">CONECTADA</span></div>
                <div class="small-card">Disco Disponible <span id="disk-val">0 GB</span></div>
            </div>
        </div>
    </div>

    <script>
        async function updateHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                
                document.getElementById('cpu-bar').style.width = data.telemetry.cpu_percent + '%';
                document.getElementById('cpu-val').innerText = data.telemetry.cpu_percent + '%';
                
                document.getElementById('mem-bar').style.width = data.telemetry.memory_usage;
                document.getElementById('mem-val').innerText = data.telemetry.memory_usage;
                
                document.getElementById('disk-val').innerText = data.telemetry.disk_free_gb + ' GB';
                document.getElementById('db-status').innerText = data.telemetry.database.toUpperCase();
                document.getElementById('timestamp').innerText = "Última actualización: " + new Date().toLocaleTimeString();
                
            } catch (err) {
                document.getElementById('status-text').innerText = "ERROR";
                document.getElementById('status-text').style.background = "#ff4757";
            }
        }

        updateHealth();
        setInterval(updateHealth, 5000);
    </script>
</body>
</html>
