<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Carbones y Pollos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a202c; color: #fff; }
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center">
    
    <div class="text-center mb-8">
        <h1 class="text-5xl font-black text-yellow-400 drop-shadow-lg mb-2">🐔 Carbones <span class="text-white">y Pollos</span></h1>
        <p class="text-xl text-gray-400">Selecciona el modo de operación</p>
    </div>

    <div class="flex gap-6">
        <!-- Modo Quiosko -->
        <div onclick="selectMode('quiosko')" class="glass-panel p-8 rounded-3xl w-64 text-center cursor-pointer hover:bg-white/20 transition transform hover:scale-105 shadow-2xl">
            <div class="text-6xl mb-4">🖥️</div>
            <h2 class="text-2xl font-bold text-white mb-2">Modo Quiosko</h2>
            <p class="text-sm text-gray-300">Autoservicio para clientes. Pedidos pendientes de pago en caja.</p>
        </div>

        <!-- Modo Responsable -->
        <div onclick="openPinModal()" class="glass-panel p-8 rounded-3xl w-64 text-center cursor-pointer hover:bg-white/20 transition transform hover:scale-105 shadow-2xl">
            <div class="text-6xl mb-4">🔑</div>
            <h2 class="text-2xl font-bold text-yellow-400 mb-2">Modo Responsable</h2>
            <p class="text-sm text-gray-300">Gestión de cobros, comandas a cocina y dashboard.</p>
        </div>
    </div>

    <!-- PIN Modal -->
    <div id="pin-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-gray-800 p-8 rounded-3xl w-80 text-center shadow-2xl border border-gray-700">
            <h3 class="text-2xl font-bold text-yellow-400 mb-4">PIN de Acceso</h3>
            <input type="password" id="pin-input" class="w-full text-center text-3xl p-3 rounded-xl bg-gray-900 text-white border border-gray-600 focus:border-yellow-400 outline-none mb-6" placeholder="****" maxlength="4">
            
            <div class="flex gap-3">
                <button onclick="closePinModal()" class="flex-1 bg-gray-600 hover:bg-gray-500 text-white font-bold py-3 rounded-xl transition">Cancelar</button>
                <button onclick="verifyPin()" class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold py-3 rounded-xl transition shadow-lg">Entrar</button>
            </div>
            <p id="pin-error" class="text-red-400 mt-4 hidden font-bold">PIN incorrecto</p>
        </div>
    </div>

    <script>
        function selectMode(mode, name = 'Cliente') {
            localStorage.setItem('tpv_role', mode);
            localStorage.setItem('tpv_name', name);
            window.location.href = 'static/kiosko.html';
        }

        function openPinModal() {
            document.getElementById('pin-modal').classList.remove('hidden');
            document.getElementById('pin-modal').classList.add('flex');
            document.getElementById('pin-input').focus();
        }

        function closePinModal() {
            document.getElementById('pin-modal').classList.add('hidden');
            document.getElementById('pin-modal').classList.remove('flex');
            document.getElementById('pin-input').value = '';
            document.getElementById('pin-error').classList.add('hidden');
        }

        function verifyPin() {
            const pin = document.getElementById('pin-input').value;
            // PIN hardcodeado simple para el responsable
            if(pin === '1234') {
                selectMode('responsable', 'Admin');
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
            }
        }
        
        // Enter key to verify PIN
        document.getElementById('pin-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                verifyPin();
            }
        });
    </script>
</body>
</html>
