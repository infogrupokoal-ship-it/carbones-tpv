version: '3.8'

services:
  tpv-backend:
    build: .
    container_name: tpv_enterprise_backend
    ports:
      - "8000:8000"
    volumes:
      - tpv_data:/data
      - ./instance/logs:/app/instance/logs
    environment:
      - DATABASE_URL=sqlite:////data/tpv_data.sqlite
      - ENVIRONMENT=production
    restart: always

volumes:
  tpv_data:
    driver: local
