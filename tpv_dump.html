                    <button onclick="setCategory('bebidas')" class="cat-btn w-full h-20 bg-white border border-slate-200 text-slate-600 rounded-xl flex flex-col items-center justify-center gap-1 hover:bg-slate-50 transition-colors"><span class="text-2xl">🥤</span><span class="text-[10px] font-black uppercase">Bebidas</span></button>

        <!-- Center Col: Products Grid -->

                    <button onclick="addToCartFallback('Patatas Fritas', 3.50)" class="relative bg-white border border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-between h-36 transition-all hover:border-orange-400 hover:shadow-lg hover:-translate-y-1 active:scale-95">
                        <div class="text-3xl mb-2">🍟</div><p class="font-black text-xs leading-tight text-slate-800 text-center uppercase line-clamp-2 w-full">Patatas</p><div class="mt-auto pt-2 w-full text-center border-t border-slate-100"><span class="font-black text-sm text-orange-600">3.50 €</span></div>

                    <h2 class="text-xl font-black uppercase text-slate-800 leading-tight">Cambiar PIN</h2>

            </div>
            
            <form id="form-change-pin" onsubmit="submitPinChange(event)" class="flex flex-col gap-4">

                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-1 pl-2">PIN Actual</label>
                    <input type="password" id="pin_old" required pattern="[0-9]{4,20}" inputmode="numeric"

                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-1 pl-2">Nuevo PIN (Mín. 6)</label>

                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-1 pl-2">Repetir Nuevo PIN</label>
                    <input type="password" id="pin_confirm" required pattern="[0-9]{6,20}" inputmode="numeric"

    <!-- Scripts Operativos -->
    <script>
        let state = {
            products: [],
            categories: [{id: 'favoritos', nombre: 'Favoritos ⭐'}],
            cart: [],
            activeCat: 'favoritos',
            lastTicket: null
        };

        const CONFIG = {
            api: '/api',
            iva: 0.10
        };

        // --- Auth Info ---
        const currentUser = localStorage.getItem('auth_user') || 'Admin';
        document.getElementById('current-user').innerText = currentUser;

        // --- Init & Load ---
        async function init() {
            await loadCatalog();
            setupEvents();
            render();
        }

        async function loadCatalog() {
            try {
                const res = await fetch(`${CONFIG.api}/productos/`);
                const data = await res.json();
                state.products = Array.isArray(data) ? data : (data.value || []);
                
                // Categorías únicas
                const catMap = {};
                state.products.forEach(p => {
                    if (p.categoria_id && !catMap[p.categoria_id]) {
                        catMap[p.categoria_id] = p.categoria || "General";
                    }
                });
                
                // Mantener Favoritos como la primera
                const dbCats = Object.entries(catMap).map(([id, nombre]) => ({ id, nombre }));
                state.categories = [{id: 'favoritos', nombre: 'Favoritos ⭐'}, ...dbCats];
                
            } catch (e) {
                console.error("Fallo al cargar catálogo", e);
            }
        }

        // --- Rendering ---
        function render() {
            renderCategories();
            renderProducts();
            renderCart();
        }

        function renderCategories() {
            const list = document.getElementById('cat-list');
            list.innerHTML = state.categories.map(cat => `
                <button onclick="setActiveCat('${cat.id}', '${cat.nombre}')" class="cat-btn w-full h-20 bg-white border border-slate-200 rounded-xl flex flex-col items-center justify-center gap-1 transition-colors hover:border-orange-400 ${state.activeCat === cat.id ? 'active' : ''}">
                    <span class="text-2xl leading-none">${getEmoji(cat.nombre)}</span>
                    <span class="text-[10px] font-black uppercase tracking-widest text-center px-1 leading-tight">${cleanName(cat.nombre)}</span>
                </button>
            `).join('');
        }

        function setActiveCat(id, nombre) {
            state.activeCat = id;
            document.getElementById('current-cat-title').innerText = cleanName(nombre) + " " + getEmoji(nombre);
            renderCategories();
            renderProducts();
            document.getElementById('main-search').value = '';
        }

        function renderProducts(search = "") {
            const grid = document.getElementById('prod-grid-container');
            let filtered = state.products.filter(p => p.is_active !== false);
            
            if (search) {
                filtered = filtered.filter(p => p.nombre.toLowerCase().includes(search));
                document.getElementById('current-cat-title').innerText = "Búsqueda: " + search;
            } else {
                if (state.activeCat === 'favoritos') {
                    const favNames = ["Medio Pollo", "Pollo Entero", "Ración Arroz", "Coca-Cola", "Agua", "Alioli", "Pan", "Croquetas", "Patatas", "Ensaladilla"];
                    filtered = filtered.filter(p => favNames.some(f => p.nombre.toLowerCase().includes(f.toLowerCase())));
                } else {
                    filtered = filtered.filter(p => p.categoria_id === state.activeCat);
                }
            }

            grid.innerHTML = filtered.map(p => {
                const stockAlert = p.stock_actual !== null && p.stock_actual <= 5;
                const stockBadge = p.stock_actual !== null ? 
                    (p.stock_actual > 0 ? 
                        `<div class="absolute top-2 right-2 px-2 py-1 rounded-md text-[9px] font-black uppercase ${p.stock_actual <= 5 ? 'bg-yellow-100 text-yellow-700' : 'bg-slate-100 text-slate-500'}">Stock: ${p.stock_actual}</div>` 
                        : `<div class="absolute inset-0 bg-white/80 rounded-2xl flex items-center justify-center z-10 backdrop-blur-sm"><span class="bg-red-500 text-white px-3 py-1 rounded-full text-xs font-black uppercase">Agotado</span></div>`)
                    : '';
                
                const isOut = p.stock_actual !== null && p.stock_actual <= 0;
                
                return `
                <button onclick="${isOut ? '' : `addToCart('${p.id}')`}" class="relative bg-white border border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-between h-36 transition-all hover:border-orange-400 hover:shadow-lg hover:-translate-y-1 active:scale-95 ${isOut ? 'cursor-not-allowed' : ''}">
                    ${stockBadge}
                    <div class="text-3xl mb-2">${getEmoji(p.nombre)}</div>
                    <p class="font-black text-xs leading-tight text-slate-800 text-center uppercase line-clamp-2 w-full">${p.nombre}</p>
                    <div class="mt-auto pt-2 w-full border-t border-slate-100 text-center">
                        <span class="text-lg font-black text-orange-600">${Number(p.price || p.precio).toFixed(2)}€</span>
                    </div>
                </button>
            `}).join('');
        }

        function renderCart() {
            const list = document.getElementById('ticket-list');
            const hint = document.getElementById('empty-hint');
            
            if (state.cart.length === 0) {
                list.innerHTML = "";
                list.appendChild(hint);
                hint.style.display = "flex";
            } else {
                hint.style.display = "none";
                list.innerHTML = state.cart.map(item => `
                    <div class="flex flex-col border-b border-slate-100 py-2">
                        <div class="flex justify-between items-start mb-1">
                            <p class="font-black text-xs text-slate-800 uppercase leading-tight pr-2">${item.nombre}</p>
                            <span class="font-black text-sm text-slate-800">${(item.precio * item.cantidad).toFixed(2)}€</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">${item.precio.toFixed(2)}€ / ud</span>
                            <div class="flex items-center bg-slate-100 rounded-lg overflow-hidden">
                                <button onclick="updateQty('${item.producto_id}', -1)" class="w-8 h-8 flex items-center justify-center bg-slate-200 text-slate-600 hover:bg-red-500 hover:text-white transition-colors font-bold">−</button>
                                <span class="font-black text-xs w-8 text-center text-slate-800">${item.cantidad}</span>
                                <button onclick="updateQty('${item.producto_id}', 1)" class="w-8 h-8 flex items-center justify-center bg-slate-200 text-slate-600 hover:bg-emerald-500 hover:text-white transition-colors font-bold">+</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                // Auto-scroll al final del carrito
                list.scrollTop = list.scrollHeight;
            }

            updateTotals();
        }

        // --- Logic ---
        function addToCartFallback(name, price) {
            const prod = state.products.find(p => p.nombre.toLowerCase().includes(name.toLowerCase()));
            if (prod) {
                addToCart(prod.id);
            } else {
                const fakeId = 'temp-' + name;
                const existing = state.cart.find(i => i.producto_id === fakeId);
                if (existing) {
                    existing.cantidad++;
                } else {
                    state.cart.push({
                        producto_id: fakeId,
                        nombre: name,
                        precio: price,
                        cantidad: 1
                    });
                }
                renderCart();
            }
        }

        function addToCart(id) {
            const prod = state.products.find(p => p.id === id);
            const existing = state.cart.find(i => i.producto_id === id);
            
            if (existing) {
                existing.cantidad++;
            } else {
                state.cart.push({
                    producto_id: id,
                    nombre: prod.nombre,
                    precio: Number(prod.price || prod.precio),
                    cantidad: 1
                });
            }
            renderCart();
        }

        function updateQty(id, delta) {
            const item = state.cart.find(i => i.producto_id === id);
            if (item) {
                item.cantidad += delta;
                if (item.cantidad <= 0) {
                    state.cart = state.cart.filter(i => i.producto_id !== id);
                }
            }
            renderCart();
        }

        function clearTicket() {
            if (state.cart.length === 0) return;
            if (confirm("¿Vaciar ticket actual?")) {
                state.cart = [];
                renderCart();
            }
        }

        function updateTotals() {
            const subtotal = state.cart.reduce((acc, i) => acc + (i.precio * i.cantidad), 0);
            const iva = subtotal * CONFIG.iva;
            const total = subtotal + iva;

            document.getElementById('txt-subtotal').innerText = subtotal.toFixed(2) + " €";
            document.getElementById('txt-iva').innerText = iva.toFixed(2) + " €";
            document.getElementById('txt-total').innerText = total.toFixed(2) + " €";
        }

        function setPayment(method) {
            document.getElementById('sel-payment').value = method;
            const btns = document.querySelectorAll('.pay-method-btn');
            btns.forEach(b => {
                b.classList.remove('bg-emerald-50', 'border-emerald-500', 'text-emerald-700');
                b.classList.add('bg-white', 'border-slate-200', 'text-slate-600');
            });
            
            let btnId = '';
            if (method === 'EFECTIVO') btnId = 'btn-pay-cash';
            if (method === 'TARJETA') btnId = 'btn-pay-card';
            if (method === 'BIZUM') btnId = 'btn-pay-bizum';
            
            const selected = document.getElementById(btnId);
            if(selected) {
                selected.classList.remove('bg-white', 'border-slate-200', 'text-slate-600');
                selected.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700');
            }
        }

        async function processCheckout() {
            if (state.cart.length === 0) return;

            const payload = {
                items: state.cart.map(i => ({ producto_id: i.producto_id, cantidad: i.cantidad })),
                metodo_pago: document.getElementById('sel-payment').value,
                origen: document.getElementById('sel-origin').value,
                estado_inicial: 'COMPLETADO',
                metodo_envio: 'LOCAL'
            };

            try {
                const token = localStorage.getItem('auth_token');
                const res = await fetch(`${CONFIG.api}/orders/`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                
                const order = await res.json();
                if (res.ok) {
                    state.lastTicket = order;
                    // Encolar impresión automática (Zero-Touch)
                    enqueuePrint(order); // No bloqueante
                    showSuccess();
                } else {
                    alert("Error: " + (order.detail || "Error desconocido"));
                }
            } catch (e) {
                alert("Fallo de conexión al procesar la venta.");
            }
        }

        async function enqueuePrint(order) {
            try {
                const token = localStorage.getItem('auth_token');
                await fetch(`${CONFIG.api}/print/queue/`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({
                        order_id: order.numero_ticket,
                        device_id: 'TPV_MOSTRADOR_01',
                        job_type: 'TICKET_CLIENTE',
                        payload: {
                            ticket_number: order.numero_ticket,
                            items: state.cart,
                            total: order.total,
                            payment: order.metodo_pago
                        }
                    })
                });
            } catch (e) {
                console.warn("No se pudo encolar impresión automática", e);
            }
        }

        function showSuccess() {
            document.getElementById('modal-success').classList.remove('hidden');
        }

        function closeSuccess() {
            document.getElementById('modal-success').classList.add('hidden');
            state.cart = [];
            renderCart();
            // Actualizar stock local temporalmente o recargar catálogo
            loadCatalog().then(() => renderProducts());
        }
        
        function forcePrint() {
            if(state.lastTicket) enqueuePrint(state.lastTicket);
            alert("Orden de impresión reenviada.");
        }

        // --- Eventos Adicionales ---
        function setupEvents() {
            document.getElementById('main-search').addEventListener('input', (e) => {
                renderProducts(e.target.value.toLowerCase());
            });

            window.addEventListener('keydown', (e) => {
                if (e.key === 'F2') {
                    e.preventDefault();
                    document.getElementById('main-search').focus();
                }
            });
        }

        // --- Modales Mi Cuenta / PIN ---
        function openChangePin() {
            document.getElementById('modal-pin').classList.remove('hidden');
        }

        function closeChangePin() {
            document.getElementById('modal-pin').classList.add('hidden');
            document.getElementById('form-change-pin').reset();
            document.getElementById('pin-err-msg').classList.add('hidden');
        }

        async function submitPinChange(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-pin');
            const err = document.getElementById('pin-err-msg');
            
            const oldPin = document.getElementById('pin_old').value;
            const newPin = document.getElementById('pin_new').value;
            const confirmPin = document.getElementById('pin_confirm').value;
            
            btn.innerText = "Cambiando...";
            btn.disabled = true;
            err.classList.add('hidden');
            
            try {
                const token = localStorage.getItem('auth_token');
                const r = await fetch('/api/auth/change-pin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        old_pin: oldPin,
                        new_pin: newPin,
                        confirm_pin: confirmPin
                    })
                });
                
                if (r.ok) {
                    alert("PIN cambiado con éxito. Use este nuevo PIN la próxima vez.");
                    closeChangePin();
                } else {
                    const data = await r.json();
                    err.innerText = data.detail || "Error al cambiar PIN.";
                    err.classList.remove('hidden');
                }
            } catch(ex) {
                err.innerText = "Error de conexión.";
                err.classList.remove('hidden');
            } finally {
                btn.innerText = "Guardar";
                btn.disabled = false;
            }
        }

        // --- Utils ---
        function cleanName(name) {
            return name.replace('⭐⭐', '').replace('⭐', '').trim();
        }

        function getEmoji(name) {
            name = name.toLowerCase();
            if (name.includes('pollo')) return '🐔';
            if (name.includes('pizza')) return '🍕';
            if (name.includes('burger') || name.includes('hamburguesa')) return '🍔';
            if (name.includes('arroz') || name.includes('arroces') || name.includes('paella')) return '🥘';
            if (name.includes('bocadillo') || name.includes('pan')) return '🥖';
            if (name.includes('quijada') || name.includes('codillo') || name.includes('costilla')) return '🍖';
            if (name.includes('ración') || name.includes('raciones') || name.includes('patata') || name.includes('croqueta')) return '🍟';
            if (name.includes('ensalada')) return '🥗';
            if (name.includes('bebida') || name.includes('refresco') || name.includes('cola') || name.includes('agua')) return '🥤';
            if (name.includes('salsa') || name.includes('alioli')) return '🧄';
            if (name.includes('menú') || name.includes('menu')) return '🍱';
            if (name.includes('promo') || name.includes('pack')) return '🏷️';
            if (name.includes('postre')) return '🍰';
            if (name.includes('favoritos')) return '⭐';
            return '🍽️';
        }

        // Boot
        init();
    </script>
</body>
</html>
