# Blueprint de Despliegue Profesional - Carbones y Pollos TPV
# Version: 2.0-pro (Production Ready)

services:
  - type: web
    name: carbones-tpv-enterprise
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    preDeployCommand: python scripts/migrate_v5.py
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker backend.main:app --bind 0.0.0.0:$PORT
    plan: free
    region: frankfurt
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: DATABASE_URL
        value: sqlite:////data/tpv_data.sqlite
      - key: GOOGLE_API_KEY
        sync: false # Requerido: Configurar en Dashboard de Render
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: "Carbones y Pollos TPV Pro"
    disk:
      name: tpv-data-storage
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /health
