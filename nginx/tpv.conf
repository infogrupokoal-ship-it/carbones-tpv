# 🛡️ CONFIGURACIÓN NGINX ENTERPRISE - CARBONES Y POLLOS TPV
# Optimizado para Seguridad (SSL), Rendimiento (Gzip) y Caché.

upstream tpv_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name tpv.tudominio.com;
    
    # Redirección automática a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tpv.tudominio.com;

    # Certificados SSL (Configurar con Certbot/Let's Encrypt)
    # ssl_certificate /etc/letsencrypt/live/tpv.tudominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tpv.tudominio.com/privkey.pem;

    # Seguridad de Cabeceras (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logs Profesionales
    access_log /var/log/nginx/tpv_access.log combined;
    error_log /var/log/nginx/tpv_error.log warn;

    # --- Optimización de Archivos Estáticos ---
    location /static/ {
        alias /opt/carbones_tpv/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # --- Proxy al Backend FastAPI ---
    location / {
        proxy_pass http://tpv_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts extendidos para reportes pesados / IA
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }

    # --- Denegar acceso a archivos sensibles ---
    location ~ /\.(env|git|sqlite) {
        deny all;
    }
}
